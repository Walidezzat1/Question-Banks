                    { q: "ماذا يحدث للطاقة الحرارية إذا زادت المقاومة للضعف مع ثبات التيار المار؟", o: [{ t: "الحدث: تتضاعف الحرارة. التفسير: (I²R) الطاقة طردية مع المقاومة عند ثبوت التيار.", c: 1 }, { t: "الحدث: تقل للنصف. التفسير: عكسية مع المقاومة.", c: 0 }, { t: "الحدث: تزداد 4 مرات. التفسير: لتربيع المقاومة.", c: 0 }, { t: "الحدث: ثابتة. التفسير: لثبات التيار.", c: 0 }] },
                    { q: "ماذا يحدث لقدرة جهاز يعمل على 110V إذا تم توصيله بجهد 220V بالخطأ؟", o: [{ t: "الحدث: تزداد 4 أمثال وقد يحترق. التفسير: الجهد تضاعف والقدرة طردية مع مربعه.", c: 1 }, { t: "الحدث: تضاعف للضعف. التفسير: طردي مع الجهد.", c: 0 }, { t: "الحدث: يقل أداؤه. التفسير: لعدم توافقه.", c: 0 }, { t: "الحدث: يعمل طبيعياً. التفسير: لامتصاصه الزائد كحرارة.", c: 0 }] }
                ]
            },
            "lesson-7": {
                title: "درس (2-4) الدوائر الكهربائية",
                questions: [
                    { q: "ماذا يحدث للمقاومة المكافئة لعدة مقاومات متصلة على التوالي؟", o: [{ t: "الحدث: تزداد وتكون أكبر من أكبرها. التفسير: المكافئة هي مجموعهم (R1+R2).", c: 1 }, { t: "الحدث: تقل. التفسير: لتوزع الجهد.", c: 0 }, { t: "الحدث: ثابتة. التفسير: لثبات التيار.", c: 0 }, { t: "الحدث: تنعدم. التفسير: للاستهلاك التام.", c: 0 }] },
                    { q: "ماذا يحدث للمقاومة المكافئة متصلة على التوازي عند زيادة عددهم؟", o: [{ t: "الحدث: تقل وتكون أصغر من أصغر مقاومة. التفسير: لزيادة مسارات مرور التيار (1/Req).", c: 1 }, { t: "الحدث: تزداد. التفسير: لجمعها معاً.", c: 0 }, { t: "الحدث: مساوية لمتوسطها. التفسير: لثبات الجهد.", c: 0 }, { t: "الحدث: تتذبذب. التفسير: لاختلاف الأفرع.", c: 0 }] },
                    { q: "ماذا يحدث لشدة التيار الكلي بدائرة التوالي عند إضافة مقاومة جديدة؟", o: [{ t: "الحدث: يقل التيار الكلي. التفسير: لزيادة المقاومة الكلية مع ثبات جهد المصدر.", c: 1 }, { t: "الحدث: يزداد. التفسير: لحاجة المقاومة الجديدة لتيار.", c: 0 }, { t: "الحدث: ثابت. التفسير: توالي التيار ثابت دوماً.", c: 0 }, { t: "الحدث: ينعدم. التفسير: لامتصاصه كلياً.", c: 0 }] },
                    { q: "ماذا يحدث لتيار المصدر الكلي بدائرة التوازي عند إضافة فرع جديد؟", o: [{ t: "الحدث: يزداد الكلي. التفسير: لنقصان المقاومة المكافئة (إضافة مسار) بثبات الجهد.", c: 1 }, { t: "الحدث: يقل. التفسير: لتقسيم التيار على الفروع.", c: 0 }, { t: "الحدث: ثابت. التفسير: جهد البطارية ثابت.", c: 0 }, { t: "الحدث: ينعدم. التفسير: لاختناق الدائرة.", c: 0 }] },
                    { q: "ماذا يحدث لفرق الجهد بين أطراف مقاومات متوازية مختلفة القيم؟", o: [{ t: "الحدث: متساوي وثابت للجميع. التفسير: لأنها متصلة بنفس نقطتي المصدر.", c: 1 }, { t: "الحدث: يتجزأ طردياً. التفسير: الكبير يأخذ جهد أكبر.", c: 0 }, { t: "الحدث: يتجزأ عكسياً. التفسير: الصغير يأخذ أكبر.", c: 0 }, { t: "الحدث: يتلاشى بالتدريج. التفسير: لفقد الطاقة.", c: 0 }] },
                    { q: "ماذا يحدث للتيار المار في مقاومات متتالية مختلفة القيم؟", o: [{ t: "الحدث: متساوي وثابت للجميع. التفسير: يوجد مسار واحد فقط فلا يتراكم الشحن.", c: 1 }, { t: "الحدث: يتجزأ طردياً. التفسير: الكبيرة تسحب تيار أكبر.", c: 0 }, { t: "الحدث: يتجزأ عكسياً. التفسير: الكبيرة تسحب أقل.", c: 0 }, { t: "الحدث: يقل بالتدريج. التفسير: للاستهلاك المستمر.", c: 0 }] },
                    { q: "ماذا يحدث لمصابيح متصلة على التوالي إذا احترق أحدهما؟", o: [{ t: "الحدث: تنطفئ جميعها. التفسير: لفتح الدائرة وانقطاع المسار الوحيد.", c: 1 }, { t: "الحدث: تزيد إضاءتها. التفسير: لتوفر جهده لها.", c: 0 }, { t: "الحدث: تعمل كالمعتاد. التفسير: كل مصباح مستقل.", c: 0 }, { t: "الحدث: تحترق تباعاً. التفسير: لصدمة التيار.", c: 0 }] },
                    { q: "ماذا يحدث لمصابيح متوازية إذا احترق أحدهما؟", o: [{ t: "الحدث: تظل البقية مضيئة. التفسير: لأن لكل مصباح مساره المستقل (جهده الخاص).", c: 1 }, { t: "الحدث: تنطفئ كلها. التفسير: لفتح الدائرة الكلية.", c: 0 }, { t: "الحدث: تقل إضاءتها للضعف. التفسير: لتقسيم الجهد.", c: 0 }, { t: "الحدث: تومض بشدة. التفسير: لخلل بالبطارية.", c: 0 }] },
                    { q: "ماذا يحدث لجهد المصدر في دائرة التوالي؟", o: [{ t: "الحدث: يتجزأ (طردياً مع المقاومة). التفسير: المقاومة الأكبر تستهلك وتأخذ جهداً أكبر.", c: 1 }, { t: "الحدث: ثابت للجميع. التفسير: كالتوازي تماماً.", c: 0 }, { t: "الحدث: يتجزأ عكسياً. التفسير: الأصغر يأخذ أكثر.", c: 0 }, { t: "الحدث: يتضاعف. التفسير: لتعدد المقاومات.", c: 0 }] },
                    { q: "ماذا يحدث لتيار المصدر في دائرة التوازي؟", o: [{ t: "الحدث: يتجزأ (عكسياً مع المقاومة). التفسير: المقاومة الأكبر يمر بها تيار أضعف.", c: 1 }, { t: "الحدث: ثابت. التفسير: كالتوالي تماماً.", c: 0 }, { t: "الحدث: يتجزأ طردياً. التفسير: الأكبر يأخذ أكثر.", c: 0 }, { t: "الحدث: ينعدم. التفسير: لانقسام المسارات.", c: 0 }] },
                    { q: "ماذا يحدث لجهد مقاومة كبيرة موصولة توالي مع صغيرة؟", o: [{ t: "الحدث: جهد الكبيرة أكبر. التفسير: لثبات التيار (V=I.R).", c: 1 }, { t: "الحدث: جهد الصغيرة أكبر. التفسير: لمرور تيار أسهل.", c: 0 }, { t: "الحدث: متساويان. التفسير: لأن المصدر واحد.", c: 0 }, { t: "الحدث: الجهد صفر. التفسير: لحدوث قصر.", c: 0 }] },
                    { q: "ماذا يحدث لتيار مقاومة كبيرة موصولة توازي مع صغيرة؟", o: [{ t: "الحدث: تيار الكبيرة أصغر. التفسير: لثبات الجهد عليهما (I=V/R).", c: 1 }, { t: "الحدث: تيار الكبيرة أكبر. التفسير: لأنها تسحب أكثر.", c: 0 }, { t: "الحدث: متساوي. التفسير: لأن المصدر يغذيهما معاً.", c: 0 }, { t: "الحدث: ينعدم تيار الكبيرة. التفسير: لمروره بالصغيرة فقط.", c: 0 }] },
                    { q: "ماذا يحدث لتوصيل المنزل توالي بدلاً من توازي؟", o: [{ t: "الحدث: إن تلف جهاز ينقطع الكل. التفسير: ولتحتاج الأجهزة لجهد مختلف مجزأ.", c: 1 }, { t: "الحدث: أفضل وأكفأ. التفسير: لثبات التيار بالمنزل.", c: 0 }, { t: "الحدث: توفير الكهرباء. التفسير: لقلة المقاومة.", c: 0 }, { t: "الحدث: لا يتأثر. التفسير: الأجهزة تعمل بأي نظام.", c: 0 }] },
                    { q: "ماذا يحدث لشدة التيار عند حدوث دائرة قصر (تلامس سلكين)؟", o: [{ t: "الحدث: تزداد فجأة وبشدة (احتراق). التفسير: لتخطي المقاومات وانعدام الممانعة بالمسار الجديد.", c: 1 }, { t: "الحدث: تنعدم فوراً. التفسير: لتفريغها بالأرض.", c: 0 }, { t: "الحدث: تقل ببطء. التفسير: لمقاومة السلكين.", c: 0 }, { t: "الحدث: ثابتة. التفسير: البطارية تنظم ذلك.", c: 0 }] },
                    { q: "ماذا يحدث لاستهلاك الطاقة الكلي بتوصيل مقاومات توازي بدلاً من التوالي للمصدر ذاته؟", o: [{ t: "الحدث: يزداد الاستهلاك الكلي. التفسير: التوازي يقلل المقاومة فيزيد التيار الكلي المسحوب من المصدر.", c: 1 }, { t: "الحدث: يقل الاستهلاك. التفسير: لأن الجهد لا يتجزأ.", c: 0 }, { t: "الحدث: ثابت. التفسير: لا تعتمد الطاقة على التوصيل.", c: 0 }, { t: "الحدث: تنعدم الطاقة. التفسير: لاختناق المسارات.", c: 0 }] },
                    { q: "ماذا يحدث لمؤشر الوقود بالسيارة عند امتلاء الخزان؟", o: [{ t: "الحدث: يتحرك لأعلى (Full). التفسير: العوامة تقلل المقاومة المتغيرة فيزيد التيار وينحرف المؤشر بشدة.", c: 1 }, { t: "الحدث: ينخفض لأسفل (Empty). التفسير: لزيادة مقاومة العوامة الكبيرة.", c: 0 }, { t: "الحدث: يظل بالمنتصف. التفسير: ليعاير الضغط.", c: 0 }, { t: "الحدث: يتذبذب. التفسير: لحركة السائل.", c: 0 }] }
                ]
            }
        };

        function renderLesson(lessonId) {
            const container = document.getElementById('quiz-container');
            const header = document.getElementById('section-header');
            container.innerHTML = '';
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn text-right px-4 py-2.5 rounded-xl font-semibold transition-all duration-200 bg-white text-gray-600 border border-gray-100 hover:bg-gray-50 hover:text-blue-600 text-sm";
                if(btn.id === 'btn-all') {
                    btn.className = "nav-btn text-right px-4 py-3 rounded-xl font-bold transition-all duration-200 bg-blue-50 text-blue-700 hover:bg-blue-100 shadow-sm border border-blue-100";
                }
            });

            const activeBtn = document.getElementById('btn-' + lessonId);
            if (activeBtn) {
                if(lessonId !== 'all') {
                    activeBtn.className = "nav-btn text-right px-4 py-2.5 rounded-xl font-semibold transition-all duration-200 bg-blue-600 text-white shadow-md text-sm";
                } else {
                    activeBtn.className = "nav-btn text-right px-4 py-3 rounded-xl font-bold transition-all duration-200 bg-blue-600 text-white shadow-md";
                }
            }

            let questionsToRender = [];
            if (lessonId === 'all') {
                header.classList.add('hidden');
                Object.values(quizData).forEach(lesson => {
                    questionsToRender = questionsToRender.concat(lesson.questions);
                });
            } else {
                if (quizData[lessonId]) {
                    header.classList.remove('hidden');
                    header.innerHTML = `<h2 class="text-2xl font-bold text-blue-800 flex items-center gap-3"><span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg text-sm">محدد</span>${quizData[lessonId].title}</h2>`;
                    questionsToRender = quizData[lessonId].questions;
                }
            }

            questionsToRender.forEach((qObj, index) => {
                let options = [...qObj.o].sort(() => Math.random() - 0.5);

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-200 fade-in";
                
                let optionsHtml = options.map((opt, i) => {
                    let formattedText = opt.t
                        .replace('الحدث:', '<span class="text-emerald-700 font-extrabold bg-emerald-100 px-2 py-0.5 rounded-md shadow-sm">الحدث:</span>')
                        .replace('التفسير:', '<br><span class="text-purple-700 font-extrabold bg-purple-100 px-2 py-0.5 rounded-md mt-2 mb-1 inline-block shadow-sm">التفسير:</span>');
                        
                    return `
                    <button class="option-btn w-full text-right p-4 rounded-xl border-2 border-gray-100 hover:border-blue-300 hover:bg-blue-50 font-semibold text-gray-700 transition-all duration-200 leading-relaxed" data-correct="${opt.c}">
                        ${formattedText}
                    </button>
                    `;
                }).join('');

                card.innerHTML = `
                    <h3 class="text-lg font-extrabold text-gray-900 mb-5 leading-relaxed"><span class="text-blue-600 ml-1">${index + 1}.</span> ${qObj.q}</h3>
                    <div class="space-y-3">
                        ${optionsHtml}
                    </div>
                    <div class="feedback hidden mt-5 p-5 rounded-xl border"></div>
                `;

                const btns = card.querySelectorAll('.option-btn');
                const feedback = card.querySelector('.feedback');

                btns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        if (card.dataset.answered) return;
                        card.dataset.answered = true;

                        const isCorrect = this.getAttribute('data-correct') === '1';

                        btns.forEach(b => {
                            b.classList.remove('hover:border-blue-300', 'hover:bg-blue-50', 'cursor-pointer');
                            b.classList.add('cursor-default');
                            
                            if (b.getAttribute('data-correct') === '1') {
                                b.classList.add('bg-green-50', 'border-green-500', 'text-green-800');
                                b.classList.remove('border-gray-100', 'text-gray-700');
                                card.dataset.correctText = b.innerHTML;
                            } else {
                                b.classList.add('opacity-40');
                            }
                        });

                        if (!isCorrect) {
                            this.classList.remove('opacity-40', 'bg-green-50', 'border-green-500', 'text-green-800');
                            this.classList.add('bg-red-50', 'border-red-500', 'text-red-800');
                            this.classList.remove('border-gray-100', 'text-gray-700');
                        }

                        feedback.classList.remove('hidden');
                        if (isCorrect) {
                            feedback.classList.add('bg-green-50', 'border-green-200', 'text-green-800');
                            feedback.innerHTML = `
                                <div class="flex items-start gap-3">
                                    <div class="bg-green-200 p-1.5 rounded-full mt-0.5 shadow-sm"><svg class="w-5 h-5 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                                    <div><h4 class="font-bold text-lg mb-1">إجابة صحيحة!</h4><div class="text-sm font-semibold opacity-90 leading-relaxed mt-2 p-2 bg-green-100 rounded-lg border border-green-200">${card.dataset.correctText}</div></div>
                                </div>`;
                        } else {
                            feedback.classList.add('bg-red-50', 'border-red-200', 'text-red-800');
                            feedback.innerHTML = `
                                <div class="flex items-start gap-3">
                                    <div class="bg-red-200 p-1.5 rounded-full mt-0.5 shadow-sm"><svg class="w-5 h-5 text-red-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg></div>
                                    <div class="w-full"><h4 class="font-bold text-lg mb-1">إجابة خاطئة!</h4>
                                    <p class="text-sm font-bold text-gray-800 mt-3 mb-2">الإجابة الصحيحة:</p>
                                    <div class="text-sm font-semibold opacity-90 text-green-800 bg-green-50 p-3 rounded-lg border border-green-300 leading-relaxed shadow-inner">${card.dataset.correctText}</div></div>
                                </div>`;
                        }
                    });
                });
                container.appendChild(card);
            });
            if (window.innerWidth < 1024) { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        }
        window.onload = () => renderLesson('all');
    </script>
</body>
</html>
