    <script>
        // --- البيانات: بنك الأسئلة ---
        const questionsData = [
            // --- القسم الأول: الحركة التوافقية البسيطة (1 - 20) ---
            { id: 1, level: "التذكر", section: "الحركة التوافقية البسيطة", text: "ما هو المصطلح العلمي للحركة الاهتزازية التي تكرر نفسها في فترات زمنية متساوية؟", options: [ { id: 'A', text: "الحركة الانتقالية" }, { id: 'B', text: "الحركة الدورية" }, { id: 'C', text: "الحركة المعجلة" }, { id: 'D', text: "الحركة العشوائية" } ], correctOption: 'B', explanation: "الحركة الدورية هي التي تكرر نفسها خلال فترات زمنية متساوية." },
            { id: 2, level: "الفهم", section: "الحركة التوافقية البسيطة", text: "في الحركة التوافقية البسيطة، تتناسب قوة الإرجاع مع الإزاحة الحادثة:", options: [ { id: 'A', text: "عكسياً وفي نفس الاتجاه" }, { id: 'B', text: "طردياً وفي نفس الاتجاه" }, { id: 'C', text: "طردياً وفي اتجاه معاكس" }, { id: 'D', text: "عكسياً وفي اتجاه معاكس" } ], correctOption: 'C', explanation: "هذا هو الشرط الأساسي للحركة التوافقية البسيطة." },
            { id: 3, level: "التذكر", section: "الحركة التوافقية البسيطة", text: "أكبر إزاحة للجسم المهتز عن موضع سكونه تسمى:", options: [ { id: 'A', text: "التردد" }, { id: 'B', text: "السعة" }, { id: 'C', text: "الزمن الدوري" }, { id: 'D', text: "السرعة الزاوية" } ], correctOption: 'B', explanation: "السعة هي أقصى إزاحة يصل إليها الجسم المهتز بعيداً عن موضع اتزانه." },
            { id: 4, level: "التذكر", section: "الحركة التوافقية البسيطة", text: "عدد الاهتزازات الكاملة الحادثة في الثانية الواحدة هو:", options: [ { id: 'A', text: "الزمن الدوري" }, { id: 'B', text: "السرعة الزاوية" }, { id: 'C', text: "سعة الاهتزازة" }, { id: 'D', text: "التردد" } ], correctOption: 'D', explanation: "التردد يُعرّف بأنه عدد الاهتزازات في الثانية ويُقاس بالهرتز." },
            { id: 5, level: "الفهم", section: "الحركة التوافقية البسيطة", text: "عند موضع الاستقرار (الاتزان)، تكون محصلة القوى المؤثرة على كرة بندول بسيط يتحرك حركة توافقية بسيطة:", options: [ { id: 'A', text: "أكبر ما يمكن" }, { id: 'B', text: "تساوي صفر" }, { id: 'C', text: "تساوي وزن الكرة" }, { id: 'D', text: "تساوي قوة الشد" } ], correctOption: 'B', explanation: "عند موضع الاتزان تنعدم الإزاحة فتنعدم قوة الإرجاع وتصبح محصلة القوى صفراً." },
            { id: 6, level: "التطبيق", section: "الحركة التوافقية البسيطة", text: "جسم يهتز بتردد 100 Hz، فإن زمنه الدوري بوحدة الثانية (s) يساوي:", options: [ { id: 'A', text: "100" }, { id: 'B', text: "10" }, { id: 'C', text: "0.01" }, { id: 'D', text: "0.1" } ], correctOption: 'C', explanation: "الزمن الدوري مقلوب التردد: T = 1/f = 1/100 = 0.01 s." },
            { id: 7, level: "التطبيق", section: "الحركة التوافقية البسيطة", text: "يتحرك جسم وتُعطى إزاحته بالعلاقة y = 8 sin(5t) (حيث الأبعاد بـ cm). سعة الاهتزازة تساوي:", options: [ { id: 'A', text: "5 cm" }, { id: 'B', text: "8 cm" }, { id: 'C', text: "13 cm" }, { id: 'D', text: "40 cm" } ], correctOption: 'B', explanation: "من المعادلة y = A sin(wt)، المعامل A يمثل السعة وهو 8." },
            { id: 8, level: "التطبيق", section: "الحركة التوافقية البسيطة", text: "شوكة رنانة تعمل 1200 اهتزازة خلال دقيقة واحدة، ترددها بوحدة الهرتز يساوي:", options: [ { id: 'A', text: "1200" }, { id: 'B', text: "60" }, { id: 'C', text: "20" }, { id: 'D', text: "0.05" } ], correctOption: 'C', explanation: "التردد = عدد الاهتزازات / الزمن بالثواني = 1200 / 60 = 20 Hz." },
            { id: 9, level: "التحليل", section: "الحركة التوافقية البسيطة", text: "الزمن الدوري للبندول البسيط في المكان الواحد يتناسب طردياً مع:", options: [ { id: 'A', text: "كتلة الثقل المعلق" }, { id: 'B', text: "طول الخيط" }, { id: 'C', text: "عجلة الجاذبية" }, { id: 'D', text: "الجذر التربيعي لطول خيطه" } ], correctOption: 'D', explanation: "حسب القانون T = 2π√(L/g)، التناسب الطردي يكون مع الجذر التربيعي للطول." },
            { id: 10, level: "التحليل", section: "الحركة التوافقية البسيطة", text: "إذا زيدت كتلة ثقل البندول البسيط إلى أربع أمثالها، فإن زمنه الدوري:", options: [ { id: 'A', text: "يزداد للضعف" }, { id: 'B', text: "يقل للنصف" }, { id: 'C', text: "يزداد لأربعة أمثاله" }, { id: 'D', text: "لا يتغير" } ], correctOption: 'D', explanation: "الزمن الدوري للبندول البسيط لا يعتمد على كتلة الثقل المعلق." },
            { id: 11, level: "التحليل", section: "الحركة التوافقية البسيطة", text: "لكي يقل الزمن الدوري للبندول البسيط إلى نصف قيمته، يجب أن ينقص طوله إلى:", options: [ { id: 'A', text: "النصف" }, { id: 'B', text: "الربع" }, { id: 'C', text: "الثلث" }, { id: 'D', text: "الثمن" } ], correctOption: 'B', explanation: "بما أن T ∝ √L، للحصول على (1/2)T يجب أن يكون الطول (1/4)L لأن جذر الربع هو نصف." },
            { id: 12, level: "التحليل", section: "الحركة التوافقية البسيطة", text: "إذا وضع بندول بسيط على كوكب عجلة جاذبيته تسع (1/9) جاذبية الأرض، فإن زمنه الدوري:", options: [ { id: 'A', text: "يزداد لثلاثة أمثاله" }, { id: 'B', text: "يقل للثلث" }, { id: 'C', text: "لا يتغير" }, { id: 'D', text: "يزداد لتسعة أمثاله" } ], correctOption: 'A', explanation: "يتناسب T عكسياً مع جذر g. جذر (1/9) هو (1/3)، والمقلوب هو 3." },
            { id: 13, level: "التطبيق", section: "الحركة التوافقية البسيطة", text: "كتلة 0.2 kg معلقة بنابض، استبدلت بكتلة 0.8 kg. الزمن الدوري للنابض:", options: [ { id: 'A', text: "يزداد للضعف" }, { id: 'B', text: "يقل للنصف" }, { id: 'C', text: "يزداد لأربعة أمثاله" }, { id: 'D', text: "لا يتغير" } ], correctOption: 'A', explanation: "الكتلة زادت 4 مرات. الزمن الدوري للنابض يتناسب طردياً مع جذر الكتلة، جذر 4 هو 2 (يزداد للضعف)." },
            { id: 14, level: "الفهم", section: "الحركة التوافقية البسيطة", text: "تستمر كرة البندول في الحركة أثناء مرورها بموضع الاستقرار رغم انعدام قوة الإرجاع بسبب:", options: [ { id: 'A', text: "الجاذبية الأرضية" }, { id: 'B', text: "قوة الشد" }, { id: 'C', text: "القصور الذاتي" }, { id: 'D', text: "الاحتكاك" } ], correctOption: 'C', explanation: "القصور الذاتي يجعل الكرة تقاوم تغيير حالتها الحركية وتستمر في الاندفاع." },
            { id: 15, level: "الفهم", section: "الحركة التوافقية البسيطة", text: "المسافة التي يقطعها الجسم المهتز خلال اهتزازة كاملة تساوي:", options: [ { id: 'A', text: "سعة واحدة" }, { id: 'B', text: "مثلي السعة" }, { id: 'C', text: "ثلاثة أمثال السعة" }, { id: 'D', text: "أربعة أمثال السعة" } ], correctOption: 'D', explanation: "الاهتزازة الكاملة تتضمن الذهاب والإياب من وإلى أقصى إزاحة في الاتجاهين (4 سعات)." },
            { id: 16, level: "التذكر", section: "الحركة التوافقية البسيطة", text: "مقدار الزاوية التي يمسحها نصف القطر في الثانية الواحدة هو تعريف:", options: [ { id: 'A', text: "التردد" }, { id: 'B', text: "الزمن الدوري" }, { id: 'C', text: "السرعة الزاوية" }, { id: 'D', text: "سعة الاهتزاز" } ], correctOption: 'C', explanation: "هذا هو التعريف العلمي الدقيق للسرعة الزاوية (ω)." },
            { id: 17, level: "التطبيق", section: "الحركة التوافقية البسيطة", text: "إذا كان الزمن الدوري لبندول 1 ثانية (g=10)، فإن طول خيطه تقريباً يساوي:", options: [ { id: 'A', text: "0.25 m" }, { id: 'B', text: "0.5 m" }, { id: 'C', text: "1 m" }, { id: 'D', text: "2.5 m" } ], correctOption: 'A', explanation: "من T = 2π√(L/g) -> L = T²g / 4π² = 1*10 / 39.4 ≈ 0.25 m." },
            { id: 18, level: "التحليل", section: "الحركة التوافقية البسيطة", text: "أي الخطوط البيانية يمثل العلاقة بين مربع الزمن الدوري للبندول (T²) وطول خيطه (L)؟", options: [ { id: 'A', text: "منحنى عكسي" }, { id: 'B', text: "خط مستقيم يمر بنقطة الأصل" }, { id: 'C', text: "خط مستقيم يوازي محور السينات" }, { id: 'D', text: "منحنى جيب الزاوية" } ], correctOption: 'B', explanation: "العلاقة طردية خطية بين T² و L." },
            { id: 19, level: "الفهم", section: "الحركة التوافقية البسيطة", text: "يعود الجسم المهتز إلى موضع استقراره عند إزاحته بعيداً عنه بسبب:", options: [ { id: 'A', text: "انعدام الجاذبية" }, { id: 'B', text: "القوة الطاردة المركزية" }, { id: 'C', text: "لأن قوة الإرجاع اتجاهها دوماً نحو موضع الاتزان" }, { id: 'D', text: "قوة الاحتكاك مع الهواء" } ], correctOption: 'C', explanation: "قوة الإرجاع سُميت كذلك لأنها تعمل دائماً لإعادة الجسم لحالة الاتزان." },
            { id: 20, level: "التطبيق", section: "الحركة التوافقية البسيطة", text: "بندول استغرق 0.4 ثانية لعمل اهتزازة كاملة. ما تردده؟", options: [ { id: 'A', text: "0.4 Hz" }, { id: 'B', text: "2.5 Hz" }, { id: 'C', text: "4 Hz" }, { id: 'D', text: "25 Hz" } ], correctOption: 'B', explanation: "التردد مقلوب الزمن الدوري = 1 / 0.4 = 2.5 Hz." },
            
            // --- القسم الثاني: الموجات والصوت (21 - 45) ---
            { id: 21, level: "التذكر", section: "الموجات والصوت", text: "الموجات التي تكون فيها حركة جزيئات الوسط عمودية على اتجاه الانتشار هي:", options: [ { id: 'A', text: "الموجات الطولية" }, { id: 'B', text: "الموجات المستعرضة" }, { id: 'C', text: "موجات الصوت" }, { id: 'D', text: "موجات الضغط" } ], correctOption: 'B', explanation: "الموجات المستعرضة تهتز فيها الجزيئات عمودياً على خط انتشار الموجة." },
            { id: 22, level: "التذكر", section: "الموجات والصوت", text: "تتكون الموجات الطولية من:", options: [ { id: 'A', text: "قمم فقط" }, { id: 'B', text: "قيعان فقط" }, { id: 'C', text: "قمم وقيعان" }, { id: 'D', text: "تضاغطات وتخلخلات" } ], correctOption: 'D', explanation: "الاهتزاز في نفس اتجاه الانتشار يولد مناطق ضغط عالٍ (تضاغط) ومنخفض (تخلخل)." },
            { id: 23, level: "التذكر", section: "الموجات والصوت", text: "ينص القانون الثاني للانعكاس على أن:", options: [ { id: 'A', text: "زاوية السقوط أكبر من زاوية الانعكاس" }, { id: 'B', text: "الشعاع المنعكس عمودي على السطح" }, { id: 'C', text: "زاوية السقوط تساوي زاوية الانعكاس" }, { id: 'D', text: "زاوية الانكسار تساوي زاوية السقوط" } ], correctOption: 'C', explanation: "هذا هو النص المباشر للقانون الثاني للانعكاس." },
            { id: 24, level: "الفهم", section: "الموجات والصوت", text: "لا يمكن لرواد الفضاء التفاهم بالصوت العادي على سطح القمر لأن:", options: [ { id: 'A', text: "الصوت موجة كهرومغناطيسية" }, { id: 'B', text: "الصوت يحتاج لوسط مادي والقمر فراغ" }, { id: 'C', text: "الجاذبية ضعيفة جداً" }, { id: 'D', text: "درجة الحرارة منخفضة جداً" } ], correctOption: 'B', explanation: "الموجات الميكانيكية كالصوت لا تنتقل في الفراغ." },
            { id: 25, level: "الفهم", section: "الموجات والصوت", text: "ينكسر الصوت مبتعداً عن العمود المقام عند انتقاله من:", options: [ { id: 'A', text: "هواء بارد إلى هواء ساخن" }, { id: 'B', text: "هواء ساخن إلى هواء بارد" }, { id: 'C', text: "هواء إلى فراغ" }, { id: 'D', text: "ماء إلى هواء" } ], correctOption: 'A', explanation: "سرعة الصوت في الهواء الساخن أكبر، لذا تنكسر الموجة مبتعدة عن العمود المقام." },
            { id: 26, level: "التذكر", section: "الموجات والصوت", text: "ظاهرة انحناء الموجات حول حافة حاجز حادة تسمى:", options: [ { id: 'A', text: "الانعكاس" }, { id: 'B', text: "الانكسار" }, { id: 'C', text: "الحيود" }, { id: 'D', text: "التداخل" } ], correctOption: 'C', explanation: "هذا هو التعريف العلمي الدقيق لظاهرة الحيود." },
            { id: 27, level: "التطبيق", section: "الموجات والصوت", text: "موجة صوتية طولها الموجي 2 m وترددها 165 Hz. سرعتها تساوي:", options: [ { id: 'A', text: "82.5 m/s" }, { id: 'B', text: "330 m/s" }, { id: 'C', text: "167 m/s" }, { id: 'D', text: "332 m/s" } ], correctOption: 'B', explanation: "السرعة = التردد × الطول الموجي (V = 165 × 2 = 330)." },
            { id: 28, level: "الفهم", section: "الموجات والصوت", text: "التداخل البنّاء يحدث عندما تلتقي:", options: [ { id: 'A', text: "قمة مع قاع" }, { id: 'B', text: "تضاغط مع تخلخل" }, { id: 'C', text: "قمة مع قمة أو قاع مع قاع" }, { id: 'D', text: "موجة طولية مع مستعرضة" } ], correctOption: 'C', explanation: "التقاء الأطوار المتشابهة يولد تداخلاً بناءً يقوي الموجة." },
            { id: 29, level: "التحليل", section: "الموجات والصوت", text: "في الموجة الموقوفة، المسافة بين عقدتين متتاليتين تساوي:", options: [ { id: 'A', text: "طول موجي كامل (λ)" }, { id: 'B', text: "نصف طول موجي (λ/2)" }, { id: 'C', text: "ربع طول موجي (λ/4)" }, { id: 'D', text: "ضعف الطول الموجي (2λ)" } ], correctOption: 'B', explanation: "كل قطاع (بين عقدتين متتاليتين) يمثل نصف موجة." },
            { id: 30, level: "الفهم", section: "الموجات والصوت", text: "أقل تردد يصدره وتر مشدود مهتز يُعرف بـ:", options: [ { id: 'A', text: "النغمة التوافقية الثانية" }, { id: 'B', text: "التردد الحرج" }, { id: 'C', text: "النغمة التوافقية الأولى" }, { id: 'D', text: "النغمة الأساسية" } ], correctOption: 'D', explanation: "النغمة الأساسية هي أقل تردد وتتكون من قطاع واحد (بطن واحد)." },
            { id: 31, level: "التحليل", section: "الموجات والصوت", text: "يتناسب تردد النغمة الأساسية لوتر مشدود:", options: [ { id: 'A', text: "طردياً مع طوله" }, { id: 'B', text: "عكسياً مع طوله" }, { id: 'C', text: "طردياً مع مربع قوة الشد" }, { id: 'D', text: "عكسياً مع قوة الشد" } ], correctOption: 'B', explanation: "حسب القانون، التردد يتناسب عكسياً مع الطول (f ∝ 1/L)." },
            { id: 32, level: "التطبيق", section: "الموجات والصوت", text: "وتر يصدر نغمة أساسية ترددها 500 Hz، إذا قل طوله للنصف، يصبح تردده:", options: [ { id: 'A', text: "250 Hz" }, { id: 'B', text: "500 Hz" }, { id: 'C', text: "1000 Hz" }, { id: 'D', text: "2000 Hz" } ], correctOption: 'C', explanation: "العلاقة عكسية، قل الطول للنصف يعني تضاعف التردد (500 × 2 = 1000)." },
            { id: 33, level: "التطبيق", section: "الموجات والصوت", text: "وتر طوله 3 m تولدت فيه موجة موقوفة من 3 قطاعات. الطول الموجي يساوي:", options: [ { id: 'A', text: "1 m" }, { id: 'B', text: "2 m" }, { id: 'C', text: "3 m" }, { id: 'D', text: "1.5 m" } ], correctOption: 'B', explanation: "λ = 2L / n = (2 × 3) / 3 = 2 m." },
            { id: 34, level: "التحليل", section: "الموجات والصوت", text: "إذا زادت قوة الشد في الوتر المهتز إلى أربعة أمثالها، فإن سرعة الانتشار:", options: [ { id: 'A', text: "تزداد إلى المثلين" }, { id: 'B', text: "تزداد إلى أربعة أمثالها" }, { id: 'C', text: "تقل للنصف" }, { id: 'D', text: "لا تتغير" } ], correctOption: 'A', explanation: "سرعة الموجة تتناسب طردياً مع جذر قوة الشد (V ∝ √T). جذر 4 هو 2." },
            { id: 35, level: "الفهم", section: "الموجات والصوت", text: "موجات الماء تعتبر موجات:", options: [ { id: 'A', text: "كهرومغناطيسية" }, { id: 'B', text: "ميكانيكية" }, { id: 'C', text: "طولية فقط" }, { id: 'D', text: "لا تحتاج لوسط مادي" } ], correctOption: 'B', explanation: "موجات الماء تحتاج لوسط مادي (الماء) لتنتقل خلاله فهي ميكانيكية." },
            { id: 36, level: "التحليل", section: "الموجات والصوت", text: "إذا زاد تردد موجة للضعف في نفس الوسط، فإن:", options: [ { id: 'A', text: "سرعتها تتضاعف" }, { id: 'B', text: "طولها الموجي يقل للنصف" }, { id: 'C', text: "طولها الموجي يتضاعف" }, { id: 'D', text: "سرعتها تقل للنصف" } ], correctOption: 'B', explanation: "السرعة ثابتة في نفس الوسط، لذا العلاقة عكسية بين التردد والطول الموجي." },
            { id: 37, level: "التطبيق", section: "الموجات والصوت", text: "موجة تقطع مسافة 40 m في 10 s وكانت تتكون من 5 موجات. ما هو الزمن الدوري؟", options: [ { id: 'A', text: "2 s" }, { id: 'B', text: "4 s" }, { id: 'C', text: "0.5 s" }, { id: 'D', text: "50 s" } ], correctOption: 'A', explanation: "الزمن الدوري = الزمن الكلي / عدد الموجات = 10 / 5 = 2 s." },
            { id: 38, level: "التطبيق", section: "الموجات والصوت", text: "موجة تقطع مسافة 40 m وتتكون من 5 موجات. ما هو الطول الموجي؟", options: [ { id: 'A', text: "40 m" }, { id: 'B', text: "10 m" }, { id: 'C', text: "8 m" }, { id: 'D', text: "2 m" } ], correctOption: 'C', explanation: "الطول الموجي = المسافة الكلية / عدد الموجات = 40 / 5 = 8 m." },
            { id: 39, level: "الفهم", section: "الموجات والصوت", text: "يسمى تراكب قطارين من الموجات يسيران في اتجاهين متعاكسين بـ:", options: [ { id: 'A', text: "التداخل الهدام" }, { id: 'B', text: "الموجات الموقوفة" }, { id: 'C', text: "ظاهرة الحيود" }, { id: 'D', text: "الانكسار" } ], correctOption: 'B', explanation: "هذا هو التعريف العلمي للموجات الموقوفة." },
            { id: 40, level: "التحليل", section: "الموجات والصوت", text: "تزداد ظاهرة حيود الصوت وضوحاً عندما يكون اتساع الفتحة:", options: [ { id: 'A', text: "أكبر بكثير من الطول الموجي" }, { id: 'B', text: "أصغر من أو مقارباً للطول الموجي" }, { id: 'C', text: "مساوياً لسرعة الموجة" }, { id: 'D', text: "لا يتأثر بحجم الفتحة" } ], correctOption: 'B', explanation: "الحيود يكون أشد كلما ضاقت الفتحة نسبة إلى الطول الموجي للموجة العابرة." },
            { id: 41, level: "الفهم", section: "الموجات والصوت", text: "نرى ضوء الشمس ولا نسمع أصوات الانفجارات الشمسية لأن:", options: [ { id: 'A', text: "الصوت يحتاج لوسط مادي والضوء لا يحتاج" }, { id: 'B', text: "سرعة الصوت أسرع من الضوء" }, { id: 'C', text: "طول موجة الصوت قصير جداً" }, { id: 'D', text: "الضوء موجة ميكانيكية" } ], correctOption: 'A', explanation: "الفراغ الكوني يمنع انتقال موجات الصوت الميكانيكية، لكنه يسمح بمرور الضوء الكهرومغناطيسي." },
            { id: 42, level: "التقييم", section: "الموجات والصوت", text: "إذا سقط شعاع صوتي بزاوية 50 درجة مع السطح العاكس، فإن زاوية الانعكاس تساوي:", options: [ { id: 'A', text: "50 درجة" }, { id: 'B', text: "40 درجة" }, { id: 'C', text: "90 درجة" }, { id: 'D', text: "100 درجة" } ], correctOption: 'B', explanation: "زاوية السقوط (مع العمود) = 90 - 50 = 40. وبما أن الانعكاس = السقوط، فالزاوية 40." },
            { id: 43, level: "التذكر", section: "الموجات والصوت", text: "المسافة بين عقدة وبطن تالية في الموجة الموقوفة تساوي:", options: [ { id: 'A', text: "طول موجي" }, { id: 'B', text: "نصف طول موجي" }, { id: 'C', text: "ربع طول موجي" }, { id: 'D', text: "ثلاثة أرباع طول موجي" } ], correctOption: 'C', explanation: "القطاع (بين عقدتين) = نصف موجة، والبطن في المنتصف، إذن المسافة للعقدة = ربع موجة." },
            { id: 44, level: "التطبيق", section: "الموجات والصوت", text: "وتر مشدود يصدر نغمة أساسية ترددها 25 Hz. كم يكون تردد النغمة التوافقية الثانية؟", options: [ { id: 'A', text: "25 Hz" }, { id: 'B', text: "50 Hz" }, { id: 'C', text: "75 Hz" }, { id: 'D', text: "100 Hz" } ], correctOption: 'C', explanation: "تردد التوافقية الثانية (3 قطاعات) يساوي 3 × التردد الأساسي = 3 × 25 = 75 Hz." },
            { id: 45, level: "التقييم", section: "الموجات والصوت", text: "عند تداخل موجتين، إذا كانت الإزاحة الكلية تساوي طرح الإزاحتين، فهذا يسمى:", options: [ { id: 'A', text: "تداخل بنّاء" }, { id: 'B', text: "تداخل هدّام" }, { id: 'C', text: "حيود" }, { id: 'D', text: "انكسار" } ], correctOption: 'B', explanation: "في التداخل الهدام تلتقي قمة مع قاع فتُطرح الإزاحات وتضعف الموجة." },
            
            // --- القسم الثالث: الكهرباء الساكنة (46 - 65) ---
            { id: 46, level: "التذكر", section: "الكهرباء الساكنة", text: "ينص مبدأ حفظ الشحنة على أن:", options: [ { id: 'A', text: "الشحنات لا تفنى ولا تستحدث بل تنتقل من مادة لأخرى" }, { id: 'B', text: "الشحنة الإجمالية يمكن تدميرها بالحرارة" }, { id: 'C', text: "الشحنات الموجبة فقط هي التي تنتقل" }, { id: 'D', text: "المادة العازلة لا تحفظ شحنتها" } ], correctOption: 'A', explanation: "هذا هو نص مبدأ حفظ الشحنة." },
            { id: 47, level: "الفهم", section: "الكهرباء الساكنة", text: "عندما تفقد الذرة المتعادلة إلكتروناً أو أكثر فإنها تصبح:", options: [ { id: 'A', text: "أيوناً سالباً" }, { id: 'B', text: "أيوناً موجباً" }, { id: 'C', text: "نظيراً مشعاً" }, { id: 'D', text: "فائقة التوصيل" } ], correctOption: 'B', explanation: "بفقدان الشحنة السالبة، يطغى عدد البروتونات الموجبة فتصبح الذرة أيوناً موجباً." },
            { id: 48, level: "الفهم", section: "الكهرباء الساكنة", text: "عند دلك ساق من المطاط بقطعة فرو، تصبح شحنة المطاط:", options: [ { id: 'A', text: "موجبة لفقده بروتونات" }, { id: 'B', text: "سالبة لاكتسابه إلكترونات" }, { id: 'C', text: "موجبة لاكتسابه بروتونات" }, { id: 'D', text: "سالبة لفقده إلكترونات" } ], correctOption: 'B', explanation: "المطاط يميل لاكتساب الإلكترونات من الفرو، فيُشحن بشحنة سالبة." },
            { id: 49, level: "التذكر", section: "الكهرباء الساكنة", text: "الشحنة الكهربائية التي يحملها أي جسم هي مضاعفات عددية صحيحة لشحنة:", options: [ { id: 'A', text: "البروتون فقط" }, { id: 'B', text: "الإلكترون" }, { id: 'C', text: "النيوترون" }, { id: 'D', text: "الكولوم" } ], correctOption: 'B', explanation: "لأن الإلكترون هو أصغر وحدة شحنة سالبة حرة يمكن انتقالها بين المواد." },
            { id: 50, level: "التذكر", section: "الكهرباء الساكنة", text: "الأداة المستخدمة لاكتشاف الشحنة الكهربائية ونوعها هي:", options: [ { id: 'A', text: "الأميتر" }, { id: 'B', text: "الفولتميتر" }, { id: 'C', text: "الكشاف الكهربائي" }, { id: 'D', text: "الأوميتر" } ], correctOption: 'C', explanation: "الكشاف الكهربائي (الإلكتروسكوب) مصمم خصيصاً للكشف عن الكهرباء الساكنة." },
            { id: 51, level: "التطبيق", section: "الكهرباء الساكنة", text: "حسب قانون كولوم، تتناسب القوة الكهربائية المتبادلة بين شحنتين:", options: [ { id: 'A', text: "طردياً مع المسافة بينهما" }, { id: 'B', text: "عكسياً مع حاصل ضرب الشحنتين" }, { id: 'C', text: "طردياً مع حاصل ضربهما وعكسياً مع مربع المسافة" }, { id: 'D', text: "طردياً مع مربع المسافة" } ], correctOption: 'C', explanation: "صيغة قانون كولوم هي F = k(q1*q2)/d²." },
            { id: 52, level: "التطبيق", section: "الكهرباء الساكنة", text: "إذا قلّت المسافة بين شحنتين كهربائيتين إلى النصف، فإن القوة المتبادلة بينهما:", options: [ { id: 'A', text: "تقل للنصف" }, { id: 'B', text: "تزداد للضعف" }, { id: 'C', text: "تقل للربع" }, { id: 'D', text: "تزداد إلى أربعة أمثالها" } ], correctOption: 'D', explanation: "بما أن القوة تتناسب عكسياً مع مربع المسافة (1 / (1/2)² = 4)." },
            { id: 53, level: "التحليل", section: "الكهرباء الساكنة", text: "القوة الكهربائية بين جسم A شحنته (+2) وجسم B شحنته (+6) هي F. القوة من B على A تساوي:", options: [ { id: 'A', text: "3F" }, { id: 'B', text: "F/3" }, { id: 'C', text: "F في اتجاه معاكس" }, { id: 'D', text: "3F في اتجاه معاكس" } ], correctOption: 'C', explanation: "حسب قانون نيوتن الثالث، القوتان المتبادلتان متساويتان مقداراً ومتعاكستان اتجاهاً." },
            { id: 54, level: "الفهم", section: "الكهرباء الساكنة", text: "فقدان الكهرباء الساكنة بانتقال الشحنات بعيداً عن الجسم يسمى:", options: [ { id: 'A', text: "التفريغ الكهربائي" }, { id: 'B', text: "الحث الكهرومغناطيسي" }, { id: 'C', text: "الاستقطاب" }, { id: 'D', text: "التأريض الداخلي" } ], correctOption: 'A', explanation: "التفريغ الكهربائي هو تخلص الجسم من شحنته الزائدة (مثل حدوث شرارة)." },
            { id: 55, level: "التقييم", section: "الكهرباء الساكنة", text: "تُزوّد شاحنات نقل النفط بسلسلة معدنية تتدلى على الأرض لـ:", options: [ { id: 'A', text: "الحفاظ على توازن الشاحنة" }, { id: 'B', text: "تفريغ الشحنات المتراكمة ومنع الحرائق" }, { id: 'C', text: "زيادة الاحتكاك مع الطريق" }, { id: 'D', text: "توليد تيار كهربائي للشاحنة" } ], correctOption: 'B', explanation: "الاحتكاك يولد شحنات ساكنة خطرة قد تسبب شرارة، فالسلسلة تفرغها للأرض (تأريض)." },
            { id: 56, level: "التحليل", section: "الكهرباء الساكنة", text: "لا يمكن لشحنة جسم أن تكون مساوية لـ 100.5 من شحنة الإلكترون لأن:", options: [ { id: 'A', text: "شحنة الإلكترون موجبة" }, { id: 'B', text: "الشحنة مكماة ولا بد أن تكون مضاعفات صحيحة" }, { id: 'C', text: "البروتونات عددها أكبر" }, { id: 'D', text: "قانون كولوم يمنع ذلك" } ], correctOption: 'B', explanation: "مبدأ تكميم الشحنة يؤكد أن الإلكترون لا يتجزأ، فالشحنة الإجمالية هي مضاعفات عدد صحيح (n×e)." },
            { id: 57, level: "التطبيق", section: "الكهرباء الساكنة", text: "وضعت شحنتان على بعد 1 m فكانت القوة 90 N. إذا أصبح البعد 3 m، تصبح القوة:", options: [ { id: 'A', text: "10 N" }, { id: 'B', text: "30 N" }, { id: 'C', text: "270 N" }, { id: 'D', text: "810 N" } ], correctOption: 'A', explanation: "المسافة زادت 3 أضعاف، فتقل القوة 9 مرات (3²). إذن 90 / 9 = 10 N." },
            { id: 58, level: "الفهم", section: "الكهرباء الساكنة", text: "عند تلامس جسم متعادل مع جسم مشحون بشحنة سالبة، فإن الجسم المتعادل:", options: [ { id: 'A', text: "يكتسب شحنة موجبة" }, { id: 'B', text: "يحتفظ بتعادله" }, { id: 'C', text: "يكتسب شحنة سالبة" }, { id: 'D', text: "يفقد بروتونات" } ], correctOption: 'C', explanation: "الشحن باللمس (التوصيل) ينقل جزءاً من الإلكترونات الزائدة للمتعادل، فيشحن بنفس النوع." },
            { id: 59, level: "التحليل", section: "الكهرباء الساكنة", text: "ثلاث شحنات موجبة (q1, q2, q3) على استقامة واحدة. q3 في المنتصف. إذا كانت q1=q2، فمحصلة القوة على q3:", options: [ { id: 'A', text: "تتجه يميناً" }, { id: 'B', text: "تتجه يساراً" }, { id: 'C', text: "تساوي صفر" }, { id: 'D', text: "تتضاعف مرتين" } ], correctOption: 'C', explanation: "القوتان التنافريتان المؤثرتان على q3 متساويتان في المقدار ومتعاكستان فتلغيان بعضهما." },
            { id: 60, level: "التقييم", section: "الكهرباء الساكنة", text: "الطاقة اللازمة لنزع إلكترون من المستوى الخارجي أقل من الداخلي لأن:", options: [ { id: 'A', text: "الإلكترون الخارجي أثقل" }, { id: 'B', text: "الإلكترون الداخلي أسرع" }, { id: 'C', text: "ترابط الإلكترونات الخارجية بالنواة أضعف لبعدها" }, { id: 'D', text: "النواة تتنافر مع الإلكترونات الخارجية" } ], correctOption: 'C', explanation: "كلما ابتعد الإلكترون عن النواة الموجبة، قلّت قوة الجذب الكهربائي وفقاً لقانون كولوم." },
            { id: 61, level: "التطبيق", section: "الكهرباء الساكنة", text: "شحنتان نقطيتان القوة بينهما 5 N. إذا زيدت إحداهما لمثليها، تصبح القوة:", options: [ { id: 'A', text: "2.5 N" }, { id: 'B', text: "5 N" }, { id: 'C', text: "10 N" }, { id: 'D', text: "20 N" } ], correctOption: 'C', explanation: "القوة تتناسب طردياً مع كل شحنة. مضاعفة شحنة تضاعف القوة (5 × 2 = 10)." },
            { id: 62, level: "التذكر", section: "الكهرباء الساكنة", text: "الشحنات الكهربائية المختلفة في النوع:", options: [ { id: 'A', text: "تتنافر" }, { id: 'B', text: "تتجاذب" }, { id: 'C', text: "تتلاشى" }, { id: 'D', text: "لا تتأثر" } ], correctOption: 'B', explanation: "القاعدة الأساسية: الشحنات المتشابهة تتنافر والمختلفة تتجاذب." },
            { id: 63, level: "الفهم", section: "الكهرباء الساكنة", text: "عند دلك زجاج بحرير، يشحن الزجاج بشحنة موجبة لأن الزجاج:", options: [ { id: 'A', text: "مأخوذ من الرمل" }, { id: 'B', text: "يكتسب إلكترونات" }, { id: 'C', text: "يفقد إلكترونات للحرير" }, { id: 'D', text: "يفقد بروتونات" } ], correctOption: 'C', explanation: "لأن ميله لاكتساب الإلكترونات أقل من الحرير، فيفقد إلكتروناته للحرير." },
            { id: 64, level: "التحليل", section: "الكهرباء الساكنة", text: "ميل الخط البياني الذي يمثل القوة الكهربائية بين شحنتين (F) ومقلوب مربع المسافة (1/d²):", options: [ { id: 'A', text: "خط مستقيم يمر بنقطة الأصل" }, { id: 'B', text: "منحنى عكسي" }, { id: 'C', text: "خط أفقي" }, { id: 'D', text: "منحنى أسي" } ], correctOption: 'A', explanation: "لأن F تتناسب طردياً مع (1/d²)، فتمثيلها البياني هو خط مستقيم." },
            { id: 65, level: "التقييم", section: "الكهرباء الساكنة", text: "لماذا ينفرج ورقتا الكشاف الكهربائي عند ملامسة جسم مشحون لقرصه؟", options: [ { id: 'A', text: "لانعدام الشحنات" }, { id: 'B', text: "لانتقال شحنتين مختلفتين للورقتين" }, { id: 'C', text: "لانتقال شحنة من نفس النوع للورقتين فَتَتَنافران" }, { id: 'D', text: "بسبب ضغط الهواء" } ], correctOption: 'C', explanation: "تنتشر الشحنة عبر الساق للورقتين، ولأنهما تحملان نفس الشحنة فإنهما تتنافران." },
            
            // --- القسم الرابع: التيار الكهربائي والدوائر (66 - 100) ---
            { id: 66, level: "التذكر", section: "التيار والمقاومة", text: "سريان الشحنات الكهربائية في موصل يُعرف بـ:", options: [ { id: 'A', text: "فرق الجهد" }, { id: 'B', text: "المقاومة الكهربائية" }, { id: 'C', text: "التيار الكهربائي" }, { id: 'D', text: "القدرة" } ], correctOption: 'C', explanation: "هذا هو التعريف المبسط للتيار الكهربائي المار في الأسلاك." },
            { id: 67, level: "التذكر", section: "التيار والمقاومة", text: "كمية الشحنات التي تمر خلال أي مقطع في الثانية الواحدة:", options: [ { id: 'A', text: "شدة التيار الكهربائي" }, { id: 'B', text: "الأوم" }, { id: 'C', text: "الفولت" }, { id: 'D', text: "الطاقة" } ], correctOption: 'A', explanation: "هذا هو التعريف الرياضي (I = q/t)." },
            { id: 68, level: "التطبيق", section: "التيار والمقاومة", text: "شحنة مقدارها 600 C تمر عبر موصل في دقيقة واحدة، شدة التيار تساوي:", options: [ { id: 'A', text: "600 A" }, { id: 'B', text: "10 A" }, { id: 'C', text: "60 A" }, { id: 'D', text: "36000 A" } ], correctOption: 'B', explanation: "I = q/t = 600 / 60 ثانية = 10 أمبير." },
            { id: 69, level: "الفهم", section: "التيار والمقاومة", text: "في الموصلات الصلبة، ناقلات الشحنة هي:", options: [ { id: 'A', text: "البروتونات" }, { id: 'B', text: "الأيونات الموجبة والسالبة" }, { id: 'C', text: "إلكترونات التوصيل (الحرة)" }, { id: 'D', text: "النيوترونات" } ], correctOption: 'C', explanation: "الإلكترونات الحرة في المدارات الخارجية هي التي تتحرك وتشكل التيار في الفلزات." },
            { id: 70, level: "التذكر", section: "التيار والمقاومة", text: "جهاز قياس فرق الجهد الكهربائي ويوصل في الدائرة على التوازي:", options: [ { id: 'A', text: "الأميتر" }, { id: 'B', text: "الفولتميتر" }, { id: 'C', text: "الأوميتر" }, { id: 'D', text: "الميكرومتر" } ], correctOption: 'B', explanation: "الفولتميتر يقيس فرق الجهد ويجب أن يوصل بالتوازي مع المكوّن." },
            { id: 71, level: "التطبيق", section: "التيار والمقاومة", text: "بطارية تبذل شغلاً 27 J لنقل شحنة 3 C. فرق الجهد يساوي:", options: [ { id: 'A', text: "9 V" }, { id: 'B', text: "81 V" }, { id: 'C', text: "30 V" }, { id: 'D', text: "0.11 V" } ], correctOption: 'A', explanation: "V = E / q = 27 / 3 = 9 V." },
            { id: 72, level: "التذكر", section: "التيار والمقاومة", text: "الإعاقة التي تواجهها الإلكترونات بسبب تصادمها بذرات الفلز تسمى:", options: [ { id: 'A', text: "شدة التيار" }, { id: 'B', text: "المقاومة الكهربائية" }, { id: 'C', text: "الجهد" }, { id: 'D', text: "القدرة" } ], correctOption: 'B', explanation: "هذا هو التفسير المجهري لسبب وجود المقاومة في الأسلاك." },
            { id: 73, level: "التحليل", section: "التيار والمقاومة", text: "ينص قانون أوم على أن فرق الجهد يتناسب طردياً مع شدة التيار عند ثبات:", options: [ { id: 'A', text: "الزمن" }, { id: 'B', text: "الشحنة" }, { id: 'C', text: "درجة الحرارة" }, { id: 'D', text: "نوع المادة فقط" } ], correctOption: 'C', explanation: "ثبوت درجة الحرارة شرط أساسي لأن المقاومة تتغير بتغير الحرارة." },
            { id: 74, level: "الفهم", section: "التيار والمقاومة", text: "مقاومة الأسلاك الطويلة مقارنة بالأسلاك القصيرة (من نفس النوع والسمك):", options: [ { id: 'A', text: "أقل" }, { id: 'B', text: "أكبر" }, { id: 'C', text: "متساوية" }, { id: 'D', text: "تساوي صفر" } ], correctOption: 'B', explanation: "كلما زاد الطول زادت فرصة تصادم الإلكترونات بالذرات فترتفع المقاومة (طردي)." },
            { id: 75, level: "التحليل", section: "التيار والمقاومة", text: "إذا زادت مساحة مقطع سلك إلى المثلين، فإن مقاومته الكهربائية:", options: [ { id: 'A', text: "تزداد للمثلين" }, { id: 'B', text: "لا تتغير" }, { id: 'C', text: "تقل للنصف" }, { id: 'D', text: "تزداد 4 أمثال" } ], correctOption: 'C', explanation: "المقاومة تتناسب عكسياً مع مساحة المقطع. زيادة المساحة توسع مسار التيار فتقل المقاومة." },
            { id: 76, level: "الفهم", section: "التيار والمقاومة", text: "المقاومة النوعية لمادة تعتمد على درجة الحرارة و:", options: [ { id: 'A', text: "طول السلك" }, { id: 'B', text: "مساحة المقطع" }, { id: 'C', text: "شكل الموصل" }, { id: 'D', text: "نوع المادة" } ], correctOption: 'D', explanation: "المقاومية (المقاومة النوعية) خاصية فيزيائية للمادة لا تعتمد على الأبعاد." },
            { id: 77, level: "التذكر", section: "التيار والمقاومة", text: "المواد التي تنعدم مقاومتها عند تبريدها لدرجات حرارة منخفضة جداً:", options: [ { id: 'A', text: "أشباه الموصلات" }, { id: 'B', text: "العوازل" }, { id: 'C', text: "المواد فائقة التوصيل" }, { id: 'D', text: "المقاومات الأومية" } ], correctOption: 'C', explanation: "هذه ميزة المواد فائقة التوصيل حيث يتدفق التيار بلا مقاومة ولا حرارة." },
            { id: 78, level: "التطبيق", section: "التيار والمقاومة", text: "مدفأة يمر بها تيار 6 A وفرق الجهد 240 V. مقاومة المدفأة تساوي:", options: [ { id: 'A', text: "40 Ω" }, { id: 'B', text: "1440 Ω" }, { id: 'C', text: "0.025 Ω" }, { id: 'D', text: "246 Ω" } ], correctOption: 'A', explanation: "حسب قانون أوم: R = V / I = 240 / 6 = 40 Ω." },
            { id: 79, level: "التحليل", section: "التيار والمقاومة", text: "ميل الخط البياني لفرق الجهد (V) على المحور الرأسي وشدة التيار (I) على المحور الأفقي يمثل:", options: [ { id: 'A', text: "المقاومة الكهربائية" }, { id: 'B', text: "الشحنة" }, { id: 'C', text: "الزمن" }, { id: 'D', text: "القدرة" } ], correctOption: 'A', explanation: "الميل = ΔV / ΔI = R (المقاومة)." },
            { id: 80, level: "التطبيق", section: "التيار والمقاومة", text: "موصل طوله 0.5 m ومساحته 2x10^-4 m² ومقاومته 4 Ω. مقاومته النوعية:", options: [ { id: 'A', text: "16x10^-4 Ω.m" }, { id: 'B', text: "1x10^-4 Ω.m" }, { id: 'C', text: "8x10^-4 Ω.m" }, { id: 'D', text: "4x10^-4 Ω.m" } ], correctOption: 'A', explanation: "ρ = R*A / L = (4 * 2x10^-4) / 0.5 = 16x10^-4 Ω.m." },
            { id: 81, level: "التذكر", section: "القدرة والدوائر", text: "معدل تحول الطاقة الكهربائية إلى أشكال أخرى (شغل/زمن) هو:", options: [ { id: 'A', text: "الجهد" }, { id: 'B', text: "المقاومة" }, { id: 'C', text: "التيار" }, { id: 'D', text: "القدرة الكهربائية" } ], correctOption: 'D', explanation: "القدرة هي الشغل المبذول أو الطاقة المستهلكة خلال وحدة الزمن." },
            { id: 82, level: "التذكر", section: "القدرة والدوائر", text: "الوحدة التجارية لقياس الطاقة الكهربائية المستهلكة في المنازل هي:", options: [ { id: 'A', text: "الوات (W)" }, { id: 'B', text: "الجول (J)" }, { id: 'C', text: "الكيلووات-ساعة (kW.h)" }, { id: 'D', text: "الأمبير" } ], correctOption: 'C', explanation: "عدادات الكهرباء المنزلية تحسب الطاقة بالكيلووات-ساعة." },
            { id: 83, level: "التطبيق", section: "القدرة والدوائر", text: "آلة حاسبة تعمل على جهد 8 V وتيار 0.1 A. قدرتها تساوي:", options: [ { id: 'A', text: "80 W" }, { id: 'B', text: "0.8 W" }, { id: 'C', text: "8 W" }, { id: 'D', text: "0.0125 W" } ], correctOption: 'B', explanation: "P = V * I = 8 * 0.1 = 0.8 W." },
            { id: 84, level: "التطبيق", section: "القدرة والدوائر", text: "جهاز قدرته 100 W عَمِل لمدة 5 ثوانٍ، الطاقة المستهلكة بالجول هي:", options: [ { id: 'A', text: "20 J" }, { id: 'B', text: "500 J" }, { id: 'C', text: "105 J" }, { id: 'D', text: "0.05 J" } ], correctOption: 'B', explanation: "E = P * t = 100 W * 5 s = 500 J." },
            { id: 85, level: "الفهم", section: "القدرة والدوائر", text: "عند توصيل المقاومات على التوالي، فإن شدة التيار المار:", options: [ { id: 'A', text: "متساوية في جميع المقاومات" }, { id: 'B', text: "تتوزع بنسبة طردية" }, { id: 'C', text: "تتوزع بنسبة عكسية" }, { id: 'D', text: "تعتمد على الجهد المار" } ], correctOption: 'A', explanation: "في التوالي يوجد مسار واحد للإلكترونات، لذا فالتيار ثابت في كل أجزاء الدائرة." },
            { id: 86, level: "الفهم", section: "القدرة والدوائر", text: "عند توصيل المقاومات على التوازي، فإن فرق الجهد:", options: [ { id: 'A', text: "يتجزأ على المقاومات" }, { id: 'B', text: "متساوي بين طرفي جميع المقاومات" }, { id: 'C', text: "ينعدم" }, { id: 'D', text: "يزداد بتزايد عدد المقاومات" } ], correctOption: 'B', explanation: "في التوصيل على التوازي تشترك جميع الفروع في نفس نقطتي البداية والنهاية، فالجهد متساوي." },
            { id: 87, level: "التحليل", section: "القدرة والدوائر", text: "المقاومة المكافئة لمجموعة مقاومات موصلة على التوازي تكون:", options: [ { id: 'A', text: "أصغر من أصغر مقاومة فيها" }, { id: 'B', text: "أكبر من أكبر مقاومة فيها" }, { id: 'C', text: "مساوية لمجموعها" }, { id: 'D', text: "تساوي المتوسط الحسابي" } ], correctOption: 'A', explanation: "لأن إضافة مسارات (أفرع) جديدة يسهل مرور التيار ويقلل المقاومة الكلية." },
            { id: 88, level: "التطبيق", section: "القدرة والدوائر", text: "ثلاث مقاومات (2Ω, 6Ω, 4Ω) متصلة على التوالي. المقاومة المكافئة:", options: [ { id: 'A', text: "1.09 Ω" }, { id: 'B', text: "12 Ω" }, { id: 'C', text: "4 Ω" }, { id: 'D', text: "24 Ω" } ], correctOption: 'B', explanation: "في التوالي نجمع المقاومات جمعاً جبرياً: 2 + 6 + 4 = 12 Ω." },
            { id: 89, level: "التطبيق", section: "القدرة والدوائر", text: "مقاومتان 20Ω و 20Ω متصلتان على التوازي، المقاومة المكافئة:", options: [ { id: 'A', text: "40 Ω" }, { id: 'B', text: "20 Ω" }, { id: 'C', text: "10 Ω" }, { id: 'D', text: "5 Ω" } ], correctOption: 'C', explanation: "1/R = 1/20 + 1/20 = 2/20 = 1/10. إذن R = 10 Ω." },
            { id: 90, level: "التقييم", section: "القدرة والدوائر", text: "تُوصل الأجهزة الكهربائية في المنازل على التوازي لأنه:", options: [ { id: 'A', text: "يستهلك طاقة أقل" }, { id: 'B', text: "يزيد المقاومة الكلية للمنزل" }, { id: 'C', text: "عند تعطل جهاز لا ينقطع التيار عن الباقي" }, { id: 'D', text: "لتغيير فرق الجهد لكل جهاز" } ], correctOption: 'C', explanation: "كل جهاز يكون له دائرة مغلقة خاصة به مع المصدر، ولا يؤثر على غيره." },
            { id: 91, level: "التقييم", section: "القدرة والدوائر", text: "إذا تلف مصباح متصل مع آخرين على التوالي، فإن بقية المصابيح:", options: [ { id: 'A', text: "تزداد إضاءتها" }, { id: 'B', text: "تقل إضاءتها" }, { id: 'C', text: "تنطفئ جميعها" }, { id: 'D', text: "لا تتأثر" } ], correctOption: 'C', explanation: "انقطاع الفتيل يفتح الدائرة الكهربائية الوحيدة، فيتوقف تدفق التيار بالكامل." },
            { id: 92, level: "التحليل", section: "القدرة والدوائر", text: "في دائرة التوالي، فرق الجهد الكلي يساوي:", options: [ { id: 'A', text: "مجموع فروق الجهد بين طرفي كل مقاومة" }, { id: 'B', text: "فرق الجهد الأصغر" }, { id: 'C', text: "ثابت لجميع المقاومات" }, { id: 'D', text: "حاصل ضرب فروق الجهد" } ], correctOption: 'A', explanation: "حسب قانون حفظ الطاقة، الجهد الكلي يتجزأ ويُجمع (V = V1 + V2 + ...)." },
            { id: 93, level: "التطبيق", section: "القدرة والدوائر", text: "دائرة بها مقاومتان 4Ω و 4Ω على التوازي، متصلتان على التوالي مع مقاومة 3Ω. المقاومة الكلية:", options: [ { id: 'A', text: "11 Ω" }, { id: 'B', text: "5 Ω" }, { id: 'C', text: "7 Ω" }, { id: 'D', text: "3.5 Ω" } ], correctOption: 'B', explanation: "مكافئة التوازي (4 و4) = 2. نجمعها توالي مع 3 = 2 + 3 = 5 Ω." },
            { id: 94, level: "الإبداع", section: "القدرة والدوائر", text: "للحصول على أقل مقاومة مكافئة من 4 مقاومات متماثلة، يجب توصيلها:", options: [ { id: 'A', text: "جميعاً على التوالي" }, { id: 'B', text: "جميعاً على التوازي" }, { id: 'C', text: "مختلط (توالي وتوازي)" }, { id: 'D', text: "استخدام مقاومتين فقط" } ], correctOption: 'B', explanation: "التوصيل على التوازي دائماً يعطي مقاومة مكافئة أقل من أي مقاومة مفردة." },
            { id: 95, level: "التطبيق", section: "القدرة والدوائر", text: "مدفأة تسحب تيار 4 A ومقاومتها 55 Ω. القدرة المستهلكة تساوي:", options: [ { id: 'A', text: "220 W" }, { id: 'B', text: "880 W" }, { id: 'C', text: "13.75 W" }, { id: 'D', text: "3025 W" } ], correctOption: 'B', explanation: "P = I² * R = 4² * 55 = 16 * 55 = 880 W." },
            { id: 96, level: "الفهم", section: "التيار والمقاومة", text: "المولدات تقوم بتحويل الطاقة:", options: [ { id: 'A', text: "الكهربائية لميكانيكية" }, { id: 'B', text: "الميكانيكية لكهربائية" }, { id: 'C', text: "الكيميائية لكهربائية" }, { id: 'D', text: "الحرارية لضوئية" } ], correctOption: 'B', explanation: "المولد (الدينامو) يحول الحركة (ميكانيكا) إلى كهرباء (بطاريات تحول كيميائية لكهربائية)." },
            { id: 97, level: "التقييم", section: "القدرة والدوائر", text: "تختلف شدة إضاءة مصباحين متصلين بنفس الجهد بسبب اختلاف:", options: [ { id: 'A', text: "قدرتهما الكهربائية (المقاومة)" }, { id: 'B', text: "الزمن المستغرق" }, { id: 'C', text: "نوع التوصيل" }, { id: 'D', text: "مصدر الجهد" } ], correctOption: 'A', explanation: "القدرة (P = V²/R) تختلف باختلاف المقاومة، مما يعطي إضاءة (طاقة مستهلكة) مختلفة." },
            { id: 98, level: "التطبيق", section: "القدرة والدوائر", text: "مصباح مكتوب عليه (240V, 60W). ما أقصى تيار لفتيلته؟", options: [ { id: 'A', text: "4 A" }, { id: 'B', text: "0.25 A" }, { id: 'C', text: "14400 A" }, { id: 'D', text: "2 A" } ], correctOption: 'B', explanation: "I = P / V = 60 / 240 = 0.25 A." },
            { id: 99, level: "التحليل", section: "القدرة والدوائر", text: "عند زيادة عدد المقاومات الموصولة على التوازي، فإن التيار الكلي الخارج من البطارية:", options: [ { id: 'A', text: "يقل" }, { id: 'B', text: "تزداد مقاومته" }, { id: 'C', text: "ينعدم" }, { id: 'D', text: "يزداد" } ], correctOption: 'D', explanation: "بإضافة مسارات للتوازي، تقل المقاومة الكلية، وبالتالي يزداد سحب التيار من المصدر." },
            { id: 100, level: "التحليل", section: "القدرة والدوائر", text: "إذا كانت القدرة P والمقاومة R، فإن العلاقة P = I² R تدل على أن القدرة المستهلكة:", options: [ { id: 'A', text: "تتناسب طردياً مع مربع الجهد" }, { id: 'B', text: "تتناسب طردياً مع مربع التيار عند ثبات المقاومة" }, { id: 'C', text: "تتناسب عكسياً مع التيار" }, { id: 'D', text: "لا تعتمد على المقاومة" } ], correctOption: 'B', explanation: "المعادلة P=I²R توضح أن القدرة (كالحرارة المتولدة) تتناسب طردياً مع مربع التيار." }
        ];

        // --- المتغيرات وحالة التطبيق ---
        let hasStarted = false;
        let currentQuestionIndex = 0;
        let selectedAnswer = null;
        let score = 0;
        let showResults = false;
        let selectedSection = null;
        let filteredQuestions = [];

        // --- دوال التحكم في التطبيق ---
        window.handleStart = function(section) {
            selectedSection = section;
            hasStarted = true;
            currentQuestionIndex = 0;
            score = 0;
            showResults = false;
            selectedAnswer = null;
            
            // تصفية الأسئلة بناءً على القسم (أو عرض الكل إذا كان section يساوي null)
            filteredQuestions = selectedSection 
                ? questionsData.filter(q => q.section === selectedSection) 
                : questionsData;
            
            render();
        };

        window.handleSelectOption = function(optionId) {
            if (selectedAnswer !== null) return; // منع التحديد إذا تمت الإجابة
            
            selectedAnswer = optionId;
            const currentQuestion = filteredQuestions[currentQuestionIndex];
            
            if (optionId === currentQuestion.correctOption) {
                score++;
            }
            
            render();
        };

        window.handleNextQuestion = function() {
            if (currentQuestionIndex < filteredQuestions.length - 1) {
                currentQuestionIndex++;
                selectedAnswer = null;
            } else {
                showResults = true;
            }
            render();
        };

        window.handleRestart = function() {
            hasStarted = false;
            selectedSection = null;
            render();
        };

        // --- دالة رسم وعرض الواجهة ---
        function render() {
            const app = document.getElementById('app');
            let html = '';

            // 1. شاشة البداية (اختيار الدرس)
            if (!hasStarted) {
                // استخراج أسماء الأقسام بدون تكرار
                const sections = [...new Set(questionsData.map(q => q.section))];
                
                let sectionsHtml = sections.map(section => {
                    const questionsCount = questionsData.filter(q => q.section === section).length;
                    return `
                        <button onclick="handleStart('${section}')" class="w-full flex items-center justify-between p-5 bg-white border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 rounded-2xl transition duration-200 text-right group">
                            <span class="font-bold text-lg text-slate-700 group-hover:text-blue-700">${section}</span>
                            <span class="text-sm bg-slate-100 group-hover:bg-white px-4 py-1.5 rounded-full text-slate-600 font-bold transition">
                                ${questionsCount} سؤال
                            </span>
                        </button>
                    `;
                }).join('');

                html = `
                    <div class="max-w-2xl w-full mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 p-8 md:p-12 space-y-8 mt-12">
                        <div class="text-center space-y-3">
                            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mb-2">
                                <i data-lucide="book-open" class="w-8 h-8"></i>
                            </div>
                            <h1 class="text-3xl md:text-4xl font-black text-slate-800">الاختبار الإلكتروني</h1>
                            <h2 class="text-xl md:text-2xl font-bold text-slate-600">فيزياء الصف العاشر</h2>
                            <p class="text-slate-500 font-medium pt-2">إعداد الموجه الفني للفيزياء: أ/ وليد عزت</p>
                        </div>
                        
                        <div class="space-y-6">
                            <p class="text-lg font-medium text-slate-700 text-center bg-slate-50 p-4 rounded-xl">
                                مرحباً بك في بنك الأسئلة التفاعلي. الرجاء اختيار الدرس الذي ترغب في اختبار نفسك به، أو اختر الاختبار الشامل.
                            </p>
                            
                            <div class="grid gap-3">
                                ${sectionsHtml}
                            </div>
                            
                            <div class="pt-4 border-t border-slate-100">
                                <button onclick="handleStart(null)" class="w-full flex items-center justify-center gap-3 px-8 py-5 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-bold text-xl transition duration-200 shadow-lg hover:shadow-xl hover:-translate-y-1">
                                    بدء الاختبار الشامل (جميع الدروس - ${questionsData.length} سؤال)
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } 
            // 2. شاشة النتيجة النهائية
            else if (showResults) {
                const percentage = Math.round((score / filteredQuestions.length) * 100);
                const colorClass = percentage >= 50 ? 'text-green-600' : 'text-red-600';
                
                html = `
                    <div class="max-w-2xl w-full mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 p-8 md:p-12 text-center space-y-8 mt-12">
                        <i data-lucide="award" class="w-24 h-24 text-yellow-500 mx-auto"></i>
                        
                        <div class="space-y-2">
                            <h2 class="text-3xl font-black text-slate-800">النتيجة النهائية</h2>
                            ${selectedSection ? `<p class="text-lg text-slate-500 font-medium">في درس: ${selectedSection}</p>` : ''}
                        </div>

                        <div class="py-8 bg-slate-50 rounded-2xl border border-slate-100">
                            <div class="text-7xl font-black ${colorClass}">
                                ${percentage}%
                            </div>
                            <p class="text-xl text-slate-600 mt-4 font-medium">
                                أجبت بشكل صحيح على <span class="font-bold text-slate-800 mx-1">${score}</span> من أصل <span class="font-bold text-slate-800 mx-1">${filteredQuestions.length}</span> سؤال.
                            </p>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 justify-center pt-4">
                            <button onclick="handleStart(${selectedSection ? `'${selectedSection}'` : 'null'})" class="flex-1 flex items-center justify-center gap-2 px-6 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg transition duration-200 shadow-lg">
                                <i data-lucide="rotate-ccw" class="w-5 h-5"></i> إعادة نفس الاختبار
                            </button>
                            
                            <button onclick="handleRestart()" class="flex-1 flex items-center justify-center gap-2 px-6 py-4 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-2xl font-bold text-lg transition duration-200">
                                <i data-lucide="arrow-left" class="w-5 h-5"></i> اختيار درس آخر
                            </button>
                        </div>
                    </div>
                `;
            } 
            // 3. شاشة الأسئلة (أثناء الاختبار)
            else {
                const currentQuestion = filteredQuestions[currentQuestionIndex];
                const progressPercentage = ((currentQuestionIndex) / filteredQuestions.length) * 100;

                // بناء خيارات الإجابة
                let optionsHtml = currentQuestion.options.map(option => {
                    let btnClass = "bg-white text-slate-800 border-slate-200 hover:border-blue-500 hover:bg-blue-50 cursor-pointer";
                    let iconHtml = '';
                    let numClass = "bg-slate-50 border-slate-200 text-slate-400 group-hover:border-blue-300 group-hover:text-blue-600";
                    
                    if (selectedAnswer !== null) {
                        btnClass = "bg-white text-slate-400 border-slate-200 opacity-60 cursor-default";
                        numClass = "border-transparent";
                        
                        if (option.id === currentQuestion.correctOption) {
                            btnClass = "bg-green-100 text-green-800 border-green-500 font-bold opacity-100";
                            iconHtml = `<i data-lucide="check-circle" class="w-7 h-7 text-green-600"></i>`;
                        } else if (option.id === selectedAnswer) {
                            btnClass = "bg-red-100 text-red-800 border-red-500 opacity-100";
                            iconHtml = `<i data-lucide="x-circle" class="w-7 h-7 text-red-600"></i>`;
                        }
                    }

                    return `
                        <button ${selectedAnswer !== null ? 'disabled' : `onclick="handleSelectOption('${option.id}')"`} class="w-full text-right p-5 rounded-2xl border-2 transition-all duration-200 flex items-center justify-between group ${btnClass}">
                            <span class="flex items-center gap-4">
                                <span class="w-10 h-10 flex items-center justify-center rounded-xl border-2 font-black text-lg ${numClass}">
                                    ${option.id}
                                </span>
                                <span class="text-lg md:text-xl font-medium">${option.text}</span>
                            </span>
                            ${iconHtml}
                        </button>
                    `;
                }).join('');

                // بناء قسم التفسير (يظهر فقط بعد الإجابة)
                let explanationHtml = '';
                if (selectedAnswer !== null) {
                    const isCorrect = selectedAnswer === currentQuestion.correctOption;
                    explanationHtml = `
                        <div class="p-5 rounded-2xl border-2 flex items-start gap-4 mt-6 animate-pulse ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}" style="animation-iteration-count: 1;">
                            ${isCorrect ? `<i data-lucide="check-circle" class="w-8 h-8 text-green-600 shrink-0 mt-0.5"></i>` : `<i data-lucide="x-circle" class="w-8 h-8 text-red-600 shrink-0 mt-0.5"></i>`}
                            <div>
                                <h4 class="text-xl font-black mb-1 ${isCorrect ? 'text-green-800' : 'text-red-800'}">
                                    ${isCorrect ? 'إجابة صحيحة!' : 'إجابة خاطئة!'}
                                </h4>
                                <p class="text-slate-700 font-medium text-lg leading-relaxed mt-2">
                                    <span class="font-bold opacity-70">التفسير: </span>
                                    ${currentQuestion.explanation}
                                </p>
                            </div>
                        </div>
                    `;
                }

                // بناء زر "التالي" أو "الإنهاء"
                let nextBtnHtml = '';
                if (selectedAnswer !== null) {
                    const isLast = currentQuestionIndex >= filteredQuestions.length - 1;
                    nextBtnHtml = `
                        <div class="pt-4 border-t border-slate-100 mt-6">
                            <button onclick="handleNextQuestion()" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-xl transition duration-200 shadow-lg hover:shadow-xl hover:-translate-y-1">
                                ${isLast ? 'إنهاء وعرض النتيجة' : 'السؤال التالي'}
                            </button>
                        </div>
                    `;
                }

                html = `
                    <div class="max-w-3xl w-full mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden text-right mt-12">
                        
                        <!-- شريط التقدم -->
                        <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                            <span class="text-slate-600 font-bold">السؤال ${currentQuestionIndex + 1} من ${filteredQuestions.length}</span>
                            <span class="text-blue-600 font-black">${Math.round(progressPercentage)}% مكتمل</span>
                        </div>
                        <div class="h-2.5 w-full bg-slate-100">
                            <div class="h-full bg-blue-600 transition-all duration-500 ease-out" style="width: ${progressPercentage}%"></div>
                        </div>

                        <div class="p-6 md:p-8">
                            
                            <!-- ترويسة السؤال -->
                            <div class="flex flex-wrap gap-3 justify-between items-center text-sm font-medium text-slate-500 mb-8">
                                <span class="flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-lg">
                                    <i data-lucide="book-open" class="w-4 h-4"></i> ${currentQuestion.section}
                                </span>
                                <span class="flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-lg">
                                    <i data-lucide="layers" class="w-4 h-4"></i> مستوى بلوم: ${currentQuestion.level}
                                </span>
                            </div>

                            <!-- نص السؤال -->
                            <h2 class="text-2xl md:text-3xl font-bold text-slate-800 leading-relaxed md:leading-relaxed mb-6">
                                ${currentQuestion.text}
                            </h2>

                            <!-- الخيارات -->
                            <div class="space-y-3">
                                ${optionsHtml}
                            </div>

                            <!-- التفسير العلمي وزر التالي -->
                            ${explanationHtml}
                            ${nextBtnHtml}

                        </div>
                    </div>
                `;
            }

            // تحديث محتوى الصفحة
            app.innerHTML = html;
            // تفعيل أيقونات Lucide بعد رسم الواجهة
            lucide.createIcons();
        }

        // تشغيل الواجهة عند اكتمال تحميل الصفحة
        window.onload = render;

    </script>
</body>
</html>
