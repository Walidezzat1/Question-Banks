    <script>
        // ==========================================
        // 1. قاعدة البيانات (105 سؤال)
        // ==========================================
        const questionsData = [
            // الفصل الأول: الحث الكهرومغناطيسي
            { id: 1, topic: "الحث الكهرومغناطيسي", question: "عدد خطوط المجال المغناطيسي التي تخترق سطحاً ما مساحته A بشكل عمودي يسمى:", options: ["شدة المجال المغناطيسي", "التدفق المغناطيسي", "القوة الدافعة الكهربائية", "كثافة الفيض"], correctAnswer: 1, explanation: "هذا هو التعريف العلمي للتدفق المغناطيسي (Φ)." },
            { id: 2, topic: "الحث الكهرومغناطيسي", question: "عدد خطوط المجال المغناطيسي التي تخترق وحدة المساحات من السطح بشكل عمودي يسمى:", options: ["التدفق المغناطيسي", "القوة الكهرومغناطيسية", "شدة المجال المغناطيسي (B)", "النفاذية المغناطيسية"], correctAnswer: 2, explanation: "شدة المجال المغناطيسي تعبر عن كثافة خطوط المجال في وحدة المساحة." },
            { id: 3, topic: "الحث الكهرومغناطيسي", question: "وحدة قياس التدفق المغناطيسي بحسب النظام الدولي للوحدات هي:", options: ["التسلا (T)", "الويبر (Wb)", "الفولت (V)", "الأمبير (A)"], correctAnswer: 1, explanation: "الويبر (Wb) هو وحدة قياس التدفق، ويكافئ (تسلا.متر مربع) أو (فولت.ثانية)." },
            { id: 4, topic: "الحث الكهرومغناطيسي", question: "ينعدم التدفق المغناطيسي عندما تكون خطوط المجال المغناطيسي:", options: ["عمودية على السطح", "موازية للسطح", "تميل بزاوية 45°", "تميل بزاوية 60°"], correctAnswer: 1, explanation: "عندما تكون موازية، تكون الزاوية بين خطوط المجال والعمودي على السطح 90°، و cos(90) = 0." },
            { id: 5, topic: "الحث الكهرومغناطيسي", question: "يكون التدفق المغناطيسي أكبر ما يمكن عندما تكون زاوية سقوط المجال (الزاوية بين المجال والعمودي على السطح) تساوي:", options: ["90°", "45°", "180°", "صفر"], correctAnswer: 3, explanation: "لأن cos(0) = 1، وهي أكبر قيمة لجيب التمام، وذلك عندما يكون السطح عمودياً على المجال." },
            { id: 6, topic: "الحث الكهرومغناطيسي", question: "إذا وضع سطح مساحته 50m² موازياً لمجال مغناطيسي منتظم شدته 0.01T، فإن التدفق المغناطيسي بوحدة (Wb) يساوي:", options: ["5 × 10⁻⁴", "0.5", "صفر", "50 × 10⁻³"], correctAnswer: 2, explanation: "بما أن السطح موازٍ للمجال، فإن الزاوية 90 درجة، والتدفق = صفر." },
            { id: 7, topic: "الحث الكهرومغناطيسي", question: "إذا وضع سطح مساحته 50m² عمودياً على مجال مغناطيسي منتظم شدته 0.01T، فإن التدفق المغناطيسي بوحدة (Wb) يساوي:", options: ["5 × 10⁻⁴", "0.5", "صفر", "50 × 10⁻³"], correctAnswer: 1, explanation: "التدفق = B × A × cos(0) = 0.01 × 50 × 1 = 0.5 Wb." },
            { id: 8, topic: "الحث الكهرومغناطيسي", question: "مقدار القوة الدافعة الكهربائية التأثيرية المتولدة في ملف تتناسب طردياً مع:", options: ["مساحة المقطع فقط", "شدة المجال فقط", "معدل التغير في التدفق المغناطيسي", "مقاومة السلك"], correctAnswer: 2, explanation: "حسب قانون فاراداي، ε تتناسب طردياً مع المعدل الزمني للتغير في التدفق (ΔΦ/Δt)." },
            { id: 9, topic: "الحث الكهرومغناطيسي", question: "التيار الكهربائي التأثيري المتولد في ملف يسري باتجاه بحيث يولد مجالاً مغناطيسياً يعاكس التغير في التدفق المولد له، هذا نص قانون:", options: ["أوم", "فاراداي", "لنز", "أمبير"], correctAnswer: 2, explanation: "قانون لنز يحدد اتجاه التيار الحثي بحيث يقاوم التغير المسبب له." },
            { id: 10, topic: "الحث الكهرومغناطيسي", question: "توضع إشارة سالبة في قانون فاراداي تطبيقاً لقاعدة:", options: ["اليد اليمنى", "فليمنغ", "لنز", "أورستد"], correctAnswer: 2, explanation: "الإشارة السالبة تعبر عن قانون لنز، حيث تعاكس القوة الدافعة التغير في التدفق." },
            { id: 11, topic: "الحث الكهرومغناطيسي", question: "تزداد صعوبة دفع مغناطيس في ملف متصل بمقاومة خارجية كلما:", options: ["قلت عدد لفات الملف", "زادت عدد لفات الملف", "كانت الحركة أبطأ", "توقفت الحركة"], correctAnswer: 1, explanation: "بزيادة عدد اللفات يزداد التيار الحثي، ويزداد المجال المغناطيسي المعاكس (قوة التنافر/التجاذب)." },
            { id: 12, topic: "الحث الكهرومغناطيسي", question: "يتولد في الملف اللولبي تيار تأثيري إذا كان المغناطيس:", options: ["ثابتاً أمام الملف", "يتحرك مع الملف بنفس السرعة والاتجاه", "متحركاً نحو الملف أو مبتعداً عنه", "موضوعاً داخله وساكناً"], correctAnswer: 2, explanation: "يجب وجود حركة نسبية (تغير في التدفق) لتوليد تيار حثي." },
            { id: 13, topic: "الحث الكهرومغناطيسي", question: "إذا كان التغير في التدفق المغناطيسي لملف من لفة واحدة هو 5x10⁻³ Wb في زمن 0.1s، فإن القوة الدافعة (V) تساوي:", options: ["0.05", "0.5", "5", "50"], correctAnswer: 0, explanation: "ε = -N (ΔΦ/Δt) = 1 × (5x10⁻³ / 0.1) = 0.05 فولت." },
            { id: 14, topic: "الحث الكهرومغناطيسي", question: "أثناء تقريب القطب الشمالي لمغناطيس من ملف، يصبح طرف الملف المواجه للمغناطيس:", options: ["قطباً جنوبياً", "قطباً شمالياً", "متعادلاً", "موجباً"], correctAnswer: 1, explanation: "حسب قانون لنز، لكي يقاوم الملف الاقتراب، يولد قطباً مشابهاً (شمالياً) ليحدث تنافر." },
            { id: 15, topic: "الحث الكهرومغناطيسي", question: "عند إبعاد القطب الشمالي لمغناطيس عن ملف، يصبح طرف الملف المواجه للمغناطيس:", options: ["قطباً جنوبياً", "قطباً شمالياً", "متعادلاً", "سالباً"], correctAnswer: 0, explanation: "حسب قانون لنز، لكي يقاوم الابتعاد، يولد قطباً مخالفاً (جنوبياً) ليحدث تجاذب." },
            { id: 16, topic: "الحث الكهرومغناطيسي", question: "بزيادة زاوية سقوط المجال المغناطيسي على السطح (من 0 إلى 90)، فإن التدفق المغناطيسي:", options: ["يزداد", "يقل", "لا يتغير", "ينعدم فوراً"], correctAnswer: 1, explanation: "كلما زادت الزاوية نحو 90، يقل مقدار جيب التمام (cos) وبالتالي يقل التدفق." },
            { id: 17, topic: "الحث الكهرومغناطيسي", question: "بزيادة مساحة السطح الذي تخترقه خطوط المجال المغناطيسي، فإن التدفق المغناطيسي:", options: ["يقل", "لا يتغير", "يزداد", "ينعدم"], correctAnswer: 2, explanation: "العلاقة طردية بين المساحة (A) والتدفق المغناطيسي (Φ = B.A.cosθ)." },
            { id: 18, topic: "الحث الكهرومغناطيسي", question: "يتولد تيار تأثيري في ملف موضوع في مجال مغناطيسي عندما يتحرك المغناطيس والملف بسرعة واحدة وفي اتجاه واحد.", options: ["العبارة صحيحة", "العبارة خاطئة، يتولد تيار أكبر", "العبارة خاطئة، لا يتولد تيار", "يتولد تيار مستمر"], correctAnswer: 2, explanation: "بما أن السرعة والاتجاه واحد، فلا توجد حركة نسبية، ولا يوجد تغير في التدفق، فلا يتولد تيار." },
            { id: 19, topic: "الحث الكهرومغناطيسي", question: "وحدة شدة المجال المغناطيسي تكافئ:", options: ["ويبر.متر", "ويبر/متر مربع", "فولت.ثانية", "أمبير/متر"], correctAnswer: 1, explanation: "التسلا (T) تكافئ ويبر/متر² (Wb/m²)." },
            { id: 20, topic: "الحث الكهرومغناطيسي", question: "اتجاه التيار التأثيري المتولد نتيجة اقتراب المغناطيس من الملف يكون ..... اتجاه التيار المتولد عند إبعاد المغناطيس.", options: ["في نفس", "في عكس", "عمودي على", "يصنع زاوية 45 مع"], correctAnswer: 1, explanation: "الاقتراب يولد قطباً مشابهاً (تيار في اتجاه معين)، والإبعاد يولد قطباً مخالفاً (تيار في الاتجاه المعاكس)." },

            // الفصل الثاني: المولدات والمحركات
            { id: 21, topic: "المولدات والمحركات", question: "جهاز يحول جزء من الطاقة الميكانيكية المبذولة لتحريك الملف في المجال المغناطيسي إلى طاقة كهربائية:", options: ["المحرك الكهربائي", "المحول الكهربائي", "المولد الكهربائي", "المكثف"], correctAnswer: 2, explanation: "هذا هو مبدأ عمل المولد الكهربائي (الدينامو)." },
            { id: 22, topic: "المولدات والمحركات", question: "جهاز يحول جزء من الطاقة الكهربائية إلى طاقة ميكانيكية في وجود مجال مغناطيسي:", options: ["المولد الكهربائي", "المحرك الكهربائي", "الجلفانومتر", "المقاومة"], correctAnswer: 1, explanation: "المحرك الكهربائي (الموتور) يقوم بعكس وظيفة المولد." },
            { id: 23, topic: "المولدات والمحركات", question: "يكون التدفق المغناطيسي الذي يجتاز ملف المولد قيمة عظمى عندما يكون مستوى الملف:", options: ["موازياً لخطوط المجال", "عمودياً على خطوط المجال", "يميل بزاوية 45°", "يميل بزاوية 60°"], correctAnswer: 1, explanation: "عندما يكون مستوى الملف عمودياً، تكون الزاوية بين العمودي والمجال 0، و cos(0)=1." },
            { id: 24, topic: "المولدات والمحركات", question: "تكون القوة الدافعة الكهربائية التأثيرية في ملف المولد قيمة عظمى عندما يكون مستوى الملف:", options: ["عمودياً على خطوط المجال", "يصنع زاوية حادة", "موازياً لخطوط المجال", "يصنع زاوية منفرجة"], correctAnswer: 2, explanation: "عندما يكون موازياً، يكون معدل القطع لخطوط المجال (التغير في التدفق) أكبر ما يمكن." },
            { id: 25, topic: "المولدات والمحركات", question: "عندما يكون مستوى ملف المولد موازياً لخطوط المجال، فإن القوة الدافعة الكهربائية تساوي:", options: ["صفر", "قيمة فعالة", "قيمة عظمى", "نصف القيمة العظمى"], correctAnswer: 2, explanation: "كما ذكرنا، الموازاة تعطي أقصى معدل قطع، فتكون ε قيمة عظمى." },
            { id: 26, topic: "المولدات والمحركات", question: "في المحرك الكهربائي، تتبادل نصفي الحلقة الموقع بالنسبة للفرشاتين كل:", options: ["دورة كاملة", "نصف دورة", "ربع دورة", "ثلاثة أرباع دورة"], correctAnswer: 1, explanation: "لضمان استمرار دوران الملف في اتجاه واحد، يعكس المبدل (نصفا الأسطوانة) اتجاه التيار كل نصف دورة." },
            { id: 27, topic: "المولدات والمحركات", question: "عزم الازدواج المؤثر على ملف المحرك يكون صفراً عندما يكون مستوى الملف:", options: ["موازياً لخطوط المجال", "عمودياً على خطوط المجال", "مائلاً بـ 30°", "مائلاً بـ 45°"], correctAnswer: 1, explanation: "في الوضع العمودي، يمر خطا عمل القوتين بمحور الدوران، فينعدم ذراع العزم." },
            { id: 28, topic: "المولدات والمحركات", question: "يستمر دوران ملف المحرك الكهربائي بعد مروره بالوضع العمودي (حيث ينعدم التيار) بفعل:", options: ["الحث الذاتي", "القوة المغناطيسية", "القصور الذاتي", "الحث المتبادل"], correctAnswer: 2, explanation: "يستمر بالدوران لتجاوز وضع الصفر بسبب خاصية القصور الذاتي الدوراني." },
            { id: 29, topic: "المولدات والمحركات", question: "القوة الكهرومغناطيسية المؤثرة على سلك يمر به تيار موضوع عمودياً على مجال مغناطيسي تكون:", options: ["في نفس اتجاه التيار", "عكس اتجاه التيار", "عمودية على كل من المجال والتيار", "موازية للمجال"], correctAnswer: 2, explanation: "حسب قاعدة اليد اليمنى، القوة تكون عمودية على المستوى الذي يضم التيار والمجال." },
            { id: 30, topic: "المولدات والمحركات", question: "يسلك الجسيم المشحون مساراً دائرياً عند دخوله مجالاً مغناطيسياً بسرعة:", options: ["موازية للمجال", "عمودية على المجال", "مائلة بزاوية 45°", "مائلة بزاوية 30°"], correctAnswer: 1, explanation: "السرعة العمودية تجعل القوة المغناطيسية تعمل كقوة جاذبة مركزية." },
            { id: 31, topic: "المولدات والمحركات", question: "إذا زاد عدد لفات ملف المولد إلى الضعف وقلت سرعته الزاوية للنصف (مع ثبات الباقي)، فإن القوة الدافعة العظمى:", options: ["تتضاعف", "تقل للنصف", "لا تتغير", "تصبح أربعة أمثال"], correctAnswer: 2, explanation: "ε_max = NBAω. إذا ضاعفنا N وقسمنا ω على 2، تظل القيمة كما هي." },
            { id: 32, topic: "المولدات والمحركات", question: "لزيادة القوة الدافعة المترددة المتولدة في المولد، يجب:", options: ["تقليل سرعة الدوران", "زيادة سرعة الدوران", "استخدام مغناطيس أضعف", "تقليل مساحة الملف"], correctAnswer: 1, explanation: "ε_max = NBAω، بزيادة السرعة الزاوية (ω) تزداد القوة الدافعة." },
            { id: 33, topic: "المولدات والمحركات", question: "تنعدم القوة الكهرومغناطيسية المؤثرة على سلك يمر به تيار موضوع في مجال مغناطيسي عندما يكون السلك:", options: ["عمودياً على المجال", "يصنع زاوية 30°", "موازياً لخطوط المجال", "يصنع زاوية 90°"], correctAnswer: 2, explanation: "القوة F = ILB sinθ. إذا كان موازياً فإن θ = 0، وجيب الصفر = صفر." },
            { id: 34, topic: "المولدات والمحركات", question: "تسلك شحنة مساراً دائرياً في مجال (B). إذا زادت شدة المجال إلى (2B)، فإن القوة المغناطيسية:", options: ["تقل للنصف", "تزيد للمثلين", "لا تتغير", "تصبح أربعة أمثال"], correctAnswer: 1, explanation: "العلاقة طردية مباشرة: F = qvB." },
            { id: 35, topic: "المولدات والمحركات", question: "يتحرك إلكترون بسرعة موازية لخطوط مجال مغناطيسي، مقدار القوة المغناطيسية المؤثرة عليه:", options: ["قيمة عظمى", "نصف القيمة العظمى", "صفر", "يعتمد على كتلته"], correctAnswer: 2, explanation: "بما أن السرعة موازية للمجال (θ = 0)، فإن F = qvB sin(0) = 0." },
            { id: 36, topic: "المولدات والمحركات", question: "دوران ملف المولد داخل مجال منتظم بسرعة منتظمة يولد قوة دافعة كهربائية:", options: ["مستمرة", "تتغير جيبياً بالنسبة للزمن", "ثابتة الشدة", "نبضية"], correctAnswer: 1, explanation: "المولد ينتج تياراً متردداً يأخذ شكل دالة الجيب (Sine wave)." },
            { id: 37, topic: "المولدات والمحركات", question: "يكون التيار التأثيري المتولد في المولد قيمة عظمى عندما يكون متجه مساحة الملف:", options: ["موازياً لخطوط المجال", "عمودياً على خطوط المجال", "يصنع زاوية 45°", "يصنع زاوية 30°"], correctAnswer: 1, explanation: "متجه المساحة عمودي يعني أن مستوى الملف موازٍ للمجال، وهو وضع القيمة العظمى." },
            { id: 38, topic: "المولدات والمحركات", question: "سلك طوله 2m موضوع عمودياً على مجال 0.4T ويمر به تيار 5A. القوة المؤثرة بوحدة (N) تساوي:", options: ["1.9", "4", "10", "2.8"], correctAnswer: 1, explanation: "F = ILB sin(90) = 5 × 2 × 0.4 × 1 = 4 نيوتن." },
            { id: 39, topic: "المولدات والمحركات", question: "القوة المغناطيسية المؤثرة على شحنة متحركة في مجال تعمل على تغيير:", options: ["مقدار سرعتها", "كتلتها", "شحنتها", "اتجاه سرعتها"], correctAnswer: 3, explanation: "القوة المغناطيسية لا تبذل شغلاً، لذا لا تغير مقدار السرعة، بل تغير الاتجاه فقط." },
            { id: 40, topic: "المولدات والمحركات", question: "عندما تكون الزاوية بين متجه مساحة ملف المولد وخطوط المجال 270°، فإن القوة الدافعة:", options: ["صفر", "عظمى موجبة", "عظمى سالبة", "نصف العظمى"], correctAnswer: 2, explanation: "sin(270°) = -1، وبالتالي تعطي قيمة عظمى سالبة." },

            // الفصل الثالث: التيار المتردد
            { id: 41, topic: "التيار المتردد", question: "تيار يتغير اتجاهه كل نصف دورة وأن معدل مقدار شدته يساوي صفراً في الدورة الواحدة:", options: ["التيار المستمر", "التيار المتردد", "التيار التأثيري الذاتي", "التيار المقوم"], correctAnswer: 1, explanation: "هذا هو تعريف التيار المتردد الجيبي." },
            { id: 42, topic: "التيار المتردد", question: "الأجهزة المستخدمة لقياس شدة التيار المتردد والجهد (أميتر وفولتميتر) تقيس القيم:", options: ["العظمى", "اللحظية", "الفعالة", "المتوسطة"], correctAnswer: 2, explanation: "الأجهزة الحرارية مصممة لقراءة القيمة الفعالة (RMS) للتيار والجهد المتردد." },
            { id: 43, topic: "التيار المتردد", question: "الشدة الفعالة للتيار المتردد (Irms) تتناسب مع الشدة العظمى (Imax) تناسباً:", options: ["عكسياً", "طردياً", "تربيعياً", "لا توجد علاقة"], correctAnswer: 1, explanation: "I_rms = I_max / √2 ، العلاقة طردية." },
            { id: 44, topic: "التيار المتردد", question: "المقاومة التي تحول الطاقة الكهربائية بأكملها إلى طاقة حرارية وليس لها تأثير حثي هي:", options: ["الملف النقي", "المكثف", "المقاومة الأومية (الصرفة)", "الوصلة الثنائية"], correctAnswer: 2, explanation: "المقاومة الأومية هي الوحيدة التي تستهلك طاقة حقيقية (حرارة)." },
            { id: 45, topic: "التيار المتردد", question: "في دائرة تيار متردد تحوي مقاومة أومية فقط، الجهد والتيار يكونان:", options: ["متفقين في الطور", "الجهد يتقدم بـ 90°", "التيار يتقدم بـ 90°", "متعاكسين"], correctAnswer: 0, explanation: "في المقاومة الأومية، لا يوجد فرق طور بين الجهد والتيار (يصلان للقمة معاً)." },
            { id: 46, topic: "التيار المتردد", question: "الممانعة التي يبديها الملف لمرور التيار المتردد خلاله تسمى:", options: ["المقاومة الأومية", "الممانعة السعوية", "الممانعة الحثية", "الممانعة الكلية"], correctAnswer: 2, explanation: "تسمى الممانعة الحثية (Inductive Reactance - XL)." },
            { id: 47, topic: "التيار المتردد", question: "إذا احتوت دائرة على ملف حثي نقي، فإن الجهد الكهربائي:", options: ["يتأخر عن التيار بـ 90°", "يتقدم على التيار بـ 90°", "يتفق مع التيار في الطور", "يتقدم على التيار بـ 180°"], correctAnswer: 1, explanation: "في الملف، الجهد يسبق التيار بربع دورة (π/2)." },
            { id: 48, topic: "التيار المتردد", question: "في دائرة تحوي مكثفاً فقط، فإن التيار الكهربائي:", options: ["يتأخر عن الجهد بـ 90°", "يتقدم على الجهد بـ 90°", "يتفق مع الجهد", "يتأخر بـ 45°"], correctAnswer: 1, explanation: "في المكثف، التيار يسبق الجهد بربع دورة." },
            { id: 49, topic: "التيار المتردد", question: "تسمح الملفات في دوائر التيار المتردد بمرور التيارات ..... وتقاوم مرور التيارات ......", options: ["عالية التردد / منخفضة التردد", "منخفضة التردد / عالية التردد", "المستمرة / المستمرة", "لا تسمح بمرور أي تيار"], correctAnswer: 1, explanation: "لأن XL = 2πfL، فكلما زاد التردد زادت الممانعة الحثية." },
            { id: 50, topic: "التيار المتردد", question: "يسمح المكثف بمرور التيارات ..... ويمنع مرور التيارات ......", options: ["المترددة / المستمرة", "المستمرة / المترددة", "منخفضة التردد / عالية التردد", "لا يسمح بمرور أي تيار"], correctAnswer: 0, explanation: "المكثف يمنع التيار المستمر لأن ممانعته السعوية تصبح ما لا نهاية (التردد = صفر)." },
            { id: 51, topic: "التيار المتردد", question: "دائرة تيار متردد تحتوي على ملف حثي نقي، إذا ازداد التردد فإن ممانعته الحثية:", options: ["تقل", "تزداد", "لا تتغير", "تنعدم"], correctAnswer: 1, explanation: "الممانعة الحثية تتناسب طردياً مع التردد." },
            { id: 52, topic: "التيار المتردد", question: "دائرة تيار متردد تحتوي على مكثف، إذا ازداد التردد فإن ممانعته السعوية:", options: ["تقل", "تزداد", "لا تتغير", "تنعدم"], correctAnswer: 0, explanation: "الممانعة السعوية تتناسب عكسياً مع التردد (XC = 1 / 2πfC)." },
            { id: 53, topic: "التيار المتردد", question: "دائرة تيار متردد يكون بها الجهد متقدماً على التيار، فهذا يعني أنها تحوي:", options: ["مقاومة أومية فقط", "مكثف ومقاومة", "ملف حثي ومقاومة", "مكثف فقط"], correctAnswer: 2, explanation: "الملف يسبب تقدم الجهد، ووجود المقاومة يجعل زاوية التقدم أقل من 90 ولكن الجهد يظل متقدماً." },
            { id: 54, topic: "التيار المتردد", question: "تيار متردد قيمته الفعالة 5A، تكون قيمته العظمى بوحدة الأمبير:", options: ["10", "10√2", "5√2", "5"], correctAnswer: 2, explanation: "I_max = I_rms × √2 = 5√2." },
            { id: 55, topic: "التيار المتردد", question: "عند مرور تيار شدته العظمى 5√2 A في مقاومة 1.2 Ω، القدرة المستهلكة بالوات تساوي:", options: ["6", "30", "60", "15"], correctAnswer: 1, explanation: "القدرة P = I_rms² × R. الشدة الفعالة = 5. إذن P = 5² × 1.2 = 25 × 1.2 = 30 W." },
            { id: 56, topic: "التيار المتردد", question: "قيمة المقاومة الأومية الصرفة (R):", options: ["تتغير بتغير تردد التيار", "تتغير بتغير نوع التيار", "لا تتغير بتغير نوع التيار أو تردده", "تزداد بزيادة التردد"], correctAnswer: 2, explanation: "المقاومة الأومية تعتمد على نوع المادة والأبعاد ودرجة الحرارة، ولا تعتمد على التردد." },
            { id: 57, topic: "التيار المتردد", question: "حالة الرنين في دائرة RLC تحدث عندما:", options: ["المقاومة تساوي صفر", "XL = XC", "XL > XC", "XC > XL"], correctAnswer: 1, explanation: "في حالة الرنين، تتساوى الممانعة الحثية مع السعوية ويلغي كل منهما تأثير الآخر." },
            { id: 58, topic: "التيار المتردد", question: "في حالة الرنين الكهربائي، تكون الممانعة الكلية للدائرة (Z) مساوية لـ:", options: ["صفر", "XL", "XC", "المقاومة الأومية R"], correctAnswer: 3, explanation: "لأن XL و XC يلغيان بعضهما، تتبقى المقاومة الأومية فقط، وتكون Z في أقل قيمة لها." },
            { id: 59, topic: "التيار المتردد", question: "إذا كان التيار يعطى بالعلاقة i = 3 sin(200t)، فإن القيمة الفعالة للتيار تساوي:", options: ["3", "1.5", "3/√2", "6"], correctAnswer: 2, explanation: "القيمة العظمى هي 3، والفعالة هي العظمى مقسومة على جذر 2." },
            { id: 60, topic: "التيار المتردد", question: "يتناسب تردد دائرة الرنين تناسباً عكسياً مع:", options: ["المقاومة R فقط", "الجذر التربيعي لـ L و C", "الجهد المطبق", "التيار العظمى"], correctAnswer: 1, explanation: "قانون تردد الرنين f0 = 1 / (2π√(LC))." },

            // الفصل الرابع: أشباه الموصلات
            { id: 61, topic: "الوصلة الثنائية", question: "تزداد درجة التوصيل الكهربائي لأشباه الموصلات النقية بـ:", options: ["خفض درجة حرارتها", "ارتفاع درجة حرارتها", "زيادة الضغط", "الاحتفاظ بها في الظلام"], correctAnswer: 1, explanation: "ارتفاع الحرارة يكسر الروابط التساهمية ويحرر إلكترونات ويخلق فجوات، مما يزيد التوصيل." },
            { id: 62, topic: "الوصلة الثنائية", question: "بلورات أشباه الموصلات تكون عازلة تماماً للتيار الكهربائي إذا كانت في درجة حرارة:", options: ["الصفر السيليزي (0°C)", "الصفر المطلق (0 K)", "الغرفة (25°C)", "100°C"], correctAnswer: 1, explanation: "عند الصفر المطلق (-273°C)، تكون جميع الروابط سليمة ولا توجد إلكترونات حرة." },
            { id: 63, topic: "الوصلة الثنائية", question: "الفجوة بين نطاق التكافؤ ونطاق التوصيل تكون كبيرة جداً في:", options: ["الموصلات", "أشباه الموصلات", "المواد العازلة", "الوصلة الثنائية"], correctAnswer: 2, explanation: "في العوازل، الفجوة (Energy Gap) تكون كبيرة جداً (أكبر من 5 eV) يصعب على الإلكترون عبورها." },
            { id: 64, topic: "الوصلة الثنائية", question: "يؤدي الثقب (الفجوة) في نطاق التكافؤ دور:", options: ["شحنة سالبة", "شحنة موجبة", "شحنة متعادلة", "إلكترون حر"], correctAnswer: 1, explanation: "الثقب هو مكان فارغ لإلكترون، ويسلك سلوك شحنة موجبة متحركة." },
            { id: 65, topic: "الوصلة الثنائية", question: "عند إضافة شائبة خماسية التكافؤ (مثل الزرنيخ) إلى شبه موصل نقي يصبح:", options: ["شبه موصل موجب (P)", "عازلاً", "شبه موصل سالب (N)", "موصلاً نقياً"], correctAnswer: 2, explanation: "الذرة الخماسية توفر إلكتروناً إضافياً حراً، ليصبح النوع سالب (N-Type)." },
            { id: 66, topic: "الوصلة الثنائية", question: "عند إضافة شائبة ثلاثية التكافؤ (مثل البورون) إلى شبه موصل نقي يصبح:", options: ["شبه موصل موجب (P)", "عازلاً", "شبه موصل سالب (N)", "موصلاً نقياً"], correctAnswer: 0, explanation: "الذرة الثلاثية تترك فجوة (ثقباً) عند تكوين الروابط، ليصبح النوع موجب (P-Type)." },
            { id: 67, topic: "الوصلة الثنائية", question: "ذرات الزرنيخ خماسية التكافؤ المضافة لبلورة شبه الموصل تسمى ذرات:", options: ["مانحة", "متقبلة", "مثارة", "متعادلة"], correctAnswer: 0, explanation: "تسمى مانحة (Donor) لأنها تمنح البلورة إلكتروناً حراً." },
            { id: 68, topic: "الوصلة الثنائية", question: "تسمى الذرات ثلاثية التكافؤ المضافة لشبه الموصل بـ:", options: ["مانحة", "متقبلة", "مشعة", "أيونات موجبة"], correctAnswer: 1, explanation: "تسمى متقبلة (Acceptor) لأنها تتقبل إلكتروناً من ذرة مجاورة لملء الفجوة." },
            { id: 69, topic: "الوصلة الثنائية", question: "ينتقل التيار في أشباه الموصلات من النوع السالب (N) بواسطة:", options: ["الفجوات", "الإلكترونات", "الأيونات الموجبة", "البروتونات"], correctAnswer: 1, explanation: "حاملات الشحنة الأكثرية في النوع N هي الإلكترونات." },
            { id: 70, topic: "الوصلة الثنائية", question: "ينتقل التيار في أشباه الموصلات من النوع الموجب (P) بواسطة:", options: ["الفجوات", "الإلكترونات", "الأيونات السالبة", "النيوترونات"], correctAnswer: 0, explanation: "حاملات الشحنة الأكثرية في النوع P هي الفجوات (الثقوب)." },
            { id: 71, topic: "الوصلة الثنائية", question: "شبه موصل من النوع السالب ملتحم بشبه موصل من النوع الموجب يسمى:", options: ["الترانزستور", "المكثف", "الوصلة الثنائية (الدايود)", "الملف"], correctAnswer: 2, explanation: "هذا هو التركيب الأساسي للوصلة الثنائية P-N junction." },
            { id: 72, topic: "الوصلة الثنائية", question: "عند التحام بلورة N مع بلورة P، تكتسب البلورة N جهداً:", options: ["سالباً", "موجباً", "متعادلاً", "متردداً"], correctAnswer: 1, explanation: "تهاجر منها الإلكترونات نحو P تاركة أيونات موجبة غير متحركة تكسبها جهداً موجباً." },
            { id: 73, topic: "الوصلة الثنائية", question: "تستخدم الوصلة الثنائية في:", options: ["تكبير التيار", "توليد التيار المتردد", "تقويم التيار المتردد", "تخزين الشحنات"], correctAnswer: 2, explanation: "تستخدم كمقوم (Rectifier) لتحويل التيار المتردد إلى تيار موحد الاتجاه (مستمر)." },
            { id: 74, topic: "الوصلة الثنائية", question: "في حالة التوصيل الأمامي للوصلة الثنائية، تكون مقاومتها للتيار:", options: ["كبيرة جداً", "صغيرة", "لانهائية", "تساوي صفر تماماً"], correctAnswer: 1, explanation: "في الانحياز الأمامي تضيق منطقة الاستنزاف وتقل المقاومة ليسمح بمرور التيار." },
            { id: 75, topic: "الوصلة الثنائية", question: "في حالة التوصيل العكسي للوصلة الثنائية، تكون منطقة الاستنزاف:", options: ["ضيقة جداً", "متسعة", "منعدمة", "لا تتأثر"], correctAnswer: 1, explanation: "المجال الخارجي يدعم المجال الداخلي مما يوسع منطقة الاستنزاف ويمنع مرور التيار." },
            { id: 76, topic: "الوصلة الثنائية", question: "بلورة شبه الموصل من النوع الموجب (P) تكون:", options: ["موجبة الشحنة", "سالبة الشحنة", "متعادلة كهربائياً", "مترددة الشحنة"], correctAnswer: 2, explanation: "أي بلورة (P أو N) ككل تكون متعادلة لأن عدد البروتونات في الأنوية يساوي عدد الإلكترونات الكلي." },
            { id: 77, topic: "الوصلة الثنائية", question: "بلورة شبه الموصل من النوع السالب (N) تكون:", options: ["موجبة الشحنة", "سالبة الشحنة", "متعادلة كهربائياً", "مترددة الشحنة"], correctAnswer: 2, explanation: "رغم وجود إلكترونات حرة كحاملات أكثرية، إلا أن البلورة ككل متعادلة." },
            { id: 78, topic: "الوصلة الثنائية", question: "الحالة التي يمنع فيها المجال الداخلي أي زيادة في انتشار الشحنات عبر منطقة الاستنزاف هي:", options: ["حالة الانهيار", "حالة التوازن الكهربائي", "حالة التشبع", "حالة الانحياز الأمامي"], correctAnswer: 1, explanation: "حالة التوازن تحدث عندما تتساوى قوة تيار الانتشار مع قوة تيار الانجراف." },
            { id: 79, topic: "الوصلة الثنائية", question: "المواد التي يكون فيها اتساع فجوة الطاقة المحظورة منعدم (تتداخل النطاقات) هي:", options: ["المواد الموصلة", "أشباه الموصلات", "المواد العازلة", "البلاستيك"], correctAnswer: 0, explanation: "في الموصلات كالمعادن، يتداخل نطاق التكافؤ مع نطاق التوصيل." },
            { id: 80, topic: "الوصلة الثنائية", question: "وصلة ثنائية وصلت ببطارية بحيث اتصل القطب الموجب للبطارية بالبلورة N والسالب بالبلورة P، هذا التوصيل:", options: ["أمامي", "عكسي", "متوازي", "لا يمرر تيار أبداً"], correctAnswer: 1, explanation: "هذا هو الانحياز العكسي (موجب مع N وسالب مع P)، ولا يسمح بمرور التيار." },

            // الفصل الخامس: نظرية الكم
            { id: 81, topic: "نظرية الكم", question: "انبعاث الإلكترونات من فلزات معينة نتيجة سقوط ضوء له تردد مناسب يسمى:", options: ["التأثير الكهروحراري", "الظاهرة الكهروضوئية", "النشاط الإشعاعي", "تأثير كومبتون"], correctAnswer: 1, explanation: "هذا هو التعريف العلمي للظاهرة الكهروضوئية." },
            { id: 82, topic: "نظرية الكم", question: "أقل مقدار للطاقة اللازمة لتحرير الإلكترون من سطح فلز يسمى:", options: ["طاقة التأين", "دالة الشغل", "طاقة الحركة", "الطاقة الكامنة"], correctAnswer: 1, explanation: "دالة الشغل (Work Function - Φ) هي الحد الأدنى للطاقة المطلوبة." },
            { id: 83, topic: "نظرية الكم", question: "تفترض نظرية الكم لماكس بلانك أن الطاقة الإشعاعية تنبعث وتمتص على هيئة:", options: ["سيل متصل", "موجات ميكانيكية", "نبضات متتابعة (فوتونات)", "إلكترونات"], correctAnswer: 2, explanation: "الطاقة مكممة (كمات منفصلة) وليست متصلة." },
            { id: 84, topic: "نظرية الكم", question: "طاقة الفوتون تتناسب تناسباً عكسياً مع:", options: ["تردده", "سرعته", "الطول الموجي", "شدة الضوء"], correctAnswer: 2, explanation: "E = h c / λ. الطاقة تتناسب عكسياً مع الطول الموجي (λ)." },
            { id: 85, topic: "نظرية الكم", question: "دالة الشغل لسطح فلز تعتمد فقط على:", options: ["تردد الضوء الساقط", "شدة الضوء الساقط", "زمن التعرض للضوء", "نوع مادة السطح (نوع الفلز)"], correctAnswer: 3, explanation: "هي خاصية مميزة لكل معدن، ولا تتأثر بخصائص الضوء الساقط." },
            { id: 86, topic: "نظرية الكم", question: "إذا كان تردد الضوء الساقط أصغر من تردد العتبة، فإنه:", options: ["تنبعث إلكترونات بسرعة", "لا تنبعث إلكترونات مهما زادت شدة الإضاءة", "تنبعث إلكترونات بعد فترة زمنية", "تنبعث إلكترونات بطيئة"], correctAnswer: 1, explanation: "التردد شرط أساسي للانبعاث. إذا لم يصل للحد الأدنى (تردد العتبة)، لا يحدث انبعاث." },
            { id: 87, topic: "نظرية الكم", question: "تزداد الطاقة الحركية للإلكترونات الضوئية المنبعثة من سطح فلز بزيادة:", options: ["شدة الضوء الساقط", "مساحة سطح الفلز", "تردد الضوء الساقط", "زمن الإضاءة"], correctAnswer: 2, explanation: "KE = hf - Φ. بزيادة تردد الضوء (f) تزداد الطاقة الحركية للإلكترونات." },
            { id: 88, topic: "نظرية الكم", question: "جهد الإيقاف (جهد القطع) يعتمد على:", options: ["شدة الضوء الساقط", "تردد الضوء الساقط ونوع الفلز", "مساحة اللوح", "المسافة بين اللوحين"], correctAnswer: 1, explanation: "جهد القطع يتناسب طردياً مع الطاقة الحركية العظمى، والتي تعتمد على التردد ونوع المعدن." },
            { id: 89, topic: "نظرية الكم", question: "زيادة شدة الضوء الساقط (فوق تردد العتبة) يؤدي إلى زيادة:", options: ["طاقة حركة الإلكترونات", "جهد الإيقاف", "عدد الإلكترونات المنبعثة (تيار التشبع)", "دالة الشغل"], correctAnswer: 2, explanation: "زيادة الشدة تعني زيادة عدد الفوتونات، مما يحرر عدداً أكبر من الإلكترونات (كل فوتون يحرر إلكتروناً)." },
            { id: 90, topic: "نظرية الكم", question: "إذا سقطت فوتونات طاقة كل منها 5 eV على سطح فلز دالة الشغل له 3 eV، فإن طاقة حركة الإلكترونات المتحررة تساوي:", options: ["8 eV", "5 eV", "2 eV", "15 eV"], correctAnswer: 2, explanation: "KE = E - Φ = 5 - 3 = 2 eV." },
            { id: 91, topic: "نظرية الكم", question: "فوتونان A و B طاقتهما على الترتيب (E_A = 2 E_B)، فإن العلاقة بين تردديهما:", options: ["f_A = f_B", "f_A = 2 f_B", "2 f_A = f_B", "لا يمكن التحديد"], correctAnswer: 1, explanation: "بما أن E = hf، فالطاقة تتناسب طردياً مع التردد." },
            { id: 92, topic: "نظرية الكم", question: "أكبر قيمة للطاقة الحركية للإلكترونات تتناسب طردياً مع:", options: ["شدة الضوء", "القيمة المطلقة لجهد القطع", "الطول الموجي للضوء", "مساحة الفلز"], correctAnswer: 1, explanation: "KE_max = e * V_cut." },
            { id: 93, topic: "نظرية الكم", question: "إذا قلت شدة الضوء الساقط على سطح بعاث للنصف، فإن الطاقة الحركية للإلكترونات المنبعثة:", options: ["تقل للنصف", "تزداد للضعف", "لا تتغير", "تنعدم"], correctAnswer: 2, explanation: "الطاقة الحركية تعتمد على التردد فقط وليس الشدة." },
            { id: 94, topic: "نظرية الكم", question: "عند انتقال الإلكترون من مستوى طاقة أعلى إلى مستوى أدنى فإنه:", options: ["يمتص فوتوناً", "يبعث فوتوناً", "يصبح بروتوناً", "تزداد طاقته"], correctAnswer: 1, explanation: "يطلق فرق الطاقة بين المستويين على هيئة إشعاع (فوتون)." },
            { id: 95, topic: "نظرية الكم", question: "سقط ضوء أزرق خافت فحَرّر إلكترونات، وسقط ضوء أحمر ساطع فلم يُحرّر. التفسير:", options: ["طاقة فوتون الأزرق أكبر من دالة الشغل، والأحمر أقل", "الأحمر شدته غير كافية", "الضوء الأزرق أسرع", "الضوء الأحمر طوله الموجي قصير"], correctAnswer: 0, explanation: "تحرير الإلكترونات يعتمد على التردد (طاقة الفوتون). تردد الأزرق أكبر من الأحمر." },

            // الفصل السادس: الفيزياء النووية
            { id: 96, topic: "نواة الذرة", question: "النيوكليونات مصطلح يطلق على:", options: ["الإلكترونات فقط", "البروتونات والنيوترونات في النواة", "الإلكترونات والبروتونات", "النيوترونات فقط"], correctAnswer: 1, explanation: "أي جسيم داخل النواة يسمى نيوكليون." },
            { id: 97, topic: "نواة الذرة", question: "نظائر العنصر الواحد تختلف فيما بينها في:", options: ["العدد الذري", "عدد البروتونات", "عدد النيوترونات", "الخواص الكيميائية"], correctAnswer: 2, explanation: "النظائر تتساوى في البروتونات (العدد الذري) وتختلف في النيوترونات (العدد الكتلي)." },
            { id: 98, topic: "نواة الذرة", question: "طاقة الربط النووية تنتج عن:", options: ["تنافر البروتونات", "نقص في كتلة النواة عن مجموع كتل مكوناتها", "جاذبية الإلكترونات", "زيادة كتلة النواة"], correctAnswer: 1, explanation: "حسب قانون تكافؤ الكتلة والطاقة لأينشتاين (E = Δm c²)." },
            { id: 99, topic: "نواة الذرة", question: "الرقم الذي يحدد الخواص الكيميائية للعنصر وموقعه في الجدول الدوري هو:", options: ["العدد الكتلي", "عدد النيوترونات", "طاقة الربط", "العدد الذري"], correctAnswer: 3, explanation: "العدد الذري (عدد البروتونات) هو هوية العنصر ويحدد خواصه الكيميائية." },
            { id: 100, topic: "نواة الذرة", question: "دليل استقرار النواة يعتمد على مقياس:", options: ["طاقة الربط النووية الكلية", "طاقة الربط لكل نيوكليون (E_b / A)", "عدد الإلكترونات", "قوى التنافر الكهربائي"], correctAnswer: 1, explanation: "كلما زادت طاقة الربط للنيوكليون الواحد، زادت صعوبة تفكيك النواة، مما يعني استقراراً أكبر." },
            { id: 101, topic: "نواة الذرة", question: "القوى النووية بين النيوكليونات هي قوى:", options: ["تنافر بعيدة المدى", "تجاذب قصيرة المدى جداً", "كهرومغناطيسية", "جاذبية أرضية"], correctAnswer: 1, explanation: "تعمل فقط على مسافات قصيرة جداً (داخل النواة) وتتغلب على التنافر الكهربائي بين البروتونات." },
            { id: 102, topic: "نواة الذرة", question: "أكثر الأنوية استقراراً في الطبيعة من بين العناصر التالية هي نواة:", options: ["الهيدروجين", "اليورانيوم", "النيكل", "الكربون"], correctAnswer: 2, explanation: "الأنوية المتوسطة الكتلة (مثل النيكل والحديد) تمتلك أعلى طاقة ربط لكل نيوكليون." },
            { id: 103, topic: "نواة الذرة", question: "تلجأ أنوية العناصر الثقيلة جداً للوصول إلى حالة الاستقرار عن طريق:", options: ["الاندماج النووي", "الانشطار النووي", "اكتساب إلكترونات", "التأين"], correctAnswer: 1, explanation: "تنشطر لتكوين أنوية متوسطة الكتلة (أكثر استقراراً)." },
            { id: 104, topic: "نواة الذرة", question: "تلجأ أنوية العناصر الخفيفة جداً للوصول إلى حالة الاستقرار عن طريق:", options: ["الاندماج النووي", "الانشطار النووي", "فقد إلكترونات", "الإشعاع الضوئي"], correctAnswer: 0, explanation: "تندمج معاً لتكوين أنوية أثقل أقرب إلى منطقة الاستقرار (الأنوية المتوسطة)." },
            { id: 105, topic: "نواة الذرة", question: "العدد الكتلي (A) يساوي مجموع:", options: ["البروتونات والإلكترونات", "النيوترونات والإلكترونات", "البروتونات والنيوترونات", "طاقة الربط الكلية"], correctAnswer: 2, explanation: "يمثل إجمالي عدد الجسيمات داخل النواة (النيوكليونات)." }
        ];

        // ==========================================
        // 2. إدارة حالة التطبيق (State)
        // ==========================================
        let appState = 'start'; // 'start', 'quiz', 'results'
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;
        let isAnswered = false;
        let activeQuestions = [];

        const appContainer = document.getElementById('app');

        // ==========================================
        // 3. دوال مساعدة
        // ==========================================
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // دالة لضبط اتجاه الأرقام والجذور والوحدات (LTR) داخل النص العربي (RTL)
        function formatMathText(text) {
            if (typeof text !== 'string') return text;
            const mathRegex = /([-]?\d+(?:\.\d+)?\s*[×x]\s*10[⁻⁰¹²³⁴⁵⁶⁷⁸⁹]+\s*[A-Za-zλΦΔΩπεθπ²³⁻°]*|[-]?\d*\s*√\s*\d+\s*[A-Za-zλΦΔΩπεθπ²³⁻°]*|[-]?\d+(?:\.\d+)?\s*[A-Za-zλΦΔΩπεθπ²³⁻°]*)/g;
            const parts = text.split(mathRegex);
            
            return parts.map((part, index) => {
                if (!part) return '';
                if (index % 2 === 1) {
                    return `<bdi dir="ltr" class="inline-block mx-1 font-semibold text-blue-700 tracking-wide">${part}</bdi>`;
                }
                return `<span>${part}</span>`;
            }).join('');
        }

        // ==========================================
        // 4. التفاعلات (Event Handlers)
        // ==========================================
        window.startQuiz = function() {
            activeQuestions = shuffleArray(questionsData);
            appState = 'quiz';
            currentQuestionIndex = 0;
            score = 0;
            selectedOption = null;
            isAnswered = false;
            render();
        };

        window.handleOptionClick = function(index) {
            if (isAnswered) return;
            
            selectedOption = index;
            isAnswered = true;
            
            if (index === activeQuestions[currentQuestionIndex].correctAnswer) {
                score++;
            }
            render();
        };

        window.handleNextQuestion = function() {
            if (currentQuestionIndex < activeQuestions.length - 1) {
                currentQuestionIndex++;
                selectedOption = null;
                isAnswered = false;
            } else {
                appState = 'results';
            }
            render();
        };

        // ==========================================
        // 5. بناء واجهة المستخدم (Rendering)
        // ==========================================
        function renderStartScreen() {
            return `
                <div class="bg-white max-w-xl w-full rounded-3xl shadow-xl overflow-hidden border border-slate-200 fade-in">
                    <div class="bg-gradient-to-br from-blue-700 to-indigo-800 p-10 text-center text-white relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mr-20 -mt-20"></div>
                        <div class="absolute bottom-0 left-0 w-40 h-40 bg-white opacity-5 rounded-full -ml-10 -mb-10"></div>
                        
                        <i class="ph-duotone ph-graduation-cap text-8xl mx-auto mb-6 opacity-90 relative z-10 block"></i>
                        <h1 class="text-4xl font-black mb-3 relative z-10">بنك الفيزياء الشامل</h1>
                        <p class="text-blue-100 text-xl font-medium relative z-10">الصف الثاني عشر العلمي (الفترة الثانية)</p>
                    </div>
                    
                    <div class="p-10 text-center">
                        <div class="inline-flex items-center justify-center mb-8 bg-blue-50 text-blue-700 py-2 px-6 rounded-full border border-blue-100 shadow-sm">
                            <i class="ph-bold ph-list-numbers text-xl ml-2"></i>
                            <span class="font-bold text-lg">قاعدة بيانات ضخمة: ${questionsData.length} سؤال</span>
                        </div>
                        
                        <p class="text-slate-600 mb-10 leading-relaxed text-lg px-4">
                            هذا الاختبار الشامل يغطي كافة الفصول: الحث الكهرومغناطيسي، المحركات، التيار المتردد، أشباه الموصلات، والفيزياء الحديثة. يتم خلط الأسئلة عشوائياً في كل مرة.
                        </p>
                        
                        <button onclick="startQuiz()" class="group relative inline-flex items-center justify-center w-full px-8 py-5 font-bold text-white transition-all duration-300 bg-blue-600 rounded-2xl hover:bg-blue-700 hover:shadow-xl hover:shadow-blue-600/30 focus:outline-none focus:ring-4 focus:ring-blue-300 transform hover:-translate-y-1">
                            <span class="mr-3 text-xl">ابدأ التحدي الآن</span>
                            <i class="ph-fill ph-play text-2xl group-hover:-translate-x-2 transition-transform duration-300"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderQuizScreen() {
            const currentQuestion = activeQuestions[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / activeQuestions.length) * 100;
            
            let optionsHtml = currentQuestion.options.map((option, index) => {
                const isSelected = selectedOption === index;
                const isCorrect = currentQuestion.correctAnswer === index;
                
                let optionStyle = "bg-white border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-blue-300 cursor-pointer hover:shadow-md transform hover:-translate-y-1";
                let iconHtml = "";

                if (isAnswered) {
                    optionStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60 cursor-default";
                    if (isCorrect) {
                        optionStyle = "bg-green-50 border-green-500 text-green-900 font-bold shadow-md cursor-default";
                        iconHtml = `<i class="ph-fill ph-check-circle text-3xl text-green-600"></i>`;
                    } else if (isSelected && !isCorrect) {
                        optionStyle = "bg-red-50 border-red-500 text-red-900 font-bold shadow-md cursor-default";
                        iconHtml = `<i class="ph-fill ph-x-circle text-3xl text-red-600"></i>`;
                    }
                }

                return `
                    <button onclick="handleOptionClick(${index})" ${isAnswered ? 'disabled' : ''} class="w-full flex justify-between items-center p-5 rounded-2xl border-2 text-right transition-all duration-300 text-lg ${optionStyle}">
                        <span class="leading-relaxed pr-2">${formatMathText(option)}</span>
                        ${iconHtml}
                    </button>
                `;
            }).join('');

            let explanationHtml = "";
            if (isAnswered) {
                const explanationStyle = selectedOption === currentQuestion.correctAnswer ? 'bg-green-50 border-green-200 text-green-900' : 'bg-blue-50 border-blue-200 text-blue-900';
                const iconColor = selectedOption === currentQuestion.correctAnswer ? 'text-green-600' : 'text-blue-600';
                const btnText = currentQuestionIndex < activeQuestions.length - 1 ? 'انتقل للسؤال التالي' : 'عرض النتيجة النهائية';
                
                explanationHtml = `
                    <div class="fade-in mt-6">
                        <div class="p-6 md:p-8 rounded-3xl mb-6 shadow-sm border ${explanationStyle}">
                            <div class="flex items-center mb-4">
                                <i class="ph-duotone ph-book-open text-3xl ml-3 ${iconColor}"></i>
                                <h4 class="font-black text-xl">التفسير العلمي:</h4>
                            </div>
                            <p class="leading-relaxed text-lg opacity-90">${formatMathText(currentQuestion.explanation)}</p>
                        </div>
                        
                        <button onclick="handleNextQuestion()" class="w-full flex items-center justify-center p-6 bg-slate-800 text-white rounded-2xl font-bold text-xl hover:bg-slate-700 transition-all shadow-xl shadow-slate-800/20 active:scale-[0.98] transform hover:-translate-y-1">
                            <span>${btnText}</span>
                            <i class="ph-bold ph-caret-left text-2xl mr-3"></i>
                        </button>
                    </div>
                `;
            }

            return `
                <div class="w-full max-w-3xl fade-in">
                    <!-- Header & Progress -->
                    <div class="mb-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4">
                            <div>
                                <span class="text-sm font-bold text-blue-700 bg-blue-100 py-2 px-5 rounded-full border border-blue-200 shadow-sm">
                                    ${currentQuestion.topic}
                                </span>
                            </div>
                            <div class="text-slate-600 font-bold bg-white py-2 px-5 rounded-full shadow-sm border border-slate-200 text-sm">
                                السؤال <span class="text-blue-600 text-lg mx-1">${currentQuestionIndex + 1}</span> من ${activeQuestions.length}
                            </div>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-3 shadow-inner overflow-hidden">
                            <div class="bg-gradient-to-l from-blue-500 to-blue-700 h-3 rounded-full transition-all duration-500 ease-out relative" style="width: ${progress}%">
                                <div class="absolute top-0 right-0 bottom-0 left-0 bg-white/20"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Question Card -->
                    <div class="bg-white rounded-3xl shadow-md border border-slate-200 p-6 md:p-10 transition-all">
                        <h2 class="text-2xl md:text-3xl font-bold leading-relaxed mb-8 text-slate-800">
                            ${formatMathText(currentQuestion.question)}
                        </h2>
                        <div class="space-y-4">
                            ${optionsHtml}
                        </div>
                        ${explanationHtml}
                    </div>
                </div>
            `;
        }

        function renderResultsScreen() {
            const percentage = Math.round((score / activeQuestions.length) * 100);
            let message = "";
            let trophyColor = "text-slate-400";
            
            if (percentage >= 90) { message = "ممتاز! مستوى رائع جداً ومستعد للاختبار النهائي 🌟"; trophyColor = "text-yellow-500"; }
            else if (percentage >= 75) { message = "جيد جداً! أساسياتك قوية، استمر في المراجعة 👍"; trophyColor = "text-yellow-500"; }
            else if (percentage >= 60) { message = "جيد، ولكنك بحاجة لتغطية بعض الثغرات 📚"; trophyColor = "text-yellow-500"; }
            else { message = "تحتاج إلى مراجعة الدروس بشكل مكثف وحل المزيد من التمارين 💡"; }

            return `
                <div class="bg-white max-w-lg w-full rounded-3xl shadow-xl p-10 text-center border border-slate-200 fade-in">
                    <div class="inline-flex items-center justify-center w-28 h-28 rounded-full bg-slate-50 border-8 border-slate-100 mb-6 shadow-inner">
                        <i class="ph-duotone ph-trophy text-6xl ${trophyColor}"></i>
                    </div>
                    <h2 class="text-3xl font-black mb-3">النتيجة النهائية</h2>
                    <p class="text-slate-500 mb-8 text-lg">${message}</p>
                    
                    <div class="text-8xl font-black text-blue-600 mb-10 drop-shadow-sm">
                        ${percentage}<span class="text-5xl">%</span>
                    </div>
                    
                    <div class="flex justify-center mb-10 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                        <div class="text-center w-1/2">
                            <p class="text-sm text-slate-500 mb-2 font-medium">الإجابات الصحيحة</p>
                            <p class="text-4xl font-black text-green-600">${score}</p>
                        </div>
                        <div class="w-px bg-slate-200"></div>
                        <div class="text-center w-1/2">
                            <p class="text-sm text-slate-500 mb-2 font-medium">الإجابات الخاطئة</p>
                            <p class="text-4xl font-black text-red-600">${activeQuestions.length - score}</p>
                        </div>
                    </div>

                    <button onclick="startQuiz()" class="w-full inline-flex items-center justify-center px-6 py-5 font-bold text-white transition-all duration-300 bg-slate-800 rounded-2xl hover:bg-slate-700 hover:shadow-lg transform hover:-translate-y-1">
                        <i class="ph-bold ph-arrow-counter-clockwise text-2xl ml-3"></i>
                        <span class="text-xl">إعادة الاختبار بأسئلة عشوائية</span>
                    </button>
                </div>
            `;
        }

        function render() {
            if (appState === 'start') {
                appContainer.innerHTML = renderStartScreen();
            } else if (appState === 'quiz') {
                appContainer.innerHTML = renderQuizScreen();
            } else if (appState === 'results') {
                appContainer.innerHTML = renderResultsScreen();
            }
        }

        // بدء تشغيل التطبيق
        render();

    </script>
</body>
</html>
