            { c: 1, n: 29, q: "ماذا يحدث للتدفق المغناطيسي عندما تسقط خطوط المجال موازية للسطح؟", a: "ينعدم التدفق المغناطيسي.", w: ["يصبح قيمة عظمى.", "يقل للنصف.", "تزداد قيمته."], e: "لأن خطوط المجال لا تخترق السطح (الزاوية 90 مع العمودي)." },
            { c: 1, n: 30, q: "ماذا يحدث للتيار الحثي عند توقف المغناطيس عن الحركة داخل الملف؟", a: "ينعدم التيار الحثي.", w: ["يستمر بالمرور لثوانٍ ثم يقل.", "يثبت عند قيمة عظمى.", "ينعكس اتجاهه."], e: "لأن القوة الدافعة الحثية تتطلب وجود (تغير) مستمر في التدفق، وتوقف الحركة يعني انعدام التغير." },
            { c: 1, n: 31, q: "ماذا يحدث لاتجاه التيار التأثيري المتولد عند تقريب قطب شمالي لمغناطيس من ملف؟", a: "يتولد قطب شمالي مشابه ليقاوم الاقتراب.", w: ["يتولد قطب جنوبي لجذب المغناطيس.", "ينعدم التيار لعدم وجود مقاومة.", "يتحول الملف لمكثف."], e: "حسب قانون لنز، يُولد التيار الحثي مجالاً يعاكس التغير المولد له (يقاوم الاقتراب بالتنافر)." },
            { c: 1, n: 32, q: "ماذا يحدث للتدفق المغناطيسي عندما تكون الزاوية بين خطوط المجال والعمودي على السطح 90 درجة؟", a: "ينعدم التدفق المغناطيسي.", w: ["يكون أكبر ما يمكن.", "يصل لنصف قيمته.", "يظل ثابتاً."], e: "لأن جيب تمام الزاوية 90 يساوي صفر." },
            { c: 1, n: 33, q: "ماذا يحدث للقوة الدافعة الكهربائية في المولد عندما يكون مستوى الملف عمودياً على خطوط المجال؟", a: "تنعدم (تساوي صفر).", w: ["تكون عظمى.", "يقل اتجاهها.", "تتضاعف."], e: "لأن معدل التغير في التدفق يكون صفر في هذه اللحظة." },
            { c: 1, n: 34, q: "ماذا يحدث للقوة الدافعة الكهربائية في المولد عندما يكون مستوى الملف موازياً لخطوط المجال؟", a: "تكون قيمة عظمى.", w: ["تنعدم.", "تساوي نصف القيمة العظمى.", "تعكس القطبية."], e: "لأن معدل قطع خطوط المجال (التغير في التدفق) يكون أقصى ما يمكن." },
            { c: 1, n: 35, q: "ماذا يحدث لعزم الازدواج عندما يكون مستوى ملف المحرك عمودياً على خط المجال؟", a: "ينعدم عزم الازدواج.", w: ["يكون قيمة عظمى.", "يتضاعف.", "لا يتغير."], e: "لأن خط عمل القوتين يمر بمحور الدوران." },
            { c: 1, n: 36, q: "ماذا يحدث لملف المحرك عند انعدام عزم الازدواج في الوضع العمودي؟", a: "يستمر بالدوران بسبب القصور الذاتي الدوراني.", w: ["يتوقف.", "يدور للخلف.", "ينعدم التيار."], e: "بسبب اكتسابه كمية حركة دورانية سابقة تجعله يتخطى هذا الوضع." },
            { c: 1, n: 37, q: "ماذا يحدث لمسار إلكترون يتحرك موازياً لخطوط مجال مغناطيسي؟", a: "لا يتأثر بقوة مغناطيسية ويتحرك في خط مستقيم.", w: ["ينحرف بمسار دائري.", "يتوقف.", "يندفع عمودياً."], e: "لأن الزاوية بين اتجاه حركته والمجال تساوي صفر (sin 0 = 0)." },
            { c: 1, n: 38, q: "ماذا يحدث لمسار بروتون يتحرك عمودياً على مجال مغناطيسي؟", a: "ينحرف في مسار دائري.", w: ["يستمر في خط مستقيم.", "يعود لنقطة الانطلاق.", "يتوقف."], e: "لتأثره بقوة مغناطيسية عمودية على اتجاه سرعته تعمل كقوة جاذبة مركزية." },
            { c: 1, n: 39, q: "ماذا يحدث لقراءة الميزان الزنبركي المعلق به ساق يمر بها تيار عند وضعها في مجال مغناطيسي وتأثرها بقوة لأعلى تساوي وزنها؟", a: "تصبح قراءة الميزان صفراً.", w: ["تتضاعف قراءة الميزان.", "تتذبذب القراءة.", "يظل الميزان يسجل نفس الوزن."], e: "لأن القوة المغناطيسية المؤثرة لأعلى تعادل وزن الساق لأسفل، فتصبح المحصلة صفر." },

            // ================= الفصل الثاني =================
            { c: 2, n: 40, q: "ماذا يحدث لقيمة المقاومة الصرفة بتغير نوع التيار الكهربائي (مستمر أو متردد) أو تردده؟", a: "لا تتغير.", w: ["تزداد بزيادة التردد.", "تقل بزيادة التردد.", "تنعدم في التيار المستمر."], e: "لأن المقاومة الأومية تعتمد فقط على أبعاد الموصل ونوع مادته ودرجة حرارته." },
            { c: 2, n: 41, q: "ماذا يحدث للممانعة الحثية لملف نقي عند مرور تيار مستمر فيه؟", a: "تنعدم (تساوي صفر).", w: ["تصبح لا نهائية القيمة.", "تساوي مقاومته الأومية.", "تكون أكبر ما يمكن."], e: "لأن تردد التيار المستمر يساوي صفر، والممانعة الحثية تتناسب طردياً مع التردد." },
            { c: 2, n: 42, q: "ماذا يحدث للممانعة السعوية لمكثف عند توصيله بمصدر تيار مستمر؟", a: "تصبح لا نهائية القيمة ويمنع المكثف مرور التيار.", w: ["تنعدم ويسمح بمرور التيار.", "تساوي سعة المكثف.", "تتذبذب باستمرار."], e: "لأن التردد صفر، والممانعة السعوية تتناسب عكسياً مع التردد، فتعمل كدائرة مفتوحة." },
            { c: 2, n: 43, q: "ماذا يحدث للممانعة الحثية لملف عند زيادة تردد التيار المتردد المار فيه؟", a: "تزداد الممانعة الحثية.", w: ["تقل الممانعة الحثية.", "لا تتغير.", "تنعدم تماماً."], e: "بسبب التناسب الطردي بين الممانعة الحثية وتردد التيار المتردد." },
            { c: 2, n: 44, q: "ماذا يحدث للممانعة السعوية لمكثف عند زيادة تردد التيار المتردد المار فيه؟", a: "تقل الممانعة السعوية.", w: ["تزداد الممانعة السعوية.", "لا تتغير.", "تصل لقيمة عظمى ثم تثبت."], e: "بسبب التناسب العكسي بين الممانعة السعوية وتردد التيار المتردد." },
            { c: 2, n: 45, q: "ماذا يحدث لشدة التيار المار في دائرة تيار متردد تحوي ملفاً حثياً فقط عند زيادة التردد؟", a: "تقل شدة التيار.", w: ["تزداد شدة التيار.", "تظل ثابتة.", "تصل لقيمة عظمى فوراً."], e: "لأن بزيادة التردد تزداد الممانعة الحثية، وبالتالي تقل شدة التيار (علاقة عكسية)." },
            { c: 2, n: 46, q: "ماذا يحدث لشدة التيار المار في دائرة تيار متردد تحوي مكثفاً فقط عند زيادة التردد؟", a: "تزداد شدة التيار.", w: ["تقل شدة التيار.", "ينعدم التيار.", "تظل ثابتة."], e: "لأن بزيادة التردد تقل الممانعة السعوية، وبالتالي يسهل مرور التيار وتزداد شدته." },
            { c: 2, n: 47, q: "ماذا يحدث لإضاءة مصباح متصل على التوالي في دائرة (R-L-C) عند جعل الممانعة الحثية تساوي الممانعة السعوية؟", a: "تزداد إضاءة المصباح لأكبر قيمة.", w: ["تنطفئ الإضاءة.", "تقل الإضاءة تدريجياً.", "تظل الإضاءة ثابتة."], e: "لأن الدائرة تصل لحالة الرنين، فتكون الممانعة الكلية أقل ما يمكن ويمر أكبر تيار." },
            { c: 2, n: 48, q: "ماذا يحدث لشدة تيار دائرة تحوي (مقاومة، ملف، مكثف) عند إلغاء المقاومة الصرفة منها؟", a: "تزداد شدة التيار.", w: ["تقل شدة التيار.", "تنعدم شدة التيار.", "تظل ثابتة."], e: "لأن إزالة المقاومة الصرفة يقلل من المعاوقة (الممانعة الكلية) للدائرة." },
            { c: 2, n: 49, q: "ماذا يحدث لشدة تيار دائرة تحوي (مقاومة، ملف، مكثف) عند إلغاء المكثف منها؟", a: "تقل شدة التيار.", w: ["تزداد شدة التيار.", "لا تتأثر.", "تمر بحالة رنين."], e: "لأن إلغاء المكثف يزيد المعاوقة (إذا كانت الدائرة مصممة بتعادل نسبي)، فتزداد الممانعة الكلية." },
            { c: 2, n: 50, q: "ماذا يحدث لمقدار الطاقة المغناطيسية المختزنة في ملف حثي عند زيادة الشدة الفعالة للتيار للمثلين؟", a: "تزداد لأربعة أمثالها.", w: ["تزداد للمثلين.", "تقل للنصف.", "لا تتأثر."], e: "لأن الطاقة المغناطيسية تتناسب طردياً مع مربع شدة التيار (E = 0.5 L I²)." },
            { c: 2, n: 51, q: "ماذا يحدث للمقاومة الكلية لدائرة تيار متردد (R-L-C) عندما تكون في حالة رنين؟", a: "تقل وتصبح مساوية للمقاومة الأومية فقط.", w: ["تصبح أكبر ما يمكن.", "تنعدم تماماً.", "تساوي الممانعة الحثية فقط."], e: "لأن في حالة الرنين، الممانعة الحثية تلغي الممانعة السعوية، ويتبقى فقط المقاومة الأومية." },
            { c: 2, n: 52, q: "ماذا يحدث للجهد الكهربائي مقارنة بالتيار عندما يكون تردد دائرة (R-L-C) أقل من تردد الرنين؟", a: "يتأخر الجهد الكهربائي عن التيار الكهربائي.", w: ["يتقدم الجهد على التيار.", "يتفق الجهد والتيار في الطور.", "ينعدم الجهد."], e: "لأن الخواص السعوية تتغلب على الخواص الحثية في الترددات المنخفضة." },
            { c: 2, n: 53, q: "ماذا يحدث للجهد الكهربائي مقارنة بالتيار عندما يكون تردد دائرة (R-L-C) أكبر من تردد الرنين؟", a: "يتقدم الجهد الكهربائي على التيار الكهربائي.", w: ["يتأخر الجهد عن التيار.", "يتفقان في الطور.", "ينعكس الجهد."], e: "لأن الخواص الحثية تتغلب على الخواص السعوية في الترددات العالية." },
            { c: 2, n: 54, q: "ماذا يحدث لفرق الطور بين الجهد والتيار عندما يكون تردد الدائرة مساوياً لتردد الرنين؟", a: "ينعدم (يتفقان في الطور).", w: ["يصبح 90 درجة.", "يصبح 180 درجة.", "يصبح 45 درجة."], e: "لأن الدائرة تسلك سلوك مقاومة أومية خالصة في حالة الرنين." },
            { c: 2, n: 55, q: "ماذا يحدث لتردد دائرة الرنين عند إنقاص سعة المكثف المتغير إلى الربع؟", a: "يزداد التردد إلى الضِعف.", w: ["يقل التردد للنصف.", "يزداد لأربعة أمثال.", "لا يتغير التردد."], e: "لأن تردد الرنين يتناسب عكسياً مع الجذر التربيعي لسعة المكثف." },
            { c: 2, n: 56, q: "ماذا يحدث لقراءة الأميتر (التيار) في دائرة رنين عند زيادة معامل الحث الذاتي للملف؟", a: "تقل القراءة.", w: ["تزداد القراءة.", "تظل ثابتة.", "تتذبذب."], e: "لأن زيادة الحث تُخرج الدائرة من حالة الرنين، فتزداد الممانعة الكلية وتقل شدة التيار." },
            { c: 2, n: 57, q: "ماذا يحدث لفرق الجهد الكلي بين طرفي الملف والمكثف معاً في دائرة الرنين؟", a: "يساوي صفر.", w: ["يساوي جهد المصدر.", "يساوي ضعف جهد المقاومة.", "يكون أكبر ما يمكن."], e: "لأن جهدهما متساويان في المقدار ومتعاكسان في الطور، فيلغي كل منهما الآخر." },
            { c: 2, n: 58, q: "ماذا يحدث لفرق الجهد بالنسبة للتيار في دائرة تحوي مقاومة أومية فقط؟", a: "يتفقان في الطور.", w: ["يتقدم الجهد.", "يتأخر الجهد.", "يتعاكسان تماماً."], e: "لأن المقاومة لا تخزن طاقة ولا تسبب إعاقة تعتمد على التردد." },
            { c: 2, n: 59, q: "ماذا يحدث لفرق الجهد بالنسبة للتيار في دائرة تحوي ملف حثي نقي فقط؟", a: "يتقدم الجهد على التيار بربع دورة.", w: ["يتأخر الجهد بربع دورة.", "يتفقان في الطور.", "يتقدم الجهد بنصف دورة."], e: "بسبب خاصية الحث الذاتي التي تقاوم التغير في شدة التيار المتزايد." },
            { c: 2, n: 60, q: "ماذا يحدث لفرق الجهد بالنسبة للتيار في دائرة تحوي مكثف فقط؟", a: "يتأخر الجهد عن التيار بربع دورة.", w: ["يتقدم الجهد بربع دورة.", "يتفقان.", "يتأخر بنصف دورة."], e: "لأن الجهد عبر المكثف يبدأ بالتزايد بعد تراكم الشحنات التي يمررها التيار." },

            // ================= الفصل الثالث =================
            { c: 3, n: 61, q: "ماذا يحدث لدرجة التوصيل الكهربائي لأشباه الموصلات النقية بارتفاع درجة حرارتها؟", a: "تزداد درجة التوصيل الكهربائي.", w: ["تقل درجة التوصيل الكهربائي.", "تنعدم درجة التوصيل.", "لا تتأثر بالحرارة."], e: "بسبب اكتساب الإلكترونات طاقة كافية للقفز من نطاق التكافؤ إلى نطاق التوصيل." },
            { c: 3, n: 62, q: "ماذا يحدث لأشباه الموصلات النقية عند تبريدها لدرجة الصفر المطلق؟", a: "تصبح عازلة تماماً للتيار الكهربائي.", w: ["تصبح فائقة التوصيل.", "تزداد قدرتها التوصيلية.", "تتحول إلى فلزات."], e: "لانعدام الطاقة الحرارية التي تمكن الإلكترونات من تخطي فجوة الطاقة." },
            { c: 3, n: 63, q: "ماذا يحدث لعدد حاملات الشحنة في بلورة شبه موصل نقية عند زيادة نسبة الشوائب (التطعيم)؟", a: "يزداد عدد حاملات الشحنة.", w: ["يقل عدد حاملات الشحنة.", "يظل ثابتاً.", "تتحول جميعها لشحنات موجبة."], e: "لأن ذرات الشوائب تضيف إما إلكترونات حرة أو فجوات إضافية إلى البلورة." },
            { c: 3, n: 64, q: "ماذا يحدث لمقاومة بلورة شبه الموصل النقية عند إضافة ذرات شائبة إليها؟", a: "تقل المقاومة.", w: ["تزداد المقاومة.", "لا تتغير المقاومة.", "تصبح عازلة تماماً."], e: "بسبب زيادة عدد حاملات الشحنة الحرة التي تساهم في التوصيل الكهربائي." },
            { c: 3, n: 65, q: "ماذا يحدث لبلورة الجرمانيوم النقية عند تطعيمها بشوائب من عناصر المجموعة الخامسة (كالزرنيخ)؟", a: "تصبح بلورة شبه موصل من النوع السالب (N).", w: ["تصبح من النوع الموجب (P).", "تتحول لمادة عازلة.", "تصبح متعادلة الشحنة الإجمالية ولا توصل."], e: "لأن الذرة الخماسية توفر إلكتروناً إضافياً حراً كحامل شحنة أغلبية." },
            { c: 3, n: 66, q: "ماذا يحدث لبلورة الجرمانيوم النقية عند تطعيمها بشوائب من عناصر المجموعة الثالثة (كالبورون)؟", a: "تصبح بلورة شبه موصل من النوع الموجب (P).", w: ["تصبح من النوع السالب (N).", "تصبح فائقة التوصيل.", "لا تتأثر."], e: "لأن الذرة الثلاثية تخلف فجوة (ثقباً) يعمل كحامل شحنة موجب أغلبية." },
            { c: 3, n: 67, q: "ماذا يحدث كهربائياً لبلورة شبه الموصل بعد التطعيم؟", a: "تبقى متعادلة كهربائياً.", w: ["تكتسب شحنة موجبة.", "تكتسب شحنة سالبة.", "تتذبذب شحنتها."], e: "لأن الذرات المضافة متعادلة أصلاً (عدد البروتونات = عدد الإلكترونات فيها)." },
            { c: 3, n: 68, q: "ماذا يحدث عند التحام بلورة سالبة (N) مع بلورة موجبة (P) لتكوين وصلة ثنائية؟", a: "تنتقل إلكترونات وتتكون منطقة الاستنزاف.", w: ["يندمجان ليصبحا فلزاً.", "تتنافر البلورتان وتنفصلان.", "لا يحدث أي تفاعل."], e: "تنتشر الإلكترونات والفجوات عبر الحدود فتتكون منطقة خالية من حاملات الشحنة." },
            { c: 3, n: 69, q: "ماذا يحدث للبلورة (N) عند تكوين الوصلة الثنائية؟", a: "تكتسب جهداً موجباً.", w: ["تكتسب جهداً سالباً.", "تبقى متعادلة.", "ينعدم جهدها."], e: "لأنها تفقد جزءاً من إلكتروناتها (الشحنات السالبة) التي تنتشر إلى البلورة P." },
            { c: 3, n: 70, q: "ماذا يحدث للبلورة (P) عند تكوين الوصلة الثنائية؟", a: "تكتسب جهداً سالباً.", w: ["تكتسب جهداً موجباً.", "تبقى متعادلة.", "تتأين إيجابياً."], e: "لأنها تكتسب إلكترونات وافدة من البلورة N." },
            { c: 3, n: 71, q: "ماذا يحدث للوصلة الثنائية عند توصيلها بطريقة الانحياز الأمامي؟", a: "يقل اتساع منطقة الاستنزاف وتسمح بمرور التيار.", w: ["يزداد اتساع منطقة الاستنزاف وتمنع التيار.", "تصبح عازلة تماماً.", "تحترق الوصلة."], e: "لأن المجال الخارجي للبطارية يعاكس المجال الداخلي للوصلة ويضعفه." },
            { c: 3, n: 72, q: "ماذا يحدث للوصلة الثنائية عند توصيلها بطريقة الانحياز العكسي؟", a: "يزداد اتساع منطقة الاستنزاف وتمنع مرور التيار.", w: ["يقل اتساع منطقة الاستنزاف وتمرر التيار.", "تولد تياراً متردداً.", "تفرغ شحنتها."], e: "لأن المجال الخارجي للبطارية يكون في نفس اتجاه المجال الداخلي فيقويه." },
            { c: 3, n: 73, q: "ماذا يحدث لحاملات الشحنة (الأكثرية) في حالة الانحياز الأمامي للوصلة الثنائية؟", a: "تندفع وتتحرك باتجاه منطقة الالتحام.", w: ["تبتعد عن منطقة الالتحام.", "تتوقف عن الحركة.", "تتبادل أماكنها بشكل عشوائي."], e: "لتنافرها مع أقطاب البطارية المشابهة لها في الشحنة." },
            { c: 3, n: 74, q: "ماذا يحدث لحاملات الشحنة (الأكثرية) في حالة الانحياز العكسي للوصلة الثنائية؟", a: "تبتعد عن منطقة الالتحام.", w: ["تندفع نحو منطقة الالتحام.", "لا تتأثر.", "تهتز في مكانها."], e: "لتجاذبها مع أقطاب البطارية المخالفة لها في الشحنة." },
            { c: 3, n: 75, q: "ماذا يحدث للمجال الكهربائي الخارجي مقارنة بالمجال الداخلي في حالة الانحياز العكسي؟", a: "يكون في نفس اتجاهه مما يؤدي لزيادة المجال المحصل.", w: ["يكون معاكساً له.", "يلغي المجال الداخلي.", "يتذبذب بشكل متعامد."], e: "لذلك تزداد منطقة الاستنزاف وتمنع الوصلة مرور التيار." },
            { c: 3, n: 76, q: "ماذا يحدث للمجال الكهربائي الخارجي مقارنة بالمجال الداخلي في حالة الانحياز الأمامي؟", a: "يكون معاكساً له مما يضعف المجال المحصل ويضيق منطقة الاستنزاف.", w: ["يكون في نفس الاتجاه.", "لا يتأثر المجال الداخلي.", "يتعامد عليه."], e: "لذلك تقل مقاومة الوصلة وتسمح بمرور التيار." },
            { c: 3, n: 77, q: "ماذا يحدث للتيار المتردد عند مروره في وصلة ثنائية؟", a: "يتم تقويمه تقويماً نصف موجي.", w: ["يتضاعف تردده.", "يتحول لموجات راديو.", "يمر دون أي تغيير."], e: "لأن الوصلة تسمح بمرور التيار في الاتجاه الأمامي فقط وتمنعه في العكسي." },
            { c: 3, n: 78, q: "ماذا يحدث عند وصول الوصلة الثنائية إلى حالة التوازن الكهربائي؟", a: "يمنع المجال الداخلي انتقال مزيد من الشحنات.", w: ["تنهار الوصلة وتسمح بمرور عالي للتيار.", "ينعدم المجال الداخلي.", "تنعكس أقطاب الوصلة."], e: "لأن الجهد الحاجز يصل لقوة تكفي لصد حاملات الشحنة الإضافية من العبور." },
            { c: 3, n: 79, q: "ماذا يحدث للإلكترونات في المواد العازلة عند درجة الحرارة العادية؟", a: "لا تستطيع القفز من نطاق التكافؤ إلى التوصيل.", w: ["تقفز بسهولة مكونة تياراً.", "تتجمع في فجوة الطاقة.", "تنبعث خارج المادة."], e: "بسبب الاتساع الكبير جداً لفجوة الطاقة المحظورة." },
            { c: 3, n: 80, q: "ماذا يحدث لتيار الدائرة عند عكس أقطاب البطارية المتصلة بوصلة ثنائية (من أمامي إلى عكسي)؟", a: "ينقطع مرور التيار الكهربائي.", w: ["تزداد شدة التيار.", "ينعكس اتجاه التيار دون نقصان.", "يتحول لتيار متردد."], e: "لأن الوصلة تصبح في حالة انحياز عكسي وتعمل كمفتاح مفتوح." },
            { c: 3, n: 81, q: "ماذا يحدث للمواد العازلة عند تطبيق فرق جهد عليها في درجات الحرارة العادية؟", a: "لا توصل التيار لأن الإلكترونات لا تقفز لنطاق التوصيل.", w: ["توصل التيار بسرعة.", "تتحول لمواد موصلة.", "تشع ضوءاً."], e: "لأن فجوة الطاقة كبيرة وتتطلب طاقة أعلى بكثير من الجهد العادي لعبورها." },

            // ================= الفصل الرابع =================
            { c: 4, n: 82, q: "ماذا يحدث عند سقوط ضوء ذو تردد مناسب على أسطح بعض الفلزات؟", a: "تنبعث منها إلكترونات ضوئية.", w: ["تمتص الفلزات الضوء وتبرد.", "ينعكس الضوء بضعف السرعة.", "تتحول الفلزات لعوازل."], e: "بسبب ظاهرة التأثير الكهروضوئي، حيث تنزع الفوتونات الإلكترونات من السطح." },
            { c: 4, n: 83, q: "ماذا يحدث لطاقة الفوتون عندما يزداد تردده؟", a: "تزداد طاقته.", w: ["تقل طاقته.", "لا تتغير.", "تصبح سالبة."], e: "لأن طاقة الفوتون تتناسب طردياً مع تردده (E = h.f)." },
            { c: 4, n: 84, q: "ماذا يحدث لطاقة الفوتون عندما يزداد طوله الموجي؟", a: "تقل طاقته.", w: ["تزداد طاقته.", "تظل ثابتة.", "تتضاعف قيمتها."], e: "لأن طاقة الفوتون تتناسب عكسياً مع طوله الموجي (E = hc/λ)." },
            { c: 4, n: 85, q: "ماذا يحدث لسرعة الفوتون عندما تتغير طاقته أو تردده؟", a: "لا تتغير (سرعته ثابتة).", w: ["تزداد بزيادة الطاقة.", "تقل بزيادة التردد.", "تتذبذب."], e: "لأن جميع الفوتونات تتحرك بسرعة ثابتة في الفراغ وهي سرعة الضوء (c)." },
            { c: 4, n: 86, q: "ماذا يحدث للذرة عندما ينتقل إلكترون من مستوى طاقة أدنى إلى مستوى أعلى؟", a: "تمتص الذرة فوتوناً مساوياً لفرق الطاقة.", w: ["تبعث الذرة فوتوناً ضوئياً.", "تنقسم الذرة لنصفين.", "تفقد بروتوناً."], e: "لأن الإلكترون يحتاج لاكتساب كمية محددة (كَمّة) من الطاقة للارتقاء." },
            { c: 4, n: 87, q: "ماذا يحدث للذرة عندما ينتقل إلكترون من مستوى طاقة أعلى إلى مستوى أدنى؟", a: "تبعث الذرة فوتوناً طاقته تساوي الفرق.", w: ["تمتص فوتوناً إضافياً.", "ينعدم الإشعاع تماماً.", "يزداد حجم الذرة."], e: "للتخلص من الطاقة الزائدة والعودة لحالة الاستقرار." },
            { c: 4, n: 88, q: "ماذا يحدث لطاقة الحركة للإلكترونات المنبعثة عند زيادة شدة الضوء الساقط (مع ثبات التردد)؟", a: "لا تتأثر ولا تتغير.", w: ["تزداد طردياً.", "تقل للنصف.", "تصل لقيمة عظمى."], e: "لأن طاقة الحركة تعتمد على تردد الفوتون (طاقته) وليس على عدد الفوتونات (الشدة)." },
            { c: 4, n: 89, q: "ماذا يحدث لعدد الإلكترونات المنبعثة (شدة التيار) عند زيادة شدة الضوء ذو التردد المناسب؟", a: "يزداد معدل انبعاث الإلكترونات.", w: ["يقل عدد الإلكترونات.", "لا يتغير العدد.", "تتوقف الإلكترونات عن الانبعاث."], e: "لأن زيادة الشدة تعني زيادة عدد الفوتونات الساقطة، وكل فوتون يحرر إلكتروناً." },
            { c: 4, n: 90, q: "ماذا يحدث لطاقة حركة الإلكترونات الضوئية المنبعثة عند زيادة تردد الضوء الساقط؟", a: "تزداد طاقتها الحركية.", w: ["تقل طاقتها.", "تثبت سرعتها.", "تتحول لطاقة كامنة."], e: "لأن الفوتون يحمل طاقة أكبر، فبعد خصم دالة الشغل، يتبقى طاقة حركية أكبر للإلكترون." },
            { c: 4, n: 91, q: "ماذا يحدث لتحرر الإلكترونات من سطح فلز إذا كان تردد الضوء الساقط أقل من تردد العتبة؟", a: "لا تتحرر إلكترونات أبداً.", w: ["تتحرر ببطء.", "تتحرر بعد وقت طويل.", "تتحرر بطاقة حركية سالبة."], e: "لأن طاقة الفوتون غير كافية لكسر ارتباط الإلكترون بالفلز (دالة الشغل)." },
            { c: 4, n: 92, q: "ماذا يحدث لتحرر الإلكترونات إذا كان تردد الضوء الساقط يساوي تردد العتبة للفلز؟", a: "تتحرر الإلكترونات دون طاقة حركية.", w: ["لا تتحرر.", "تتحرر بسرعة فائقة.", "تتحرر وتعود فوراً."], e: "لأن طاقة الفوتون تُستهلك بالكامل في تحرير الإلكترون (دالة الشغل) ولا يتبقى شيء لسرعته." },
            { c: 4, n: 93, q: "ماذا يحدث لتحرر الإلكترونات من سطح فلز إذا كان تردد الضوء الساقط أكبر من تردد العتبة للفلز؟", a: "تتحرر الإلكترونات وتكتسب طاقة حركية.", w: ["لا تتحرر.", "تحترق الفلزات.", "تنبعث بروتونات."], e: "لأن طاقة الفوتون تكفي لكسر ارتباط الإلكترون وما يتبقى يتحول لطاقة حركية." },
            { c: 4, n: 94, q: "ماذا يحدث لمقدار (القيمة المطلقة) لجهد القطع عند زيادة تردد الضوء الساقط؟", a: "يزداد مقدار جهد القطع.", w: ["يقل مقداره.", "ينعدم.", "لا يتأثر."], e: "لأن الإلكترونات تمتلك طاقة حركية أكبر، فنحتاج لجهد عكسي أكبر لإيقافها." },
            { c: 4, n: 95, q: "ماذا يحدث لسرعة الإلكترونات المنبعثة عند عكس أقطاب البطارية وزيادة الجهد العكسي؟", a: "تقل سرعتها حتى تتوقف تماماً.", w: ["تزداد سرعتها بشدة.", "لا تتأثر.", "تنحرف في مسار دائري."], e: "لأن المجال الكهربائي العكسي يبذل شغلاً سالباً يقاوم طاقة حركتها حتى يوقفها (جهد القطع)." },
            { c: 4, n: 96, q: "ماذا يحدث لجهد القطع عند زيادة شدة الضوء الساقط (مع ثبات التردد)؟", a: "لا يتغير.", w: ["يزداد طردياً.", "يقل عكسياً.", "ينعدم."], e: "لأن طاقة الإلكترونات لا تتغير بتغير الشدة، وجهد القطع يعتمد فقط على طاقة الإلكترون." },
            { c: 4, n: 97, q: "ماذا يحدث لدالة الشغل أو لتردد العتبة لفلز عند تغير تردد أو شدة الضوء الساقط عليه؟", a: "لا تتغير.", w: ["تتغير طردياً مع التردد.", "تقل مع زيادة الشدة.", "تنعدم مع الضوء الخافت."], e: "لأنها صفة مميزة تعتمد على نوع مادة الفلز فقط وليس على الضوء الساقط." },
            { c: 4, n: 98, q: "ماذا يحدث إذا سقط ضوء أزرق خافت وضوء أحمر ساطع على سطح فلز حساس للضوء الأزرق؟", a: "الأزرق يحرر الإلكترونات والأحمر لا يحرر.", w: ["الأحمر يحرر والأزرق لا.", "كلاهما يحرر بنفس المعدل.", "لا يحرر أي منهما."], e: "لأن التحرر يعتمد على التردد (تردد الأزرق أكبر من العتبة) وليس الشدة (الساطع)." },
            { c: 4, n: 99, q: "ماذا يحدث للطاقة الحركية العظمى للإلكترونات الضوئية المنبعثة عند إنقاص الطول الموجي للضوء الساقط؟", a: "تزداد.", w: ["تقل.", "تنعدم.", "لا تتغير."], e: "لأن نقصان الطول الموجي يعني زيادة التردد وزيادة طاقة الفوتون." },

            // ================= الفصل الخامس =================
            { c: 5, n: 100, q: "ماذا يحدث للخواص الكيميائية للذرة عند تغير العدد الذري (عدد بروتوناتها)؟", a: "تتغير لتصبح ذرة لعنصر مختلف.", w: ["لا تتغير وتبقى لنفس العنصر.", "تتحول لنظير جديد.", "تصبح أيوناً فقط."], e: "لأن العدد الذري هوية العنصر وهو الذي يحدد عدد الإلكترونات وخواصه الكيميائية." },
            { c: 5, n: 101, q: "ماذا يحدث لكتلة نواة الذرة مقارنة بمجموع كتل النيوكليونات المكونة لها وهي منفردة؟", a: "تكون كتلة النواة أقل من مكوناتها.", w: ["تكون كتلة النواة أكبر.", "تتساوى الكتلتان تماماً.", "تتذبذب الكتلة حسب النظير."], e: "بسبب النقص في الكتلة الذي يتحول لطاقة ربط نووية أثناء التكوين." },
            { c: 5, n: 102, q: "ماذا يحدث للكتلة المفقودة (النقص في الكتلة) عند تكوين النواة من نيوكليوناتها؟", a: "تتحول إلى طاقة ربط نووية.", w: ["تتبدد كحرارة في الفضاء.", "تتحول لإلكترونات.", "تتلاشى تماماً دون أثر."], e: "حسب معادلة أينشتاين (E=mc²) الكتلة المفقودة تتحول لطاقة هائلة تربط النواة." },
            { c: 5, n: 103, q: "ماذا يحدث لمدى استقرار النواة عند زيادة طاقة الربط النووية لكل نيوكليون فيها؟", a: "يزداد استقرار النواة.", w: ["يقل استقرار النواة.", "تصبح مشعة بشكل خطير.", "لا تتأثر النواة."], e: "لأن طاقة الربط لكل نيوكليون هي المقياس الحقيقي لمدى تماسك واستقرار النواة." },
            { c: 5, n: 104, q: "ماذا يحدث لقوى التنافر الكهربائية في الأنوية الثقيلة بزيادة عدد البروتونات؟", a: "تزداد قوى التنافر بشكل كبير.", w: ["تقل وتتغلب عليها القوة النووية.", "تتحول لقوى تجاذب.", "تنعدم تماماً."], e: "لأن القوة الكهربائية التنافرية هي قوة بعيدة المدى وتزداد تراكمياً بزيادة الشحنات الموجبة." },
            { c: 5, n: 105, q: "ماذا يحدث لاستقرار الأنوية الثقيلة جداً (Z > 82) بالرغم من زيادة عدد النيوترونات؟", a: "تصبح غير مستقرة وتشع.", w: ["تصبح أكثر الأنوية استقراراً.", "تندمج مع أنوية أخرى.", "لا تتغير حالتها."], e: "لأن النيوترونات الإضافية لا تكفي لتعويض التنافر الكهربائي الهائل بين العدد الكبير للبروتونات." },
            { c: 5, n: 106, q: "ماذا يحدث للأنوية ذات العدد الكتلي الصغير للوصول إلى حالة الاستقرار؟", a: "تميل إلى الاندماج النووي.", w: ["تميل إلى الانشطار النووي.", "تطلق إلكترونات باستمرار.", "تتحلل لأجزاء صغيرة."], e: "لأن الاندماج يزيد من عددها الكتلي ويقربها من قمة منحنى الاستقرار (طاقة ربط أعلى)." },
            { c: 5, n: 107, q: "ماذا يحدث للأنوية ذات العدد الكتلي الكبير للوصول إلى حالة الاستقرار؟", a: "تميل إلى الانشطار النووي.", w: ["تميل إلى الاندماج.", "تمتص نيوترونات لتثقل.", "تتجمع مكونة عنصراً أثقل."], e: "لأن الانشطار يقسمها لأنوية متوسطة أكثر استقراراً وأعلى في طاقة الربط لكل نيوكليون." },
            { c: 5, n: 108, q: "ماذا يحدث للأنوية على منحنى الاستقرار (N مقابل Z) عندما يزداد العدد الذري عن 20؟", a: "تحتاج لعدد نيوترونات أكبر من البروتونات.", w: ["تتساوى أعداد النيوترونات والبروتونات.", "يقل عدد النيوترونات.", "ينعدم وجود البروتونات."], e: "لزيادة قوة التجاذب النووي لتعويض التنافر الكهربائي المتزايد." },
            { c: 5, n: 109, q: "ماذا يحدث لقوة التجاذب النووية بين بروتونين متجاورين مقارنة بقوة التنافر الكهربائية بينهما؟", a: "تتغلب على التنافر الكهربائي.", w: ["تكون أضعف من التنافر الكهربائي.", "تتساوى تماماً لتكوين توازن سكوني.", "تنعدم تماماً."], e: "لأن القوة النووية قوية جداً (في المدى القصير) وتكفي لربط النواة رغم التنافر." },
            { c: 5, n: 110, q: "ماذا يحدث لطاقة الربط النووية لكل نيوكليون في الأنوية المتوسطة (مثل الحديد والنيكل)؟", a: "تكون أكبر ما يمكن (الأكثر استقراراً).", w: ["تكون أقل ما يمكن.", "تساوي صفر.", "تتذبذب قيمتها."], e: "لذلك لا تميل هذه الأنوية لا للانشطار ولا للاندماج فهي مستقرة طبيعياً." },

        const quizContainer = document.getElementById('quizContainer');

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function buildQuiz() {
            quizContainer.innerHTML = '';
            let currentChapter = 0;
            let sectionDiv = null;
            let questionsDiv = null;

            questionsData.forEach((qObj, index) => {
                if (qObj.c !== currentChapter) {
                    currentChapter = qObj.c;
                    sectionDiv = document.createElement('section');
                    sectionDiv.id = `ch${currentChapter}`;
                    sectionDiv.className = 'chapter-section mb-12';
                    
                    const title = document.createElement('h2');
                    title.className = 'chapter-title text-2xl font-extrabold text-blue-900 mb-6 border-b-2 border-blue-200 pb-3';
                    title.textContent = chaptersInfo[currentChapter];
                    
                    questionsDiv = document.createElement('div');
                    questionsDiv.className = 'space-y-6';

                    sectionDiv.appendChild(title);
                    sectionDiv.appendChild(questionsDiv);
                    quizContainer.appendChild(sectionDiv);
                }

                let options = [{text: qObj.a, isCorrect: true}];
                qObj.w.forEach(w => options.push({text: w, isCorrect: false}));
                options = shuffle(options);

                const qCard = document.createElement('div');
                qCard.className = 'bg-white rounded-xl shadow-md border border-slate-100 overflow-hidden';
                
                const qHeader = document.createElement('div');
                qHeader.className = 'bg-slate-50 p-5 border-b border-slate-100';
                qHeader.innerHTML = `<h3 class="text-lg font-bold text-slate-800 leading-snug"><span class="text-blue-600 mr-1">س${index + 1}:</span> ${qObj.q}</h3>`;
                
                const qBody = document.createElement('div');
                qBody.className = 'p-5';
                
                const optsGrid = document.createElement('div');
                optsGrid.className = 'grid grid-cols-1 gap-3 mb-5';
                
                const radioName = `q_${index}`;
                
                options.forEach((opt, optIndex) => {
                    const lbl = document.createElement('label');
                    lbl.className = 'cursor-pointer relative';
                    
                    const inp = document.createElement('input');
                    inp.type = 'radio';
                    inp.name = radioName;
                    inp.value = opt.isCorrect;
                    inp.className = 'peer sr-only';
                    
                    const box = document.createElement('div');
                    box.className = 'flex items-center p-3 border-2 border-slate-200 rounded-lg hover:bg-slate-50 transition-all peer-checked:border-blue-500 peer-checked:bg-blue-50';
                    
                    const circle = document.createElement('div');
                    circle.className = 'radio-dot w-5 h-5 rounded-full border-2 border-slate-300 ml-3 flex-shrink-0 transition-colors flex justify-center items-center';
                    circle.innerHTML = `<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>`;
                    
                    const txt = document.createElement('span');
                    txt.className = 'font-semibold text-slate-700 text-sm md:text-base';
                    txt.textContent = opt.text;
                    
                    box.appendChild(circle);
                    box.appendChild(txt);
                    lbl.appendChild(inp);
                    lbl.appendChild(box);
                    optsGrid.appendChild(lbl);
                });

                const btnContainer = document.createElement('div');
                btnContainer.className = 'flex justify-end';
                const checkBtn = document.createElement('button');
                checkBtn.className = 'bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg transition-colors shadow-sm';
                checkBtn.textContent = 'تحقق من الإجابة';

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'hidden mt-5 rounded-lg overflow-hidden transition-all';
                
                qBody.appendChild(optsGrid);
                btnContainer.appendChild(checkBtn);
                qBody.appendChild(btnContainer);
                qBody.appendChild(feedbackDiv);
                
                qCard.appendChild(qHeader);
                qCard.appendChild(qBody);
                questionsDiv.appendChild(qCard);

                checkBtn.addEventListener('click', () => {
                    const selected = document.querySelector(`input[name="${radioName}"]:checked`);
                    if (!selected) {
                        alert('يرجى اختيار إجابة أولاً!');
                        return;
                    }

                    const isCorrect = selected.value === "true";
                    checkBtn.disabled = true;
                    checkBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    
                    document.querySelectorAll(`input[name="${radioName}"]`).forEach(r => r.disabled = true);

                    document.querySelectorAll(`input[name="${radioName}"]`).forEach(r => {
                        const box = r.nextElementSibling;
                        if (r.value === "true") {
                            box.classList.remove('border-slate-200', 'border-blue-500', 'bg-blue-50');
                            box.classList.add('border-green-500', 'bg-green-50');
                            box.querySelector('span').classList.add('text-green-800');
                            box.querySelector('.radio-dot').classList.add('border-green-500', 'bg-green-500');
                        } else if (r.checked && r.value === "false") {
                            box.classList.remove('border-slate-200', 'border-blue-500', 'bg-blue-50');
                            box.classList.add('border-red-500', 'bg-red-50');
                            box.querySelector('span').classList.add('text-red-800');
                            box.querySelector('.radio-dot').classList.add('border-red-500', 'bg-red-500');
                        }
                    });

                    let feedbackHtml = '';
                    if (isCorrect) {
                        feedbackHtml = `
                            <div class="bg-green-100 p-4 border-r-4 border-green-500">
                                <p class="text-green-800 font-bold mb-1">إجابة صحيحة! ✅</p>
                                <p class="text-green-900 text-sm md:text-base">${qObj.e}</p>
                            </div>
                        `;
                    } else {
                        feedbackHtml = `
                            <div class="bg-red-100 p-4 border-r-4 border-red-500">
                                <p class="text-red-800 font-bold mb-1">إجابة خاطئة! ❌</p>
                                <p class="text-red-900 text-sm md:text-base"><span class="font-bold">التفسير:</span> ${qObj.e}</p>
                            </div>
                        `;
                    }
                    feedbackDiv.innerHTML = feedbackHtml;
                    feedbackDiv.classList.remove('hidden');
                });
            });
        }

        function scrollToChapter(ch) {
            const section = document.getElementById(`ch${ch}`);
            if(section) {
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            buildQuiz();

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase().trim();
                    const cards = document.querySelectorAll('.bg-white.rounded-xl');
                    let hasVisible = false;

                    cards.forEach(card => {
                        const text = card.textContent.toLowerCase();
                        if (text.includes(term)) {
                            card.style.display = '';
                            hasVisible = true;
                        } else {
                            card.style.display = 'none';
                        }
                    });

                    document.querySelectorAll('.chapter-section').forEach(sec => {
                        const visibleCards = Array.from(sec.querySelectorAll('.bg-white.rounded-xl')).filter(c => c.style.display !== 'none');
                        sec.style.display = visibleCards.length > 0 ? '' : 'none';
                    });
                });
            }
        });

    </script>
</body>
</html>
