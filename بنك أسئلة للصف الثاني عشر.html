                    { id: "p7", q: "احسب طاقة السكون بوحدة (MeV) لكتلة \\( (1) \\) mg علما ان سرعة الضوء \\( c = (3 \\times 10^{8}) \\) m/s.", a: "\\( (5.625 \\times 10^{26}) \\) MeV" }
                ]
            }
        };

        // --- MathJax Component ---
        const MathText = ({ text }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                let isMounted = true;
                const renderMath = async () => {
                    if (window.MathJax && spanRef.current) {
                        try {
                            await window.MathJax.typesetPromise([spanRef.current]);
                        } catch (e) {
                            console.error("MathJax error:", e);
                        }
                    }
                };
                
                // Small timeout to ensure DOM is ready
                setTimeout(() => {
                    if (isMounted) renderMath();
                }, 50);

                return () => { isMounted = false; };
            }, [text]);

            return <span ref={spanRef} dangerouslySetInnerHTML={{ __html: text }} className="leading-relaxed" />;
        };

        // --- Drawing Canvas Component ---
        const DrawingCanvas = ({ id, value, onChange, disabled }) => {
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);
            const pointsRef = useRef([]); // مصفوفة لتخزين إحداثيات النقاط المرسومة

            const drawAxes = (ctx, w, h) => {
                ctx.strokeStyle = '#94a3b8'; // slate-400
                ctx.lineWidth = 2;
                ctx.beginPath();
                // Y axis
                ctx.moveTo(40, 20);
                ctx.lineTo(40, h - 30);
                // X axis
                ctx.lineTo(w - 20, h - 30);
                ctx.stroke();
                
                // Arrows
                ctx.beginPath();
                ctx.moveTo(35, 25);
                ctx.lineTo(40, 20);
                ctx.lineTo(45, 25);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(w - 25, h - 35);
                ctx.lineTo(w - 20, h - 30);
                ctx.lineTo(w - 25, h - 25);
                ctx.stroke();
                
                // Labels
                ctx.fillStyle = '#64748b';
                ctx.font = '16px Arial';
                ctx.fillText('Y', 15, 30);
                ctx.fillText('X', w - 30, h - 5);
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');
                
                // ضبط أبعاد اللوحة بناءً على حجم العنصر الحاوي لتجنب التشويش
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = 250;

                const dataUrl = typeof value === 'object' ? value?.dataUrl : value;

                if (dataUrl) {
                    const img = new Image();
                    img.onload = () => {
                        context.clearRect(0, 0, canvas.width, canvas.height);
                        context.drawImage(img, 0, 0);
                    };
                    img.src = dataUrl;
                    
                    // استعادة النقاط إن وجدت لغرض الحفظ
                    if (typeof value === 'object' && value.points) {
                        pointsRef.current = value.points;
                    }
                } else {
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    drawAxes(context, canvas.width, canvas.height);
                    pointsRef.current = [];
                }
            }, [value]);

            const getCoordinates = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                }
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };

            const startDrawing = (e) => {
                if (disabled) return;
                if (e.type.includes('touch')) e.preventDefault(); // منع نزول الشاشة أثناء الرسم باللمس
                isDrawingRef.current = true;
                const { x, y } = getCoordinates(e);
                
                pointsRef.current.push({ x, y }); // حفظ النقطة

                const ctx = canvasRef.current.getContext('2d');
                ctx.strokeStyle = '#2563eb'; // blue-600
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const draw = (e) => {
                if (!isDrawingRef.current || disabled) return;
                if (e.type.includes('touch')) e.preventDefault();
                const { x, y } = getCoordinates(e);
                
                pointsRef.current.push({ x, y }); // حفظ نقاط المسار للاستخدام في تحليل الانحدار

                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if (!isDrawingRef.current || disabled) return;
                isDrawingRef.current = false;
                const ctx = canvasRef.current.getContext('2d');
                ctx.closePath();
                
                // حفظ الرسمة والنقاط معاً ككائن
                const dataUrl = canvasRef.current.toDataURL();
                onChange({ dataUrl, points: pointsRef.current });
            };

            const clearCanvas = () => {
                if (disabled) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawAxes(ctx, canvas.width, canvas.height);
                pointsRef.current = [];
                onChange(null); // مسح الإجابة
            };

            return (
                <div className="flex flex-col gap-2 w-full mt-2">
                    <p className="text-sm text-slate-500 mb-1">ارسم الخط الدال على العلاقة البيانية على المحاور أدناه:</p>
                    <div className="relative border-2 border-slate-300 rounded-lg overflow-hidden bg-white touch-none shadow-inner">
                        <canvas
                            ref={canvasRef}
                            className={`w-full h-[250px] ${disabled ? 'cursor-not-allowed opacity-70 bg-slate-50' : 'cursor-crosshair bg-white'}`}
                            onMouseDown={startDrawing}
                            onMouseMove={draw}
                            onMouseUp={stopDrawing}
                            onMouseLeave={stopDrawing}
                            onTouchStart={startDrawing}
                            onTouchMove={draw}
                            onTouchEnd={stopDrawing}
                        />
                    </div>
                    {!disabled && (
                        <button onClick={clearCanvas} className="self-end text-sm text-red-500 hover:text-red-700 font-bold px-2 py-1 transition-colors">
                            🗑 مسح الرسم وإعادة المحاولة
                        </button>
                    )}
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [appId, setAppId] = useState('default-physics-bank');
            const [answers, setAnswers] = useState({});
            const [evaluations, setEvaluations] = useState({}); // لتتبع الإجابات الصحيحة والخاطئة
            const [currentTab, setCurrentTab] = useState('term');
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [showAnswers, setShowAnswers] = useState({}); // Track which answers to reveal

            // حساب المجموع الكلي للنقاط (نقطة لكل إجابة صحيحة)
            const currentScore = Object.values(evaluations).filter(v => v === 'correct').length;

            // خوارزمية الانحدار الخطي (Linear Regression) لتحليل شكل الرسم وتجاهل الاهتزاز
            const analyzeGraphShape = (points, expectedType) => {
                if (!points || points.length < 10) return false; // يجب أن يكون هناك مسار رسم كافٍ

                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                const n = points.length;
                const H = 250; // ارتفاع لوحة الرسم

                points.forEach(p => {
                    const mx = p.x;
                    const my = H - p.y; // عكس الإحداثي الصادي لأن صفر الـ Canvas يقع في الأعلى
                    sumX += mx;
                    sumY += my;
                    sumXY += mx * my;
                    sumX2 += mx * mx;
                });

                const denominator = (n * sumX2) - (sumX * sumX);
                if (denominator === 0) return false;

                const slope = ((n * sumXY) - (sumX * sumY)) / denominator;

                // الميل الموجب (> 0.2) يعني علاقة طردية
                // الميل السالب (< -0.2) يعني علاقة عكسية
                // تم وضع 0.2 لتجاوز الخطوط الأفقية تقريباً الناتجة عن أخطاء الرسم
                
                if (expectedType === 'direct') {
                    return slope > 0.15;
                } else if (expectedType === 'inverse') {
                    return slope < -0.15;
                }
                
                return false;
            };

            // دالة لتنظيف وتوحيد النصوص لتسهيل المقارنة (إزالة التشكيل والمسافات والهمزات)
            const normalizeText = (text) => {
                if (!text) return '';
                return text.toString()
                    .replace(/[\u064B-\u065F]/g, '') // إزالة التشكيل
                    .replace(/[أإآ]/g, 'ا') // توحيد الألف
                    .replace(/ة/g, 'ه') // توحيد التاء المربوطة والهاء
                    .replace(/ى/g, 'ي') // توحيد الألف المقصورة والياء
                    .replace(/[^\u0600-\u06FFa-zA-Z0-9]/g, '') // إزالة المسافات والرموز
                    .toLowerCase();
            };

            // دالة التحقق من الإجابة
            const handleCheckAnswer = (qId, correctAnswer, options) => {
                const userAns = answers[qId];
                let isCorrect = false;

                if (currentTab === 'graphs') {
                    const q = questionBank.graphs.questions.find(q => q.id === qId);
                    if (userAns && userAns.points) {
                        isCorrect = analyzeGraphShape(userAns.points, q.graphType);
                    }
                } else if (options) {
                    // مطابقة تامة لأسئلة الاختياري والصح/خطأ
                    isCorrect = (userAns || '') === correctAnswer;
                } else {
                    // مطابقة مرنة للأسئلة المقالية والقصيرة
                    const textAns = userAns || '';
                    isCorrect = normalizeText(textAns) === normalizeText(correctAnswer);
                    
                    // مساعدة للأسئلة المقالية الطويلة (يعتبرها صحيحة إذا طابقت 50% من الكلمات الدلالية)
                    if (!isCorrect && correctAnswer.length > 20) {
                        const userWords = normalizeText(textAns).match(/.{1,4}/g) || [];
                        const correctNormalized = normalizeText(correctAnswer);
                        const matchCount = userWords.filter(w => correctNormalized.includes(w)).length;
                        if (matchCount > userWords.length * 0.5 && textAns.length > 3) { 
                            isCorrect = true;
                        }
                    }
                }

                setEvaluations(prev => ({ ...prev, [qId]: isCorrect ? 'correct' : 'incorrect' }));
            };

            // Initialize Firebase & Auth
            useEffect(() => {
                const initFirebase = async () => {
                    if (typeof window.firebaseModules === 'undefined') {
                        setTimeout(initFirebase, 100);
                        return;
                    }

                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.firebaseModules;
                        
                        let fbConfig = {};
                        if (typeof __firebase_config !== 'undefined') {
                            fbConfig = JSON.parse(__firebase_config);
                        } else {
                            console.warn("Using mock firebase config for local dev");
                            setLoading(false); // mock loading finish for pure local dev if needed
                            return;
                        }

                        const app = initializeApp(fbConfig);
                        const auth = getAuth(app);
                        const firestoreDb = getFirestore(app);
                        setDb(firestoreDb);

                        if (typeof __app_id !== 'undefined') {
                            setAppId(__app_id);
                        }

                        // Authenticate
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                        });

                    } catch (error) {
                        console.error("Firebase initialization error:", error);
                        setLoading(false);
                    }
                };
                initFirebase();
            }, []);

            // Fetch Saved Progress
            useEffect(() => {
                const fetchProgress = async () => {
                    if (!user || !db) return;
                    try {
                        const { doc, getDoc } = window.firebaseModules;
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'physics_bank_v1', 'saved_progress');
                        const docSnap = await getDoc(docRef);
                        
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            setAnswers(data.answers || {});
                            setEvaluations(data.evaluations || {});
                        }
                    } catch (error) {
                        console.error("Error fetching progress:", error);
                    } finally {
                        setLoading(false);
                    }
                };

                if (user) {
                    fetchProgress();
                }
            }, [user, db, appId]);

            // Save Progress to Firestore
            const handleSaveProgress = async () => {
                if (!user || !db) {
                    alert("عذراً، لا يمكن حفظ التقدم حالياً (غير متصل).");
                    return;
                }
                setSaving(true);
                try {
                    const { doc, setDoc } = window.firebaseModules;
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'physics_bank_v1', 'saved_progress');
                    await setDoc(docRef, { answers, evaluations, lastUpdated: new Date().toISOString() }, { merge: true });
                    
                    // Show brief success indicator
                    setTimeout(() => setSaving(false), 1000);
                } catch (error) {
                    console.error("Error saving progress:", error);
                    setSaving(false);
                }
            };

            const handleAnswerChange = (qId, value) => {
                setAnswers(prev => ({ ...prev, [qId]: value }));
                
                // إزالة رسالة الخطأ فور قيام الطالب بمحاولة تعديل إجابته
                if (evaluations[qId] === 'incorrect') {
                    setEvaluations(prev => ({ ...prev, [qId]: null }));
                }
            };

            const toggleAnswer = (qId) => {
                setShowAnswers(prev => ({ ...prev, [qId]: !prev[qId] }));
            };

            // دالة للتحقق مما إذا كان الطالب قد أدخل إجابة
            const hasAnswered = (qId) => {
                const val = answers[qId];
                if (currentTab === 'graphs') {
                    return !!val && !!val.points && val.points.length > 0;
                }
                return !!val && val.trim() !== '';
            };

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center text-xl text-blue-600 font-bold">جاري تحميل بنك الأسئلة واستعادة بياناتك...</div>;
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row rtl">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-slate-800 text-white flex flex-col shadow-lg">
                        <div className="p-4 text-center border-b border-slate-700 bg-slate-900">
                            <h1 className="text-xl font-bold text-blue-400">بنك أسئلة الفيزياء</h1>
                            <p className="text-xs text-slate-400 mt-1">الصف الثاني عشر - ف2</p>
                            
                            {/* عداد النقاط */}
                            <div className="mt-4 bg-slate-800 py-3 rounded-lg border border-slate-600 shadow-inner flex flex-col items-center">
                                <span className="text-sm font-medium text-slate-300">النقاط المكتسبة</span>
                                <span className="text-3xl font-bold text-green-400 mt-1">{currentScore}</span>
                            </div>
                        </div>
                        <nav className="flex-1 overflow-y-auto p-2">
                            {Object.entries(questionBank).map(([key, section]) => (
                                <button
                                    key={key}
                                    onClick={() => setCurrentTab(key)}
                                    className={`w-full text-right px-4 py-3 mb-1 rounded transition-colors ${currentTab === key ? 'bg-blue-600 text-white font-bold' : 'text-slate-300 hover:bg-slate-700'}`}
                                >
                                    {section.title}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-700">
                            <button 
                                onClick={handleSaveProgress}
                                disabled={saving}
                                className={`w-full py-2 rounded font-bold shadow transition-colors ${saving ? 'bg-green-500 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}`}
                            >
                                {saving ? 'تم الحفظ بنجاح ✓' : 'حفظ التقدم'}
                            </button>
                            <p className="text-xs text-center text-slate-400 mt-2">يمكنك الخروج والعودة لاحقاً للإكمال</p>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-4 md:p-8 bg-slate-50 overflow-y-auto h-screen">
                        <div className="max-w-4xl mx-auto">
                            
                            <div className="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                                <h2 className="text-2xl font-bold text-slate-800 mb-6 pb-2 border-b border-blue-100 flex items-center justify-between">
                                    <span>{questionBank[currentTab].title}</span>
                                    <span className="text-sm font-normal text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                                        عدد الأسئلة: {questionBank[currentTab].questions.length}
                                    </span>
                                </h2>
                                
                                <div className="space-y-8">
                                    {questionBank[currentTab].questions.map((q, index) => (
                                        <div key={q.id} className="bg-slate-50 p-5 rounded-lg border border-slate-100 shadow-sm transition-all hover:shadow-md">
                                            
                                            {/* Question Text */}
                                            <div className="text-lg text-slate-800 mb-4 font-medium flex gap-2">
                                                <span className="text-blue-600 font-bold">{index + 1}.</span>
                                                <span><MathText text={q.q} /></span>
                                            </div>

                                            {/* Input Area */}
                                            <div className="mb-4">
                                                {currentTab === 'graphs' ? (
                                                    <DrawingCanvas 
                                                        id={q.id}
                                                        value={answers[q.id]}
                                                        onChange={(val) => handleAnswerChange(q.id, val)}
                                                        disabled={evaluations[q.id] === 'correct'}
                                                    />
                                                ) : q.options ? (
                                                    <div className="flex flex-col gap-2">
                                                        {q.options.map((opt, i) => (
                                                            <label key={i} className={`flex items-center gap-3 p-3 bg-white border border-slate-200 rounded transition-colors ${evaluations[q.id] === 'correct' ? 'opacity-80 cursor-default' : 'cursor-pointer hover:bg-blue-50'}`}>
                                                                <input 
                                                                    type="radio" 
                                                                    name={q.id}
                                                                    value={opt}
                                                                    checked={answers[q.id] === opt}
                                                                    onChange={(e) => handleAnswerChange(q.id, e.target.value)}
                                                                    disabled={evaluations[q.id] === 'correct'}
                                                                    className="w-4 h-4 text-blue-600 disabled:opacity-50"
                                                                />
                                                                <span className="text-slate-700"><MathText text={opt} /></span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <textarea 
                                                        rows={currentTab === 'reason' || currentTab === 'whatHappens' || currentTab === 'compare' ? 3 : 1}
                                                        placeholder="اكتب إجابتك هنا..."
                                                        value={answers[q.id] || ''}
                                                        onChange={(e) => handleAnswerChange(q.id, e.target.value)}
                                                        disabled={evaluations[q.id] === 'correct'}
                                                        className="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-y disabled:bg-slate-100 disabled:text-slate-500"
                                                    />
                                                )}
                                            </div>

                                            {/* Self Correction */}
                                            <div className="mt-2 flex flex-col items-start gap-4">
                                                
                                                <div className="flex flex-wrap items-center gap-4">
                                                    {/* زر التحقق من الإجابة */}
                                                    <button 
                                                        onClick={() => handleCheckAnswer(q.id, q.a, q.options)}
                                                        disabled={!hasAnswered(q.id) || evaluations[q.id] === 'correct'}
                                                        className={`px-4 py-2 rounded-md font-bold text-sm transition-all shadow-sm ${
                                                            !hasAnswered(q.id) || evaluations[q.id] === 'correct'
                                                            ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                                            : 'bg-green-500 hover:bg-green-600 text-white active:scale-95'
                                                        }`}
                                                    >
                                                        {evaluations[q.id] === 'correct' ? 'إجابة مكتملة' : 'تحقق من الإجابة'}
                                                    </button>
                                                    
                                                    {/* زر إظهار الإجابة النموذجية */}
                                                    <button 
                                                        onClick={() => hasAnswered(q.id) && toggleAnswer(q.id)}
                                                        disabled={!hasAnswered(q.id)}
                                                        className={`text-sm font-medium flex items-center gap-1 transition-colors ${
                                                            hasAnswered(q.id) 
                                                                ? 'text-blue-600 hover:text-blue-800 underline cursor-pointer' 
                                                                : 'text-slate-400 cursor-not-allowed'
                                                        }`}
                                                    >
                                                        {showAnswers[q.id] ? 'إخفاء الإجابة النموذجية' : 'إظهار الإجابة النموذجية للتأكد'}
                                                    </button>
                                                </div>

                                                {/* Evaluation Feedback Messages */}
                                                {evaluations[q.id] === 'correct' && currentTab !== 'graphs' && (
                                                    <div className="w-full p-3 bg-green-100 border border-green-300 rounded-md text-green-800 font-bold flex items-center gap-2">
                                                        <span>🎉</span> إجابة صحيحة! تمت إضافة نقطة إلى رصيدك.
                                                    </div>
                                                )}

                                                {evaluations[q.id] === 'correct' && currentTab === 'graphs' && (
                                                    <div className="w-full p-3 bg-green-100 border border-green-300 rounded-md text-green-800 font-bold flex flex-col gap-1">
                                                        <div className="flex items-center gap-2">
                                                            <span>📈</span> رسم دقيق وصحيح! تعرف النظام على العلاقة {q.graphType === 'direct' ? 'الطردية' : 'العكسية'}.
                                                        </div>
                                                    </div>
                                                )}

                                                {evaluations[q.id] === 'incorrect' && currentTab === 'graphs' && (
                                                    <div className="w-full p-3 bg-orange-100 border border-orange-300 rounded-md text-orange-800 font-bold flex flex-col gap-1">
                                                        <div className="flex items-center gap-2">
                                                            <span>💡</span> اتجاه المنحنى غير دقيق!
                                                        </div>
                                                        <span className="text-sm font-normal text-orange-700">تأكد من شكل العلاقة المطلوبة ({q.graphType === 'direct' ? 'طردية صاعدة' : 'عكسية هابطة'}) وامسح اللوحة للمحاولة مرة أخرى.</span>
                                                    </div>
                                                )}

                                                {evaluations[q.id] === 'incorrect' && currentTab !== 'graphs' && (
                                                    <div className="w-full p-3 bg-orange-100 border border-orange-300 rounded-md text-orange-800 font-bold flex flex-col gap-1">
                                                        <div className="flex items-center gap-2">
                                                            <span>💡</span> إجابة غير دقيقة!
                                                        </div>
                                                        <span className="text-sm font-normal text-orange-700">لا تستسلم، حاول تصحيح الخطأ والمحاولة مرة أخرى لتحصل على النقطة!</span>
                                                    </div>
                                                )}
                                                
                                                {!hasAnswered(q.id) && (
                                                    <span className="text-xs text-red-500 mt-1">يرجى المحاولة وإدخال إجابتك أولاً للتحقق أو لرؤية الإجابة النموذجية.</span>
                                                )}
                                                
                                                {showAnswers[q.id] && hasAnswered(q.id) && (
                                                    <div className="w-full p-3 bg-blue-50 border border-blue-200 rounded-md text-blue-900 font-medium">
                                                        <span className="font-bold mr-2 text-blue-700">الإجابة النموذجية:</span>
                                                        <MathText text={q.a} />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
