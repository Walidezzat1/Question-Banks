<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار فيزياء الصف العاشر - 100 سؤال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f0fdf4;
        }
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #e0f2fe;
            border-color: #3b82f6;
        }
        .correct-answer {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .wrong-answer {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
        }
        /* Scrollbar styling for grid */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-3xl mx-auto my-8 p-4">
        
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 text-center border-t-4 border-green-500">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">بنك أسئلة الفيزياء - الصف العاشر</h1>
            <p class="text-gray-500 text-sm">الفترة الدراسية الثانية (100 سؤال اختيار من متعدد)</p>
            <p class="text-blue-600 text-sm font-bold mt-2">إعداد الموجه الفني للفيزياء: أ/ وليد عزت</p>
            
            <!-- قائمة اختيار الدروس -->
            <div class="mt-6 mb-2 text-right">
                <label for="lesson-select" class="block text-sm font-bold text-gray-700 mb-2">اختر الدرس للمراجعة المخصصة:</label>
                <select id="lesson-select" onchange="changeLesson()" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 bg-gray-50 text-gray-800 font-semibold shadow-sm transition-colors cursor-pointer hover:bg-white">
                    <option value="all">جميع الدروس (الاختبار الشامل - 100 سؤال)</option>
                    <option value="الحركة التوافقية البسيطة">الدرس (1-1): الحركة التوافقية البسيطة</option>
                    <option value="خصائص الحركة الموجية والصوت">الدرس (1-2): خصائص الحركة الموجية والصوت</option>
                    <option value="الكهرباء الساكنة">الدرس (1-1): الكهرباء الساكنة (قانون كولوم)</option>
                    <option value="التيار الكهربائي ومصدر الجهد">الدرس (2-1): التيار الكهربائي ومصدر الجهد</option>
                    <option value="المقاومة الكهربائية - قانون أوم">الدرس (2-2): المقاومة الكهربائية - قانون أوم</option>
                    <option value="القدرة الكهربائية">الدرس (2-3): القدرة الكهربائية</option>
                    <option value="الدوائر الكهربائية">الدرس (2-4): الدوائر الكهربائية</option>
                </select>
            </div>
            
            <div class="mt-4 flex justify-between items-center text-sm font-semibold text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-100">
                <div id="score-display">النتيجة: 0 / 100</div>
                <div id="progress-text">السؤال 1 من 100</div>
            </div>
            
            <!-- Progress Bar -->
            <div class="w-full bg-gray-200 rounded-full h-2.5 mt-3">
                <div id="progress-bar" class="bg-green-500 h-2.5 rounded-full transition-all duration-300" style="width: 1%"></div>
            </div>
        </div>

        <!-- Question Container -->
        <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 mb-6 relative min-h-[300px]">
            <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 mb-6 leading-relaxed">
                <!-- Question will be injected here -->
            </h2>
            
            <div id="options-container" class="space-y-3">
                <!-- Options will be injected here -->
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between items-center mb-8">
            <button id="prev-btn" onclick="prevQuestion()" class="px-6 py-2.5 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                السابق
            </button>
            <button onclick="toggleGrid()" class="px-4 py-2 text-blue-600 font-semibold hover:bg-blue-50 rounded-lg transition-colors">
                شبكة الأسئلة ⊞
            </button>
            <button id="next-btn" onclick="nextQuestion()" class="px-6 py-2.5 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                التالي
            </button>
        </div>

        <!-- Question Grid (Hidden by default) -->
        <div id="question-grid" class="hidden bg-white rounded-2xl shadow-lg p-6">
            <h3 class="font-bold text-gray-700 mb-4 text-center">الانتقال السريع للأسئلة</h3>
            <div class="grid grid-cols-5 md:grid-cols-10 gap-2 max-h-60 overflow-y-auto p-2" id="grid-container">
                <!-- Grid buttons injected here -->
            </div>
        </div>

    </div>

    <script>
        const allQuestions = [
            {q:"الحركة التي تكرر نفسها في فترات زمنية متساوية تسمى:", o:["الحركة الانتقالية","الحركة الدورية","الحركة المعجلة","الحركة المستقيمة"], a:1},
            {q:"في الحركة التوافقية البسيطة، تتناسب قوة الإرجاع مع الإزاحة الحادثة:", o:["طردياً وفي نفس الاتجاه","عكسياً وفي نفس الاتجاه","طردياً وفي اتجاه معاكس","عكسياً وفي اتجاه معاكس"], a:2},
            {q:"عند موضع الاستقرار (الاتزان) لجسم يتحرك حركة توافقية بسيطة، تكون محصلة القوى:", o:["قيمة عظمى","مساوية لوزن الجسم","صفر","مساوية لقوة الإرجاع"], a:2},
            {q:"أكبر إزاحة للجسم المهتز عن موضع سكونه تسمى:", o:["التردد","الزمن الدوري","السعة","الطول الموجي"], a:2},
            {q:"عدد الاهتزازات الكاملة الحادثة في الثانية الواحدة هو:", o:["الزمن الدوري","التردد","السرعة الزاوية","الطول الموجي"], a:1},
            {q:"شوكة رنانة تعمل 1200 اهتزازة خلال دقيقة واحدة، فيكون ترددها بوحدة الهرتز (Hz):", o:["1200","60","20","12"], a:2},
            {q:"جسم يهتز بتردد 100 Hz، فإن زمنه الدوري بوحدة الثانية (s) يساوي:", o:["100","1","0.1","0.01"], a:3},
            {q:"يتحرك جسم حركة توافقية بسيطة وتعطى إزاحته بالعلاقة y = 8sin(5t)، فإن سعة الاهتزاز تساوي:", o:["5","8","13","40"], a:1},
            {q:"يتحرك جسم حركة توافقية بسيطة وتعطى إزاحته بالعلاقة y = 2sin(8t)، فإن السرعة الزاوية (ω) تساوي:", o:["2","4","8","16"], a:2},
            {q:"إذا كان الزمن الدوري لبندول بسيط يساوي 1 s، فإن طول خيطه بوحدة المتر (باعتبار g=10) يساوي تقريباً:", o:["0.25","0.5","1.0","4.0"], a:0},
            {q:"الزمن الدوري للبندول البسيط يتناسب طردياً مع:", o:["كتلته","طول خيطه","الجذر التربيعي لطول خيطه","عجلة الجاذبية"], a:2},
            {q:"إذا زيدت كتلة ثقل البندول البسيط إلى أربع أمثالها، فإن زمنه الدوري:", o:["يقل للنصف","يزداد للمثلين","يزداد لأربعة أمثاله","لا يتغير"], a:3},
            {q:"لكي يقل الزمن الدوري للبندول البسيط إلى نصف قيمته، يجب أن ينقص طوله إلى:", o:["النصف","الربع","الثلث","الثمن"], a:1},
            {q:"جسم معلق بنابض مرن ثابت القوة له 80 N/m وزمنه الدوري 0.628 s، فإن كتلته بوحدة (kg) تساوي تقريباً:", o:["0.4","0.6","0.8","1.0"], a:2},
            {q:"إذا استبدلت كتلة 0.2 kg معلقة بنابض بكتلة 0.8 kg، فإن الزمن الدوري:", o:["يقل للنصف","يزداد للمثلين","يزداد لأربعة أمثاله","لا يتغير"], a:1},
            {q:"الموجات التي تكون فيها حركة جزيئات الوسط عمودية على اتجاه انتشار الموجة هي:", o:["الموجات الطولية","الموجات المستعرضة","موجات الصوت","الموجات الموقوفة"], a:1},
            {q:"تتكون الموجات الطولية من:", o:["قمم وقيعان","قمم وتضاغطات","تضاغطات وتخلخلات","قيعان وتخلخلات"], a:2},
            {q:"ارتداد الصوت عندما يقابل سطحاً عاكساً يسمى:", o:["انكسار الصوت","انعكاس الصوت","تداخل الصوت","حيود الصوت"], a:1},
            {q:"التغير في مسار الموجات الصوتية عند انتقالها بين وسطين مختلفي الكثافة يسمى:", o:["انكسار الصوت","انعكاس الصوت","تداخل الصوت","حيود الصوت"], a:0},
            {q:"موجة صوتية طولها الموجي 2 m وترددها 165 Hz، سرعتها بوحدة (m/s) تساوي:", o:["330","332","167","82.5"], a:0},
            {q:"تصدر حشرة صوتاً تردده 120 Hz وسرعته 340 m/s، الطول الموجي للصوت يساوي تقريباً:", o:["40800","2.83","0.35","28.3"], a:1},
            {q:"عندما تزداد عدد الاهتزازات الحادثة في الثانية (التردد) لنفس الوسط، فإن الطول الموجي:", o:["يزداد","يقل","لا يتغير","ينعدم"], a:1},
            {q:"جميع الموجات التالية موجات ميكانيكية ما عدا:", o:["الصوت","موجات الراديو","موجات الأوتار","موجات مياه البحر"], a:1},
            {q:"في الموجة الموقوفة، المسافة بين عقدتين متتاليتين تساوي:", o:["طول موجي كامل","نصف طول موجي","ربع طول موجي","مثلي الطول الموجي"], a:1},
            {q:"إذا كانت المسافة بين بطن وعقدة تالية لموجة موقوفة 0.3 m، فإن الطول الموجي يساوي:", o:["0.6","1.2","1.5","2.4"], a:1},
            {q:"يتناسب تردد النغمة الأساسية لوتر مشدود:", o:["طردياً مع طوله","عكسياً مع طوله","عكسياً مع قوة الشد","طردياً مع كتلته"], a:1},
            {q:"وتر يصدر نغمة أساسية ترددها 25 Hz، فيكون تردد النغمة التوافقية الثانية (القطاع الثالث n=3) يساوي:", o:["50","75","100","12.5"], a:1},
            {q:"تزداد ظاهرة حيود الصوت وضوحاً عندما يكون اتساع الفتحة:", o:["أكبر بكثير من الطول الموجي","أصغر من أو يقارب الطول الموجي","يساوي عشرة أمثال الطول الموجي","مستطيلاً فقط"], a:1},
            {q:"ينكسر الشعاع الصوتي الساقط مبتعداً عن العمود المقام عندما ينتقل إلى وسط تكون فيه سرعة الصوت:", o:["أقل","مساوية","أكبر","منعدمة"], a:2},
            {q:"عند سقوط موجات الصوت من هواء بارد إلى هواء ساخن فإنها:", o:["تنكسر مقتربة من العمود","تنكسر مبتعدة عن العمود","تنعكس كلياً","لا تعاني أي انكسار"], a:1},
            {q:"لا يمكن لرواد الفضاء التفاهم بالصوت العادي على سطح القمر لأن:", o:["الجاذبية ضعيفة","الصوت موجة كهرومغناطيسية","الصوت موجة ميكانيكية تحتاج لوسط مادي","درجة الحرارة منخفضة جداً"], a:2},
            {q:"ظاهرة انحناء الموجات حول حافة حاجز حاد تسمى:", o:["الانعكاس","الانكسار","التداخل","الحيود"], a:3},
            {q:"التداخل البناء يحدث عند التقاء:", o:["قمة مع قاع","تضاغط مع تخلخل","قمة مع قمة أو قاع مع قاع","موجة طولية مع موجة مستعرضة"], a:2},
            {q:"النغمة التي يصدرها الوتر عندما يهتز بأكمله على شكل قطاع واحد تسمى:", o:["النغمة التوافقية الأولى","النغمة الأساسية","النغمة التوافقية الثانية","النغمة المركبة"], a:1},
            {q:"إذا زادت قوة الشد في وتر إلى أربعة أمثالها، فإن تردد النغمة الأساسية:", o:["يقل للنصف","يزداد للمثلين","يزداد لأربعة أمثاله","لا يتغير"], a:1},
            {q:"الشحنات لا تفنى ولا تستحدث بل تنتقل من مادة لأخرى، هذا نص:", o:["قانون كولوم","مبدأ حفظ الشحنة","قانون أوم","مبدأ التراكب"], a:1},
            {q:"عندما تفقد الذرة أحد إلكتروناتها تصبح:", o:["أيوناً سالباً","متعادلة","أيوناً موجباً","نظيراً"], a:2},
            {q:"عند دلك ساق من المطاط بقطعة من الفرو، فإن ساق المطاط:", o:["تصبح موجبة","تصبح سالبة","تبقى متعادلة","تتنافر مع الفرو"], a:1},
            {q:"إلكترونات المطاط تكون .......... ارتباطاً بالنواة من إلكترونات الفراء:", o:["أقل","أكثر","متساوية","منعدمة"], a:1},
            {q:"يمكن اكتشاف وجود الشحنة الكهربائية ونوعها باستخدام:", o:["الأميتر","الفولتميتر","الكشاف الكهربائي","الأوميتر"], a:2},
            {q:"الشحنة الكهربائية التي يحملها أي جسم هي مضاعفات عددية صحيحة لـ:", o:["كتلة الإلكترون","شحنة الإلكترون","شحنة النيوترون","كتلة البروتون"], a:1},
            {q:"عند تلامس جسم متعادل مع جسم مشحون، فإن الجسمين يصبح لهما:", o:["شحنات مختلفة في النوع","نفس نوع الشحنة","شحنة موجبة دائماً","شحنة متعادلة"], a:1},
            {q:"تتناسب القوة الكهربائية بين شحنتين نقطيتين طردياً مع:", o:["المسافة بينهما","مربع المسافة بينهما","حاصل ضرب الشحنتين","نوع الوسط فقط"], a:2},
            {q:"شحنتان نقطيتان القوة المتبادلة بينهما 5 N، إذا زيدت إحداهما لمثليها تصبح القوة:", o:["2.5 N","5 N","10 N","20 N"], a:2},
            {q:"وضعت شحنتان على بعد 1 m فكانت القوة 90 N، فإذا أصبحت المسافة 3 m تصبح القوة:", o:["10 N","30 N","60 N","270 N"], a:0},
            {q:"فقدان الكهرباء الساكنة الناتج عن انتقال الشحنات بعيداً عن الجسم يسمى:", o:["الشحن بالحث","الشحن بالدلك","التفريغ الكهربائي","الاستقطاب"], a:2},
            {q:"ميل الخط البياني للعلاقة بين القوة الكهروستاتيكية (F) ومقلوب مربع المسافة (1/d^2) يمثل:", o:["قيمة ثابت كولوم فقط","الشحنة الأولى فقط","حاصل ضرب (k · q1 · q2)","المسافة (d)"], a:2},
            {q:"تجهز شاحنات نقل النفط بسلسلة معدنية تتدلى للأرض بغرض:", o:["زيادة سرعتها","تفريغ الشحنات المتراكمة لتجنب الحرائق","توضيح مسارها","تقليل الاحتكاك"], a:1},
            {q:"الطاقة اللازمة لنزع الإلكترون من المستويات الخارجية للذرة .......... من الطاقة اللازمة لنزعه من المستويات الداخلية:", o:["أكبر","أقل","مساوية","لا توجد علاقة"], a:1},
            {q:"الجسم A مشحون بـ +2 µC والجسم B مشحون بـ +6 µC، فإن القوة المتبادلة بينهما تحقق:", o:["F_AB = 3 F_BA","F_AB = -F_BA","F_AB = F_BA / 3","القوة منعدمة"], a:1},
            {q:"سريان الشحنات الكهربائية يسمى:", o:["الجهد الكهربائي","التيار الكهربائي","المقاومة الكهربائية","القدرة الكهربائية"], a:1},
            {q:"كمية الشحنات التي تمر خلال أي مقطع في الثانية الواحدة هي:", o:["شدة التيار الكهربائي","فرق الجهد","القدرة","المقاومة"], a:0},
            {q:"تقاس شدة التيار الكهربائي بجهاز:", o:["الفولتميتر","الأوميتر","الأميتر","الكشاف الكهربائي"], a:2},
            {q:"يوصل الفولتميتر في الدائرة الكهربائية على:", o:["التوالي","التوازي","التوالي والتوازي معاً","لا يوصل في الدوائر"], a:1},
            {q:"الشحنات التي تقوم بنقل التيار في الموصلات الصلبة (الفلزات) هي:", o:["البروتونات","الأيونات الموجبة","الأيونات السالبة","الإلكترونات الحرة"], a:3},
            {q:"تبذل بطارية طاقة 27 J لنقل شحنة 3 C، فإن فرق الجهد بوحدة الفولت يساوي:", o:["81","30","9","3"], a:2},
            {q:"يمر تيار شدته 2 A خلال دقيقة واحدة، فإن مقدار الشحنة المارة بوحدة الكولوم هو:", o:["2","30","120","60"], a:2},
            {q:"الطاقة اللازمة لنقل شحنة 2 C بين نقطتين فرق الجهد بينهما 20 V تساوي بالجول:", o:["10","20","40","0.1"], a:2},
            {q:"تقوم المولدات بتحويل الطاقة:", o:["الكيميائية إلى كهربائية","الميكانيكية إلى كهربائية","الكهربائية إلى ضوئية","الحرارية إلى ميكانيكية"], a:1},
            {q:"تشكل الأيونات الموجبة والسالبة سريان الشحنة الكهربائية في:", o:["أسلاك النحاس","الإلكتروليت (كبطاريات السيارات)","أشباه الموصلات","العوازل"], a:1},
            {q:"إذا تساوى فرق الجهد بين طرفي سلك موصل، فإن التيار الكهربائي:", o:["يزداد للمثلين","ينعدم (يتوقف السريان)","ينعكس اتجاهه","يقل للنصف"], a:1},
            {q:"سريان شحنة مقدارها واحد كولوم في كل ثانية هو تعريف:", o:["الفولت","الأمبير","الأوم","الوات"], a:1},
            {q:"ضرورة وجود مصدر للجهد (بطارية) في الدائرة هو:", o:["استهلاك الشحنات","تزويد الدائرة بالبروتونات","تزويد الإلكترونات بالطاقة للحفاظ على استمرار فرق الجهد","تقليل المقاومة"], a:2},
            {q:"شدة التيار المار تتناسب:", o:["طردياً مع كمية الشحنة المارة خلال نفس الزمن","عكسياً مع كمية الشحنة","طردياً مع المقاومة","لا تعتمد على الشحنة"], a:0},
            {q:"عندما تسري الإلكترونات في سلك، فإن عدد الإلكترونات التي تدخل من طرف:", o:["أكبر من التي تخرج","أصغر من التي تخرج","يساوي عدد الإلكترونات التي تخرج من الطرف الآخر","يتلاشى بالتدريج"], a:2},
            {q:"الإعاقة التي تواجهها الإلكترونات أثناء انتقالها في الموصل تسمى:", o:["شدة التيار","المقاومة الكهربائية","الجهد الكهربائي","القدرة الكهربائية"], a:1},
            {q:"ينص قانون أوم على أن شدة التيار تتناسب طردياً مع فرق الجهد عند ثبات:", o:["الزمن","درجة الحرارة","الشحنة","نوع البطارية"], a:1},
            {q:"وحدة قياس المقاومة الكهربائية هي الأوم (Ω)، وهي تكافئ:", o:["جول / ثانية","كولوم / ثانية","فولت / أمبير","أمبير / فولت"], a:2},
            {q:"المقاومة النوعية لمادة موصل تتوقف على:", o:["طول السلك","مساحة المقطع","نوع المادة ودرجة الحرارة","شدة التيار"], a:2},
            {q:"كلما زاد طول السلك الموصل، فإن مقاومته الكهربائية:", o:["تزداد","تقل","لا تتغير","تنعدم"], a:0},
            {q:"سلكان من النحاس لهما نفس الطول، السلك الأسمك (ذو مساحة المقطع الأكبر) تكون مقاومته:", o:["أكبر","أقل","مساوية للسلك الرفيع","صفر"], a:1},
            {q:"يمر تيار شدته 6 A في مدفأة فرق الجهد بين طرفيها 240 V، مقاومة المدفأة تساوي:", o:["1440 Ω","40 Ω","0.025 Ω","246 Ω"], a:1},
            {q:"مصباح مقاومته 10 Ω وفرق جهده 120 V، فإن شدة التيار المار به:", o:["12 A","1200 A","130 A","0.08 A"], a:0},
            {q:"المنحنى البياني الذي يوضح العلاقة بين (V) و (I) لمقاومة أومية يكون:", o:["خطاً منحنياً","خطاً مستقيماً يمر بنقطة الأصل","خطاً مستقيماً يوازي محور السينات","منحنياً متناقصاً"], a:1},
            {q:"المواد التي تصبح مقاومتها صفراً عند تبريدها لدرجات حرارة منخفضة جداً تسمى:", o:["العوازل","أشباه الموصلات","المواد فائقة التوصيل","الإلكتروليتات"], a:2},
            {q:"إذا زادت مساحة مقطع سلك إلى المثلين مع ثبات طوله، فإن مقاومته:", o:["تزداد للمثلين","تقل للنصف","تقل للربع","لا تتغير"], a:1},
            {q:"تقاس المقاومة النوعية للمادة بوحدة:", o:["Ω","Ω · m","Ω / m","V · A"], a:1},
            {q:"يفضل استخدام أسلاك من النحاس في التوصيلات لأن:", o:["مقاومتها النوعية كبيرة جداً","مقاومتها النوعية صغيرة","ليس لها مقاومة إطلاقاً","تزيد من حرارة الدائرة"], a:1},
            {q:"ارتفاع درجة حرارة سلك عند مرور التيار فيه سببه:", o:["سرعة الإلكترونات العالية","تصادم الإلكترونات مع بعضها ومع ذرات الفلز","برودة الوسط المحيط","كبر مساحة المقطع"], a:1},
            {q:"موصل طوله 0.5 m ومساحته 2 × 10⁻⁴ m² ومقاومته 4 Ω، مقاومته النوعية:", o:["16 × 10⁻⁴ Ω·m","8 × 10⁻⁴ Ω·m","64 × 10⁻⁴ Ω·m","1 × 10⁻⁴ Ω·m"], a:0},
            {q:"معدل تحول الطاقة الكهربائية إلى أشكال أخرى يسمى:", o:["الجهد الكهربائي","القدرة الكهربائية","التيار الكهربائي","المقاومة المكافئة"], a:1},
            {q:"تقاس القدرة الكهربائية بوحدة:", o:["الجول","الوات (W)","الكولوم","الفولت"], a:1},
            {q:"تقاس الطاقة الكهربائية المستهلكة في المنازل بوحدة:", o:["الوات","الكيلو وات . ساعة (kWh)","الفولت . أمبير","الجول / ثانية"], a:1},
            {q:"قدرة مصباح يستهلك طاقة 100 J خلال 5 s تساوي:", o:["500 W","20 W","105 W","0.05 W"], a:1},
            {q:"مصباح قدرته 2400 W يعمل لمدة 20 ساعة، الطاقة المستهلكة بالجول هي:", o:["48000","1728 × 10⁵","120","1.728 × 10³"], a:1},
            {q:"جهاز قدرته 100 W عمل لمدة 5 ساعات، الطاقة المستهلكة بوحدة (kWh) هي:", o:["0.5","500","5","20"], a:0},
            {q:"مصباح مكتوب عليه (240 V, 60 W)، أقصى تيار يتحمله فتيله:", o:["4 A","0.25 A","2 A","0.5 A"], a:1},
            {q:"يتم توصيل الأجهزة الكهربائية في المنازل على:", o:["التوالي","التوازي","دوائر مركبة معقدة","بالتناوب"], a:1},
            {q:"المقاومة المكافئة لمجموعة مقاومات متصلة على التوالي تكون:", o:["أصغر من أصغر مقاومة","أكبر من أكبر مقاومة","مساوية للمتوسط","مقلوب المجموع"], a:1},
            {q:"عند توصيل عدة مقاومات على التوالي، فإن الكمية الثابتة في جميع المقاومات هي:", o:["فرق الجهد","المقاومة","شدة التيار","القدرة"], a:2},
            {q:"عند توصيل مقاومات على التوازي، فإن الكمية المتساوية بين طرفي جميع المقاومات هي:", o:["فرق الجهد الكلي","شدة التيار","الطاقة","المقاومة المكافئة"], a:0},
            {q:"أربع مقاومات متماثلة متصلة على التوالي، مقاومتها المكافئة 36 Ω، قيمة المقاومة الواحدة:", o:["36 Ω","9 Ω","4 Ω","144 Ω"], a:1},
            {q:"ثلاث مقاومات متساوية قيمة كل منها 6 Ω متصلة على التوازي، مقاومتها المكافئة:", o:["18 Ω","2 Ω","3 Ω","6 Ω"], a:1},
            {q:"عند توصيل ثلاثة مصابيح على التوالي، واحتراق أو إزالة أحدهم، فإن باقي المصابيح:", o:["تزداد إضاءتها","تنطفئ","لا تتأثر","تقل إضاءتها"], a:1},
            {q:"في التوصيل على التوازي، شدة التيار المار في كل فرع تتناسب:", o:["طردياً مع المقاومة","عكسياً مع المقاومة","لا تتأثر بالمقاومة","طردياً مع مربع المقاومة"], a:1},
            {q:"تزداد قراءة الأميتر الكلي في الدائرة (يزداد التيار) عند إضافة مقاومة جديدة على:", o:["التوالي","التوازي","لا يمكن زيادة التيار بإضافة مقاومات","التوالي والتوازي معاً"], a:1},
            {q:"دائرة بها مقاومتان R₁ = 4 Ω و R₂ = 4 Ω على التوازي، المقاومة المكافئة لهما:", o:["8 Ω","2 Ω","1 Ω","16 Ω"], a:1},
            {q:"القدرة الكهربائية المستهلكة في سلك فرق الجهد بين طرفيه 3 V ويمر به تيار 2 A تساوي:", o:["1.5 W","6 W","9 W","5 W"], a:1},
            {q:"تتناسب القدرة الكهربائية المستهلكة في موصل أومي:", o:["طردياً مع مربع شدة التيار","عكسياً مع فرق الجهد","عكسياً مع مربع التيار","طردياً مع الزمن"], a:0},
            {q:"لا يفضل التوصيل على التوالي في المنازل لأنه:", o:["يقلل من الاستهلاك","يزيد من الجهد","إذا انقطع التيار عن جهاز ينقطع عن باقي الأجهزة","يحتاج لأسلاك أكثر"], a:2}
        ];

        // تصنيف الأسئلة حسب الدروس
        for(let i=0; i<allQuestions.length; i++) {
             if(i <= 14) allQuestions[i].lesson = "الحركة التوافقية البسيطة";
             else if(i <= 34) allQuestions[i].lesson = "خصائص الحركة الموجية والصوت";
             else if(i <= 49) allQuestions[i].lesson = "الكهرباء الساكنة";
             else if(i <= 64) allQuestions[i].lesson = "التيار الكهربائي ومصدر الجهد";
             else if(i <= 79) allQuestions[i].lesson = "المقاومة الكهربائية - قانون أوم";
             else if(i <= 86) allQuestions[i].lesson = "القدرة الكهربائية";
             else allQuestions[i].lesson = "الدوائر الكهربائية";
        }

        let questions = [...allQuestions];
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = new Array(questions.length).fill(null);

        // Elements
        const questionTextEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const scoreDisplay = document.getElementById('score-display');
        const gridContainer = document.getElementById('grid-container');
        const questionGrid = document.getElementById('question-grid');

        function init() {
            buildGrid();
            loadQuestion(0);
        }

        function buildGrid() {
            gridContainer.innerHTML = '';
            for(let i = 0; i < questions.length; i++) {
                const btn = document.createElement('button');
                btn.innerText = i + 1;
                btn.className = `w-full py-1.5 text-sm font-semibold rounded border ${userAnswers[i] !== null ? (userAnswers[i] === questions[i].a ? 'bg-green-100 border-green-300 text-green-700' : 'bg-red-100 border-red-300 text-red-700') : 'bg-gray-50 border-gray-200 text-gray-500'} hover:bg-gray-200`;
                btn.onclick = () => { loadQuestion(i); toggleGrid(); };
                btn.id = `grid-btn-${i}`;
                gridContainer.appendChild(btn);
            }
        }

        function updateGridBtn(index) {
            const btn = document.getElementById(`grid-btn-${index}`);
            if(btn && userAnswers[index] !== null) {
                if(userAnswers[index] === questions[index].a) {
                    btn.className = 'w-full py-1.5 text-sm font-semibold rounded border bg-green-100 border-green-300 text-green-700 hover:bg-green-200';
                } else {
                    btn.className = 'w-full py-1.5 text-sm font-semibold rounded border bg-red-100 border-red-300 text-red-700 hover:bg-red-200';
                }
            }
        }

        function loadQuestion(index) {
            currentQuestionIndex = index;
            const q = questions[index];
            
            // Update UI text
            questionTextEl.innerText = `${index + 1}. ${q.q}`;
            progressText.innerText = `السؤال ${index + 1} من ${questions.length}`;
            progressBar.style.width = `${((index + 1) / questions.length) * 100}%`;
            
            // Update buttons
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === questions.length - 1;

            // Load options
            optionsContainer.innerHTML = '';
            q.o.forEach((optionText, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full text-right p-4 rounded-xl border-2 border-gray-200 font-semibold text-gray-700 bg-gray-50 hover:shadow-sm`;
                btn.innerText = optionText;
                
                // If already answered, show correct/wrong state
                if (userAnswers[index] !== null) {
                    btn.disabled = true;
                    btn.style.cursor = 'default';
                    if (i === q.a) {
                        btn.classList.add('correct-answer');
                    } else if (i === userAnswers[index]) {
                        btn.classList.add('wrong-answer');
                    }
                } else {
                    btn.onclick = () => selectOption(i, btn);
                }
                
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, btnElement) {
            const correctIndex = questions[currentQuestionIndex].a;
            userAnswers[currentQuestionIndex] = selectedIndex;
            
            const allOptions = optionsContainer.children;
            
            for(let i = 0; i < allOptions.length; i++) {
                allOptions[i].disabled = true;
                allOptions[i].style.cursor = 'default';
                if(i === correctIndex) {
                    allOptions[i].classList.add('correct-answer');
                } else if(i === selectedIndex && i !== correctIndex) {
                    allOptions[i].classList.add('wrong-answer');
                }
            }

            if (selectedIndex === correctIndex) {
                score++;
                scoreDisplay.innerText = `النتيجة: ${score} / ${questions.length}`;
            }

            updateGridBtn(currentQuestionIndex);
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                loadQuestion(currentQuestionIndex + 1);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                loadQuestion(currentQuestionIndex - 1);
            }
        }

        function toggleGrid() {
            questionGrid.classList.toggle('hidden');
        }

        function changeLesson() {
            const selectedLesson = document.getElementById('lesson-select').value;
            if (selectedLesson === 'all') {
                questions = [...allQuestions];
            } else {
                questions = allQuestions.filter(q => q.lesson === selectedLesson);
            }
            
            // تصفير النتيجة والعدادات عند تغيير الدرس
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = new Array(questions.length).fill(null);
            
            // تحديث الواجهة
            scoreDisplay.innerText = `النتيجة: 0 / ${questions.length}`;
            buildGrid();
            loadQuestion(0);
        }

        // Initialize App
        window.onload = init;
    </script>
</body>
</html>
