            const [selectedAnswers, setSelectedAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [score, setScore] = useState(0);

            const lessonsList = Object.keys(categoriesMap);

            const startQuiz = (lesson) => {
                setSelectedLesson(lesson);
                if (lesson === 'الكل') {
                    setQuizData(processedQuizData);
                } else {
                    setQuizData(processedQuizData.filter(q => q.lesson === lesson));
                }
                setCurrentQuestionIndex(0);
                setSelectedAnswers({});
                setShowResults(false);
                setScore(0);
            };

            const resetToMenu = () => {
                setSelectedLesson(null);
                setQuizData([]);
            };

            // ---- Menu Screen ----
            if (!selectedLesson) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center py-12 px-4 text-slate-800 fade-in">
                        <div className="bg-white rounded-3xl shadow-xl p-8 max-w-2xl w-full text-center border border-slate-100">
                            <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <BookOpen className="w-10 h-10 text-blue-600" />
                            </div>
                            <h1 className="text-3xl font-extrabold text-slate-800 mb-4">بنك أسئلة ماذا يحدث - فيزياء</h1>
                            <p className="text-slate-500 mb-10 text-lg">الرجاء اختيار الدرس الذي تود اختباره أو اختر جميع الدروس للتقييم الشامل.</p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                                {lessonsList.map((lesson, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => startQuiz(lesson)}
                                        className="bg-white border-2 border-slate-200 hover:border-blue-500 hover:bg-blue-50 text-slate-700 font-semibold py-4 px-6 rounded-xl transition duration-200 shadow-sm"
                                    >
                                        {lesson}
                                    </button>
                                ))}
                            </div>

                            <button 
                                onClick={() => startQuiz('الكل')}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition duration-200 shadow-md text-lg"
                            >
                                اختبار في جميع الدروس الشامل ({processedQuizData.length} سؤال)
                            </button>
                        </div>
                        <footer className="mt-8 text-slate-400 font-medium text-sm">
                            أعده الموجه الفني للفيزياء أ/ وليد عزت
                        </footer>
                    </div>
                )
            }

            // ---- Quiz Logic ----
            const totalQuestions = quizData.length;
            const currentQuestion = quizData[currentQuestionIndex];
            const isAnswered = selectedAnswers[currentQuestionIndex] !== undefined;

            const handleOptionSelect = (optionIndex) => {
                if (isAnswered) return;

                const isCorrect = currentQuestion.answerOptions[optionIndex].isCorrect;
                setSelectedAnswers({
                    ...selectedAnswers,
                    [currentQuestionIndex]: optionIndex
                });

                if (isCorrect) setScore(prevScore => prevScore + 1);
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < totalQuestions - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                } else {
                    setShowResults(true);
                }
            };

            const handleRestart = () => {
                setCurrentQuestionIndex(0);
                setSelectedAnswers({});
                setShowResults(false);
                setScore(0);
            };

            // ---- Results Screen ----
            if (showResults) {
                const percentage = Math.round((score / totalQuestions) * 100);
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-slate-800 fade-in">
                        <div className="bg-white rounded-2xl shadow-xl p-8 max-w-lg w-full text-center">
                            <Award className="w-20 h-20 mx-auto text-blue-500 mb-6" />
                            <h2 className="text-3xl font-bold text-slate-800 mb-2">اكتمل الاختبار!</h2>
                            <p className="text-slate-600 mb-2">اختبار: {selectedLesson}</p>
                            <p className="text-slate-600 mb-8">لقد أجبت على الأسئلة ببراعة.</p>
                            
                            <div className="bg-blue-50 rounded-xl p-6 mb-8 border border-blue-100">
                                <div className="text-5xl font-extrabold text-blue-600 mb-2">{percentage}%</div>
                                <p className="text-lg text-blue-800">النتيجة: {score} من {totalQuestions}</p>
                            </div>
                            
                            <div className="flex flex-col gap-3">
                                <button 
                                    onClick={handleRestart}
                                    className="flex items-center justify-center w-full gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200"
                                >
                                    <RotateCcw className="w-5 h-5" />
                                    إعادة الاختبار الحالي
                                </button>
                                <button 
                                    onClick={resetToMenu}
                                    className="flex items-center justify-center w-full gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-6 rounded-lg transition duration-200"
                                >
                                    <HomeIcon className="w-5 h-5" />
                                    العودة للقائمة الرئيسية
                                </button>
                            </div>
                        </div>

                        <footer className="mt-8 text-slate-500 font-medium text-sm">
                            أعده الموجه الفني للفيزياء أ/ وليد عزت
                        </footer>
                    </div>
                );
            }

            // ---- Quiz Screen ----
            return (
                <div className="min-h-screen bg-slate-50 py-8 px-4 fade-in">
                    <div className="max-w-3xl mx-auto">
                        
                        {/* Header */}
                        <header className="flex flex-col sm:flex-row items-center justify-between mb-8 gap-4">
                            <div className="flex flex-col gap-1 text-center sm:text-right">
                                <h1 className="text-2xl font-bold text-slate-800">اختبار {selectedLesson === 'الكل' ? 'شامل' : selectedLesson}</h1>
                                <span className="text-sm font-medium text-slate-500">الدرس: {currentQuestion.lesson}</span>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200 font-medium text-slate-700 flex-shrink-0">
                                    السؤال {currentQuestionIndex + 1} / {totalQuestions}
                                </div>
                                <button onClick={resetToMenu} className="bg-slate-200 hover:bg-slate-300 text-slate-600 p-2 rounded-full transition" title="القائمة الرئيسية">
                                    <HomeIcon className="w-5 h-5" />
                                </button>
                            </div>
                        </header>

                        {/* Progress Bar */}
                        <div className="w-full bg-slate-200 rounded-full h-2.5 mb-8 overflow-hidden" dir="ltr">
                            <div 
                                className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" 
                                style={{ width: `${((currentQuestionIndex + 1) / totalQuestions) * 100}%` }}
                            ></div>
                        </div>

                        {/* Question Card */}
                        <div className="bg-white rounded-2xl shadow-md p-6 sm:p-8 mb-6 border border-slate-100">
                            <h2 className="text-2xl sm:text-3xl font-bold text-slate-800 mb-8 leading-relaxed">
                                <span className="text-blue-600 text-lg sm:text-xl ml-2 font-bold opacity-50">Q{currentQuestion.questionNumber}.</span>
                                {currentQuestion.question}
                            </h2>

                            <div className="space-y-4">
                                {currentQuestion.answerOptions.map((option, index) => {
                                    const isSelected = selectedAnswers[currentQuestionIndex] === index;
                                    const isCorrect = option.isCorrect;
                                    
                                    let buttonStyle = "bg-white hover:bg-slate-50 border-slate-200 text-slate-700";
                                    let icon = null;

                                    if (isAnswered) {
                                        if (isCorrect) {
                                            buttonStyle = "bg-green-50 border-green-500 text-green-800";
                                            icon = <CheckCircle2 className="w-6 h-6 text-green-600" />;
                                        } else if (isSelected && !isCorrect) {
                                            buttonStyle = "bg-red-50 border-red-500 text-red-800";
                                            icon = <XCircle className="w-6 h-6 text-red-600" />;
                                        } else {
                                            buttonStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                                        }
                                    }

                                    return (
                                        <button
                                            key={index}
                                            onClick={() => handleOptionSelect(index)}
                                            disabled={isAnswered}
                                            className={`w-full text-right p-5 rounded-xl border-2 transition-all duration-200 flex items-center justify-between text-lg ${buttonStyle} ${!isAnswered ? 'hover:border-blue-300 hover:shadow-sm' : ''}`}
                                        >
                                            <span className="font-medium ml-4">{option.text}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Feedback Section */}
                        {isAnswered && (() => {
                            const isUserCorrect = currentQuestion.answerOptions[selectedAnswers[currentQuestionIndex]].isCorrect;
                            const correctAnswer = currentQuestion.answerOptions.find(opt => opt.isCorrect);
                            
                            return (
                                <div className={`p-6 rounded-xl mb-6 border-2 fade-in ${isUserCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                    <h3 className={`font-bold text-xl mb-3 ${isUserCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                        {isUserCorrect ? 'إجابة صحيحة! 🎉' : 'إجابة خاطئة! 💡'}
                                    </h3>
                                    
                                    {!isUserCorrect && (
                                        <div className="mb-3 text-lg">
                                            <span className="font-bold text-slate-800">الإجابة الصحيحة هي: </span>
                                            <span className="text-slate-700">{correctAnswer.text}</span>
                                        </div>
                                    )}
                                    
                                    <div className="text-lg leading-relaxed">
                                        <strong className="text-blue-800">التفسير العلمي: </strong> 
                                        <span className="text-slate-700">{correctAnswer.rationale}</span>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* Navigation */}
                        {isAnswered && (
                            <div className="flex justify-end fade-in">
                                <button 
                                    onClick={handleNextQuestion}
                                    className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition duration-200 shadow-md hover:shadow-lg"
                                >
                                    {currentQuestionIndex === totalQuestions - 1 ? 'عرض النتيجة' : 'السؤال التالي'}
                                    <ChevronLeft className="w-5 h-5 rotate-180" />
                                </button>
                            </div>
                        )}

                        {/* Footer */}
                        <footer className="mt-12 text-center text-slate-500 font-medium pb-4">
                            أعده الموجه الفني للفيزياء أ/ وليد عزت
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
