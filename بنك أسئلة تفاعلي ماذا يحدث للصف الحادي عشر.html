                            <div className="space-y-4">
                                {currentQuestion.answerOptions.map((option, index) => {
                                    const isSelected = selectedAnswers[currentQuestionIndex] === index;
                                    const isCorrect = option.isCorrect;
                                    
                                    let buttonStyle = "bg-white hover:bg-slate-50 border-slate-200 text-slate-700";
                                    let icon = null;

                                    if (isAnswered) {
                                        if (isCorrect) {
                                            buttonStyle = "bg-green-50 border-green-500 text-green-800";
                                            icon = <CheckCircle2 className="w-6 h-6 text-green-600" />;
                                        } else if (isSelected && !isCorrect) {
                                            buttonStyle = "bg-red-50 border-red-500 text-red-800";
                                            icon = <XCircle className="w-6 h-6 text-red-600" />;
                                        } else {
                                            buttonStyle = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                                        }
                                    }

                                    return (
                                        <button
                                            key={index}
                                            onClick={() => handleOptionSelect(index)}
                                            disabled={isAnswered}
                                            className={`w-full text-right p-5 rounded-xl border-2 transition-all duration-200 flex items-center justify-between text-lg ${buttonStyle} ${!isAnswered ? 'hover:border-blue-300 hover:shadow-sm' : ''}`}
                                        >
                                            <span className="font-medium ml-4">{option.text}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Feedback Section */}
                        {isAnswered && (
                            <div className={`p-6 rounded-xl mb-6 border-2 fade-in ${currentQuestion.answerOptions[selectedAnswers[currentQuestionIndex]].isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                <h3 className={`font-bold text-xl mb-2 ${currentQuestion.answerOptions[selectedAnswers[currentQuestionIndex]].isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                    {currentQuestion.answerOptions[selectedAnswers[currentQuestionIndex]].isCorrect ? 'إجابة صحيحة! 🎉' : 'إجابة خاطئة! 💡'}
                                </h3>
                                <p className="text-slate-700 text-lg leading-relaxed">
                                    <strong>التفسير العلمي: </strong> 
                                    {currentQuestion.answerOptions.find(opt => opt.isCorrect).rationale}
                                </p>
                            </div>
                        )}

                        {/* Navigation */}
                        {isAnswered && (
                            <div className="flex justify-end fade-in">
                                <button 
                                    onClick={handleNextQuestion}
                                    className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition duration-200 shadow-md hover:shadow-lg"
                                >
                                    {currentQuestionIndex === totalQuestions - 1 ? 'عرض النتيجة' : 'السؤال التالي'}
                                    <ChevronLeft className="w-5 h-5 rotate-180" />
                                </button>
                            </div>
                        )}

                        {/* Footer */}
                        <footer className="mt-12 text-center text-slate-500 font-medium pb-4">
                            أعده الموجه الفني للفيزياء أ/ وليد عزت
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
