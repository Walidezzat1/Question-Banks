                questions: [

                { q: 'يوصل جهاز الفولتميتر في الدائرة الكهربائية على التوازي.', a: 'لكي يقيس فرق الجهد (الشغل المبذول) بين النقطتين المطلوبتين بدقة.' },
                { q: 'يتم توصيل الأجهزة الكهربائية في المنازل على التوازي.', a: 'لكي يعمل كل جهاز بفرق الجهد الكلي للمصدر، وحتى إذا تعطل أو أُغلق أحد الأجهزة لا ينقطع التيار عن باقي الأجهزة في المنزل.' },
                { q: 'لا يفضل استخدام التوصيل على التوالي في توصيل الأجهزة الكهربائية بالمنازل.', a: 'لأنه لو تعطل أو أُطفئ أحد الأجهزة فسينقطع مسار التيار وتتوقف جميع الأجهزة الأخرى عن العمل، كما أن الجهد سيتجزأ عليها ولن تعمل بكفاءة.' },
                { q: 'في التوصيل على التوالي تكون المقاومة المكافئة أكبر من أكبر مقاومة في المجموعة.', a: 'لأن المقاومة المكافئة تُحسب بجمع قيم جميع المقاومات المتصلة.' },
                { q: 'في التوصيل على التوازي تكون المقاومة المكافئة أصغر من أصغر مقاومة في المجموعة.', a: 'لأن مقلوب المقاومة المكافئة يساوي مجموع مقلوبات المقاومات المتصلة، مما يعادل زيادة في مساحة المقطع الكلي لمسار التيار.' },
                { q: 'شدة التيار المار في جميع المقاومات المتصلة على التوالي تكون متساوية.', a: 'لأنه يوجد مسار واحد فقط لتدفق الشحنات الكهربائية خلال الدائرة.' },
                { q: 'فرق الجهد يتجزأ على المقاومات في التوصيل على التوالي.', a: 'لأن كل مقاومة تستهلك جزءاً من طاقة المصدر (جهده) يتناسب طردياً مع قيمتها لدفع نفس التيار خلالها.' },
                { q: 'فرق الجهد يكون متساوياً بين طرفي جميع المقاومات المتصلة على التوازي.', a: 'لأن جميع المقاومات متصلة مباشرة بنفس النقطتين (نفس قطبي المصدر).' },
                { q: 'يتجزأ التيار الرئيسي في دائرة التوصيل على التوازي.', a: 'لوجود تفرعات (مسارات متعددة) أمام الشحنات، ويتوزع التيار بنسب عكسية مع قيم المقاومات.' },
                { q: 'تزداد قراءة الأميتر الكلي في الدائرة إذا تم إضافة مقاومة جديدة على التوازي.', a: 'لأن إضافة مقاومة على التوازي يقلل من المقاومة المكافئة الكلية للدائرة، مما يزيد من شدة التيار الكلي المسحوب من المصدر.' },
                { q: 'تقل قراءة الأميتر الكلي في الدائرة إذا تم إضافة مقاومة جديدة على التوالي.', a: 'لأن إضافة مقاومة على التوالي يزيد من المقاومة المكافئة الكلية للدائرة، مما يقلل من شدة التيار الكلي.' }
                ]
            }
        ];

        // معالجة البيانات لإضافة معرفات فريدة للأسئلة
        lessonsData.forEach(lesson => {
            lesson.questions.forEach((q, idx) => {
                q.id = `${lesson.id}-q-${idx}`;
            });
        });

        // حالة التطبيق
        let activeLessonId = lessonsData[0].id;
        let openQuestions = {}; // { qId: boolean }
        let userAnswers = {}; // { qId: string }
        let revealedAnswers = {}; // { qId: boolean }
        let searchTerm = '';

        // دوال التحديث والعرض
        function initApp() {
            renderSidebar();
            renderMainContent();
            lucide.createIcons();
        }

        function renderSidebar() {
            const listEl = document.getElementById('lessons-list');
            listEl.innerHTML = '';
            
            lessonsData.forEach(lesson => {
                const isActive = activeLessonId === lesson.id;
                const btnClass = isActive 
                    ? 'bg-blue-50 border-blue-500 text-blue-700' 
                    : 'bg-white border-transparent text-gray-600 hover:bg-gray-100';
                
                const btn = document.createElement('button');
                btn.className = `w-full text-right p-3 rounded-lg text-sm font-medium transition-colors border ${btnClass}`;
                btn.onclick = () => handleLessonChange(lesson.id);
                btn.innerHTML = `
                    <div class="text-xs text-gray-400 mb-1">${lesson.unit}</div>
                    <div>${lesson.title}</div>
                `;
                listEl.appendChild(btn);
            });
        }

        function handleLessonChange(id) {
            activeLessonId = id;
            searchTerm = '';
            document.getElementById('search-input').value = '';
            // Note: We intentionally don't reset answers/open state here
            renderSidebar();
            renderMainContent();
            lucide.createIcons();
        }

        function handleSearch(term) {
            searchTerm = term;
            renderQuestionsList();
            lucide.createIcons();
        }

        function expandAll() {
            const currentData = lessonsData.find(l => l.id === activeLessonId);
            const filtered = getFilteredQuestions(currentData.questions);
            filtered.forEach(item => {
                openQuestions[item.id] = true;
            });
            renderQuestionsList();
            lucide.createIcons();
        }

        function collapseAll() {
            openQuestions = {};
            renderQuestionsList();
            lucide.createIcons();
        }

        function toggleQuestion(qId) {
            openQuestions[qId] = !openQuestions[qId];
            renderQuestionsList();
            lucide.createIcons();
        }

        function handleUserAnswerChange(qId, value) {
            userAnswers[qId] = value;
            const hasAnswered = value.trim().length > 0;
            
            // تحديث عناصر محددة في الـ DOM لتجنب فقدان التركيز (Focus)
            const warningEl = document.getElementById(`warning-${qId}`);
            const btnEl = document.getElementById(`reveal-btn-${qId}`);
            
            if (warningEl && btnEl) {
                if (hasAnswered) {
                    warningEl.className = "text-xs font-medium text-green-600";
                    warningEl.innerText = "✨ ممتاز! يمكنك الآن مقارنة إجابتك.";
                    btnEl.disabled = false;
                    btnEl.className = "px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-all bg-blue-600 text-white hover:bg-blue-700 shadow-sm hover:shadow-md transform hover:-translate-y-0.5";
                } else {
                    warningEl.className = "text-xs font-medium text-orange-500";
                    warningEl.innerText = "⚠️ يجب كتابة محاولة للإجابة لتتمكن من رؤية الإجابة النموذجية.";
                    btnEl.disabled = true;
                    btnEl.className = "px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-all bg-gray-200 text-gray-400 cursor-not-allowed";
                }
            }
        }

        function revealAnswer(qId) {
            revealedAnswers[qId] = true;
            renderQuestionsList();
            lucide.createIcons();
        }

        function getFilteredQuestions(questions) {
            if (!searchTerm.trim()) return questions;
            const term = searchTerm.toLowerCase();
            return questions.filter(item => 
                item.q.toLowerCase().includes(term) || item.a.toLowerCase().includes(term)
            );
        }

        function renderMainContent() {
            const currentLessonData = lessonsData.find(l => l.id === activeLessonId);
            document.getElementById('current-lesson-title').innerText = currentLessonData.title;
            document.getElementById('questions-count').innerText = `إجمالي الأسئلة في هذا الدرس: ${currentLessonData.questions.length}`;
            renderQuestionsList();
        }

        function renderQuestionsList() {
            const container = document.getElementById('questions-container');
            const currentLessonData = lessonsData.find(l => l.id === activeLessonId);
            const filteredQuestions = getFilteredQuestions(currentLessonData.questions);
            
            container.innerHTML = '';

            if (filteredQuestions.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500 bg-gray-50 rounded-lg border border-dashed border-gray-200">
                        <i data-lucide="search" class="w-10 h-10 mx-auto mb-3 text-gray-300"></i>
                        <p>لم يتم العثور على أسئلة تطابق بحثك في هذا الدرس.</p>
                    </div>
                `;
                return;
            }

            filteredQuestions.forEach((item, index) => {
                const qId = item.id;
                const isOpen = !!openQuestions[qId];
                const answerText = userAnswers[qId] || '';
                const hasAnswered = answerText.trim().length > 0;
                const isRevealed = !!revealedAnswers[qId];

                const wrapperClass = isOpen ? 'border-blue-200 bg-blue-50/30' : 'border-gray-200 bg-white hover:border-blue-300';
                const chevronIcon = isOpen ? 'chevron-up' : 'chevron-down';

                let answerHtml = '';
                if (isOpen) {
                    let actionAreaHtml = '';
                    if (!isRevealed) {
                        const warningClass = !hasAnswered ? 'text-orange-500' : 'text-green-600';
                        const warningText = !hasAnswered ? "⚠️ يجب كتابة محاولة للإجابة لتتمكن من رؤية الإجابة النموذجية." : "✨ ممتاز! يمكنك الآن مقارنة إجابتك.";
                        const btnStateClass = hasAnswered 
                            ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-sm hover:shadow-md transform hover:-translate-y-0.5' 
                            : 'bg-gray-200 text-gray-400 cursor-not-allowed';

                        actionAreaHtml = `
                            <div class="flex flex-col sm:flex-row items-center justify-between mt-2 gap-3">
                                <span id="warning-${qId}" class="text-xs font-medium ${warningClass}">
                                    ${warningText}
                                </span>
                                <button
                                    id="reveal-btn-${qId}"
                                    onclick="revealAnswer('${qId}')"
                                    ${!hasAnswered ? 'disabled' : ''}
                                    class="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-all ${btnStateClass}"
                                >
                                    <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                                    قارن إجابتك
                                </button>
                            </div>
                        `;
                    } else {
                        actionAreaHtml = `
                            <div class="mt-3 p-4 bg-white border border-green-200 rounded-lg flex flex-col sm:flex-row gap-3 text-gray-800 shadow-sm">
                                <div class="font-bold text-green-700 whitespace-nowrap flex items-center gap-1">
                                    <i data-lucide="check-circle-2" class="w-5 h-5"></i> الإجابة النموذجية:
                                </div>
                                <div class="leading-relaxed font-medium">${item.a}</div>
                            </div>
                        `;
                    }

                    const textareaClass = isRevealed ? 'bg-gray-100 text-gray-600 border-gray-200' : 'bg-white border-blue-200';
                    
                    answerHtml = `
                        <div class="p-4 pt-0 border-t border-blue-100 bg-blue-50/50 flex flex-col gap-3">
                            <div class="mt-3">
                                <label class="flex items-center gap-2 text-sm font-bold text-blue-800 mb-2">
                                    <i data-lucide="pen-tool" class="w-4 h-4"></i>
                                    محاولتك للإجابة:
                                </label>
                                <textarea
                                    oninput="handleUserAnswerChange('${qId}', this.value)"
                                    class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-y transition-colors ${textareaClass}"
                                    rows="2"
                                    placeholder="فكر واكتب إجابتك هنا أولاً..."
                                    ${isRevealed ? 'disabled' : ''}
                                >${answerText}</textarea>
                            </div>
                            ${actionAreaHtml}
                        </div>
                    `;
                }

                const questionHTML = `
                    <div class="border rounded-xl overflow-hidden transition-all duration-200 ${wrapperClass}">
                        <button
                            class="w-full flex justify-between items-start p-4 text-right focus:outline-none"
                            onclick="toggleQuestion('${qId}')"
                        >
                            <span class="font-semibold text-gray-800 leading-relaxed pl-4">
                                <span class="text-blue-600 ml-2">${index + 1}.</span> 
                                ${item.q}
                            </span>
                            <div class="mt-1 bg-gray-100 p-1 rounded-full text-gray-500 flex-shrink-0">
                                <i data-lucide="${chevronIcon}" class="w-4 h-4"></i>
                            </div>
                        </button>
                        ${answerHtml}
                    </div>
                `;
                
                // إدراج العنصر كنص HTML
                container.insertAdjacentHTML('beforeend', questionHTML);
            });
        }

        // بدء التطبيق عند تحميل الصفحة
        window.onload = initApp;

    </script>
</body>
</html>
