                ]

            {

                    ["يوصل جهاز الأميتر في الدائرة الكهربائية على التوالي.", "لكي يمر فيه نفس التيار الكلي المراد قياس شدته دون أن يتجزأ.", "ليقيس فرق الجهد بدقة.", "لزيادة مقاومة الدائرة الكلية.", "لتقليل التيار المار في الدائرة."],

                    ["في دائرة التوازي، تكون المقاومة المكافئة أصغر من أصغر مقاومة.", "لأن إضافة فروع مسارات جديدة تزيد مساحة المقطع الكلي فتقل الممانعة الكلية.", "لأن الجهد يتضاعف.", "بسبب تصادم الإلكترونات ببعضها بقوة.", "لأن التيار ينعدم في التوازي."],
                    ["شدة التيار في جميع المقاومات المتصلة على التوالي تكون متساوية.", "لأنه يوجد مسار واحد فقط لتدفق الشحنات الكهربائية خلال الدائرة.", "لأن الجهد يتجزأ بالتساوي.", "لأن المقاومات تلغي بعضها.", "بسبب ثبات درجة الحرارة."],
                    ["يتجزأ التيار الرئيسي في دائرة التوصيل على التوازي.", "لوجود تفرعات (مسارات متعددة)، ويتوزع التيار بنسب عكسية مع المقاومات.", "لأن الجهد يتجزأ أيضاً.", "لأن البطارية تفقد طاقتها بسرعة.", "بسبب زيادة المقاومة الكلية."],
                    ["فرق الجهد يكون متساوياً بين طرفي جميع المقاومات المتصلة على التوازي.", "لأن جميع المقاومات متصلة مباشرة بنفس النقطتين (قطبي المصدر).", "لأن التيار متساوٍ فيها.", "لأن المقاومة المكافئة صفر.", "بسبب قصر طول الأسلاك."],
                    ["تزداد قراءة الأميتر الكلي عند إضافة مقاومة جديدة على التوازي.", "لأن المقاومة المكافئة تقل، وحسب أوم يزداد التيار الكلي عند ثبات الجهد.", "لأن الجهد يتضاعف.", "لأن المقاومة المكافئة تزداد.", "بسبب ارتفاع درجة الحرارة."],
                    ["تقل قراءة الأميتر الكلي عند إضافة مقاومة جديدة على التوالي.", "لأن إضافة مقاومة على التوالي يزيد المقاومة المكافئة، فيقل التيار الكلي.", "لأن الجهد ينعدم.", "لأن البطارية تنطفئ.", "بسبب قلة الإلكترونات الحرة."],
                    ["مجموع الجهود الواقعة عبر كل جهاز في دائرة التوالي يساوي الجهد الكلي.", "لأن الطاقة الكلية مقسمة لدفع الشحنة خلال كل مقاومة بالدائرة.", "لأن المقاومات تتساوى في القيمة.", "بسبب التوصيل العكسي للبطارية.", "لأن التيار يتجزأ بالتساوي."]
                ]
            }
        ];

        let processedQuestions = [];
        
        compactData.forEach(lesson => {
            const pLesson = {
                id: lesson.id,
                unit: lesson.unit,
                title: lesson.title,
                questions: []
            };

            lesson.data.forEach((qArr, idx) => {
                let options = [qArr[1], qArr[2], qArr[3], qArr[4]];
                options = options.sort(() => Math.random() - 0.5);
                const correctIndex = options.indexOf(qArr[1]);

                pLesson.questions.push({
                    id: `${lesson.id}-q-${idx}`,
                    q: qArr[0],
                    options: options,
                    correctIndex: correctIndex,
                    correctText: qArr[1]
                });
            });

            processedQuestions.push(pLesson);
        });

        let activeLessonId = processedQuestions[0].id;
        let openQuestions = {}; 
        let userChoices = {}; 
        let searchTerm = '';

        function initApp() {
            renderSidebar();
            renderMainContent();
            updateScore();
            lucide.createIcons();
        }

        function renderSidebar() {
            const listEl = document.getElementById('lessons-list');
            listEl.innerHTML = '';
            
            processedQuestions.forEach(lesson => {
                const isActive = activeLessonId === lesson.id;
                const btnClass = isActive 
                    ? 'bg-blue-50 border-blue-500 text-blue-800 shadow-sm' 
                    : 'bg-white border-transparent text-gray-600 hover:bg-gray-100';
                
                const btn = document.createElement('button');
                btn.className = `w-full text-right p-3 rounded-lg text-sm font-medium transition-colors border ${btnClass}`;
                btn.onclick = () => handleLessonChange(lesson.id);
                btn.innerHTML = `
                    <div class="text-xs text-gray-400 mb-1">${lesson.unit}</div>
                    <div>${lesson.title}</div>
                `;
                listEl.appendChild(btn);
            });
        }

        function handleLessonChange(id) {
            activeLessonId = id;
            searchTerm = '';
            document.getElementById('search-input').value = '';
            updateScore();
            renderSidebar();
            renderMainContent();
            lucide.createIcons();
        }

        function handleSearch(term) {
            searchTerm = term;
            renderQuestionsList();
            lucide.createIcons();
        }

        function expandAll() {
            const currentData = processedQuestions.find(l => l.id === activeLessonId);
            const filtered = getFilteredQuestions(currentData.questions);
            filtered.forEach(item => openQuestions[item.id] = true);
            renderQuestionsList();
            lucide.createIcons();
        }

        function collapseAll() {
            openQuestions = {};
            renderQuestionsList();
            lucide.createIcons();
        }

        function toggleQuestion(qId) {
            openQuestions[qId] = !openQuestions[qId];
            renderQuestionsList();
            lucide.createIcons();
        }

        function selectOption(qId, selectedIndex) {
            if (userChoices[qId] !== undefined) return;
            userChoices[qId] = selectedIndex;
            updateScore();
            renderQuestionsList(); 
            lucide.createIcons();
        }

        function updateScore() {
            const currentData = processedQuestions.find(l => l.id === activeLessonId);
            let correct = 0;
            let wrong = 0;
            let total = currentData.questions.length;

            currentData.questions.forEach(q => {
                if(userChoices[q.id] !== undefined) {
                    if(userChoices[q.id] === q.correctIndex) correct++;
                    else wrong++;
                }
            });

            document.getElementById('score-correct').innerText = `${correct} صحيحة`;
            document.getElementById('score-wrong').innerText = `${wrong} خاطئة`;
            
            const answered = correct + wrong;
            const percentage = total === 0 ? 0 : (answered / total) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            
            const bar = document.getElementById('progress-bar');
            if (percentage === 100 && wrong === 0) bar.className = "bg-green-500 h-2.5 rounded-full";
            else if (percentage > 0) bar.className = "bg-blue-500 h-2.5 rounded-full";
            else bar.className = "bg-gray-300 h-2.5 rounded-full";
        }

        function getFilteredQuestions(questions) {
            if (!searchTerm.trim()) return questions;
            const term = searchTerm.toLowerCase();
            return questions.filter(item => 
                item.q.toLowerCase().includes(term) || item.correctText.toLowerCase().includes(term)
            );
        }

        function renderMainContent() {
            const currentLessonData = processedQuestions.find(l => l.id === activeLessonId);
            document.getElementById('current-lesson-title').innerText = currentLessonData.title;
            document.getElementById('questions-count').innerText = `إجمالي الأسئلة: ${currentLessonData.questions.length}`;
            renderQuestionsList();
        }

        function renderQuestionsList() {
            const container = document.getElementById('questions-container');
            const currentLessonData = processedQuestions.find(l => l.id === activeLessonId);
            const filteredQuestions = getFilteredQuestions(currentLessonData.questions);
            
            container.innerHTML = '';

            if (filteredQuestions.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                        <i data-lucide="search" class="w-10 h-10 mx-auto mb-3 text-gray-300"></i>
                        <p>لم يتم العثور على أسئلة تطابق بحثك.</p>
                    </div>
                `;
                return;
            }

            filteredQuestions.forEach((item, index) => {
                const qId = item.id;
                const isOpen = !!openQuestions[qId];
                const answeredIndex = userChoices[qId];
                const hasAnswered = answeredIndex !== undefined;
                const isCorrect = hasAnswered && answeredIndex === item.correctIndex;

                let wrapperBorderClass = 'border-gray-200 hover:border-blue-300';
                let headerBgClass = 'bg-white';
                
                if (hasAnswered) {
                    wrapperBorderClass = isCorrect ? 'border-green-400' : 'border-red-300';
                    headerBgClass = isCorrect ? 'bg-green-50/30' : 'bg-red-50/30';
                } else if (isOpen) {
                    wrapperBorderClass = 'border-blue-300';
                    headerBgClass = 'bg-blue-50/20';
                }

                const chevronIcon = isOpen ? 'chevron-up' : 'chevron-down';
                
                let iconStatus = '';
                if(hasAnswered) {
                    iconStatus = isCorrect 
                        ? `<i data-lucide="check-circle-2" class="w-5 h-5 text-green-500 ml-2 flex-shrink-0"></i>` 
                        : `<i data-lucide="x-circle" class="w-5 h-5 text-red-500 ml-2 flex-shrink-0"></i>`;
                }

                let answerHtml = '';
                if (isOpen) {
                    const optionsHtml = item.options.map((optText, optIdx) => {
                        let btnClasses = "option-btn w-full text-right p-4 border rounded-xl transition-all duration-200 text-sm md:text-base leading-relaxed";
                        
                        if (!hasAnswered) {
                            btnClasses += " border-gray-200 hover:border-blue-500 hover:bg-blue-50 bg-white";
                        } else {
                            btnClasses += " disabled";
                            if (optIdx === item.correctIndex) {
                                btnClasses += " correct shadow-sm"; 
                            } else if (optIdx === answeredIndex && optIdx !== item.correctIndex) {
                                btnClasses += " wrong"; 
                            } else {
                                btnClasses += " bg-gray-50 border-gray-100 text-gray-400"; 
                            }
                        }

                        return `
                            <button onclick="selectOption('${qId}', ${optIdx})" class="${btnClasses}" ${hasAnswered ? 'disabled' : ''}>
                                ${optText}
                            </button>
                        `;
                    }).join('');

                    let feedbackHtml = '';
                    if (hasAnswered) {
                        if (isCorrect) {
                            feedbackHtml = `
                                <div class="mt-4 p-3 bg-green-50 border border-green-200 rounded-lg flex items-center gap-2 text-green-800 text-sm font-bold">
                                    <i data-lucide="party-popper" class="w-5 h-5"></i> إجابة صحيحة! أحسنت.
                                </div>
                            `;
                        } else {
                            feedbackHtml = `
                                <div class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2 text-red-800 text-sm">
                                    <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                                    <div>
                                        <span class="font-bold">إجابة خاطئة.</span> التفسير الصحيح هو المُظلل باللون الأخضر أعلاه.
                                    </div>
                                </div>
                            `;
                        }
                    }

                    answerHtml = `
                        <div class="p-4 pt-2 border-t border-gray-100">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2">
                                ${optionsHtml}
                            </div>
                            ${feedbackHtml}
                        </div>
                    `;
                }

                const questionHTML = `
                    <div class="border rounded-xl overflow-hidden transition-all duration-200 shadow-sm ${wrapperBorderClass}">
                        <button
                            class="w-full flex justify-between items-start p-4 text-right focus:outline-none ${headerBgClass}"
                            onclick="toggleQuestion('${qId}')"
                        >
                            <span class="font-bold text-gray-800 leading-relaxed pl-4 flex items-start">
                                <span class="text-blue-600 ml-2 font-black flex-shrink-0">${index + 1}.</span> 
                                <span>${item.q}</span>
                                ${iconStatus}
                            </span>
                            <div class="mt-1 bg-white border border-gray-200 p-1 rounded-full text-gray-500 flex-shrink-0 shadow-sm">
                                <i data-lucide="${chevronIcon}" class="w-4 h-4"></i>
                            </div>
                        </button>
                        ${answerHtml}
                    </div>
                `;
                
                container.insertAdjacentHTML('beforeend', questionHTML);
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
