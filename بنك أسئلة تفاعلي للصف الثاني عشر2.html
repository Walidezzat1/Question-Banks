    <script type="text/babel">
        const questionsData = [
            // --- وحدة الحث الكهرومغناطيسي (1-25) ---
            { id: 1, q: "يتولد تيار حثي في ملف عند تقريب مغناطيس منه.", a: "بسبب حدوث تغير في التدفق المغناطيسي الذي يجتاز لفات الملف خلال فترة زمنية." },
            { id: 2, q: "تنعدم القوة الدافعة الكهربائية الحثية في سلك مستقيم يتحرك موازياً لخطوط المجال المغناطيسي.", a: "لأن السلك لا يقطع خطوط المجال المغناطيسي، فتكون الزاوية <span class='math-num'>( 0 )</span> درجة وجيبها صفراً." },
            { id: 3, q: "تتولد قوة دافعة حثية عند تحريك موصل بحيث يقطع خطوط مجال مغناطيسي.", a: "بسبب تأثير القوة المغناطيسية على الشحنات الحرة في الموصل مما يؤدي لانزياحها وتجمعها عند الأطراف مولدة فرق جهد." },
            { id: 4, q: "عند تقريب القطب الشمالي لمغناطيس من ملف، يصبح وجه الملف قطباً شمالياً.", a: "لتوليد قوة تنافر مغناطيسية تقاوم حركة تقريب المغناطيس (المسبب للتيار) تطبيقاً لـ قانون لنز." },
            { id: 5, q: "لا يتولد تيار حثي في حلقة معدنية مقفلة تتحرك بالكامل داخل مجال مغناطيسي منتظم.", a: "لأن التدفق المغناطيسي الذي يجتاز الحلقة يبقى ثابتاً ولا يحدث فيه أي تغير <span class='math-num'>( ΔΦ = 0 )</span>." },
            { id: 6, q: "تُلف أسلاك المقاومات القياسية لفاً مزدوجاً.", a: "لتلافي تأثير الحث الذاتي، حيث يمر التيار في اتجاهين متعاكسين فيلغي كل منهما المجال المغناطيسي للآخر وتصبح الممانعة الحثية صفراً." },
            { id: 7, q: "القوة الدافعة الحثية المتولدة في المولد الكهربائي (الدينامو) متغيرة المقدار والاتجاه.", a: "بسبب التغير المستمر في الزاوية <span class='math-num'>( θ )</span> بين متجه مساحة الملف وخطوط المجال أثناء دوران الملف." },
            { id: 8, q: "ينمو التيار الكهربائي تدريجياً ولا يصل لقيمته العظمى فوراً عند غلق دائرة ملف حثي.", a: "بسبب تولد قوة دافعة كهربائية حثية عكسية ناتجة عن الحث الذاتي تقاوم نمو التيار الأصلي حسب قانون لنز." },
            { id: 9, q: "تنعدم القوة الدافعة الحثية في المولد عندما يكون مستوى الملف عمودياً على خطوط المجال.", a: "لأن معدل تغير التدفق المغناطيسي بالنسبة للزمن <span class='math-num'>( dΦ/dt )</span> في هذا الوضع يساوي صفراً." },
            { id: 10, q: "يتأخر التيار الكهربائي عن الجهد في الملف الحثي النقي.", a: "بسبب الممانعة الحثية وتولد القوة الدافعة العكسية التي تعيق مرور التيار في البداية." },
            { id: 11, q: "تزداد القوة الدافعة الحثية المتولدة في ملف بزيادة عدد لفاته <span class='math-num'>( N )</span>.", a: "لأنها تتناسب طردياً مع عدد اللفات التي يجتازها التدفق المغناطيسي حسب قانون فاراداي." },
            { id: 12, q: "تزداد القوة الدافعة الحثية عند وضع قلب من الحديد المطاوع داخل الملف.", a: "لأن الحديد يزيد من النفاذية المغناطيسية مما يزيد من تركيز التدفق ومعدل تغيره." },
            { id: 13, q: "تزداد القوة الدافعة الحثية المتولدة بزيادة سرعة حركة المغناطيس بالنسبة للملف.", a: "لأن زيادة السرعة تزيد من معدل تغير التدفق المغناطيسي <span class='math-num'>( dΦ/dt )</span> الذي يجتاز الملف خلال وحدة الزمن." },
            { id: 14, q: "يُبذل شغل ميكانيكي عند تحريك مغناطيس داخل ملف متصل بمقاومة.", a: "للتغلب على قوى التنافر أو التجاذب الناشئة عن التيار الحثي، ويتحول هذا الشغل لطاقة كهربائية حرارية (حفظ الطاقة)." },
            { id: 15, q: "ينعدم التدفق المغناطيسي الذي يجتاز سطحاً عندما يكون مستوى السطح موازياً للمجال.", a: "لأن الزاوية بين متجه المساحة والمجال تكون <span class='math-num'>( 90 )</span> درجة، وقيمة <span class='math-num'>( cos 90 = 0 )</span>." },
            { id: 16, q: "تزداد قيمة معامل الحث الذاتي للملف بزيادة عدد لفاته.", a: "لأن معامل الحث الذاتي يتناسب طردياً مع مربع عدد اللفات <span class='math-num'>( N<sup>2</sup> )</span> حسب أبعاد الملف الهندسية." },
            { id: 17, q: "ظهور شرارة كهربائية عند فتح دائرة تيار مستمر تحتوي على ملف حثي كبير.", a: "بسبب تولد قوة دافعة كهربائية حثية طردية كبيرة جداً تحاول منع انهيار التيار المفاجئ وتؤين الهواء." },
            { id: 18, q: "تعتمد القوة الدافعة الحثية في سلك مستقيم على طول السلك.", a: "لأن زيادة الطول تزيد من عدد الشحنات الحرة التي تتأثر بالقوة المغناطيسية، وتتناسب القوة الدافعة طردياً مع الطول <span class='math-num'>( L )</span>." },
            { id: 19, q: "استخدام قانون لنز لتحديد اتجاه التيار الحثي.", a: "لأن القانون ينص على أن التيار الحثي يعاكس التغير في التدفق المسبب له، وهو ما يتفق مع مبدأ حفظ الطاقة." },
            { id: 20, q: "لا تتولد قوة دافعة حثية في حلقة إذا تحركت موازية لمجال مغناطيسي منتظم.", a: "لعدم حدوث تغير في عدد خطوط التدفق المغناطيسي التي تخترق الحلقة أثناء الحركة." },
            { id: 21, q: "يُعد معامل الحث الذاتي مقياساً للقصور الذاتي الكهربائي.", a: "لأنه يمثل ممانعة الملف لأي تغير مفاجئ في شدة التيار المار فيه سواء بالزيادة أو النقصان." },
            { id: 22, q: "تغيير مساحة الحلقة داخل مجال مغناطيسي يولد تياراً حثياً.", a: "لأن تغير المساحة <span class='math-num'>( ΔA )</span> يؤدي لتغير التدفق المغناطيسي <span class='math-num'>( ΔΦ )</span> المخترق لها حسب العلاقة <span class='math-num'>( Φ = B A cos θ )</span>." },
            { id: 23, q: "عند إبعاد القطب الشمالي لمغناطيس من وجه ملف، يتولد فيه قطب جنوبي حثي.", a: "لتوليد قوة تجاذب مغناطيسية تقاوم حركة الإبعاد المسببة للتيار الحثي تطبيقاً لقانون لنز." },
            { id: 24, q: "تخزن الطاقة في الملف الحثي عند مرور تيار فيه.", a: "لأن التيار يبذل شغلاً للتغلب على القوة الدافعة الحثية العكسية، وتخزن هذه الطاقة في صورة مجال مغناطيسي." },
            { id: 25, q: "ينهار التيار في ملف الحث بسرعة أكبر من نموه عند فتح الدائرة.", a: "لأن مقاومة الهواء عند فتح المفتاح كبيرة جداً، مما يجعل معدل التغير في التيار كبيراً جداً." },

            // --- وحدة التيار المتردد (26-50) ---
            { id: 26, q: "متوسط شدة التيار المتردد الجيبي خلال دورة كاملة يساوي صفراً.", a: "لأن مقدار التيار في النصف الموجب للدورة يساوي تماماً مقداره في النصف السالب ويضاده في الاتجاه." },
            { id: 27, q: "يغير التيار المتردد الجيبي اتجاهه كل نصف دورة.", a: "بسبب دوران ملف المولد وتغير قطبية الجهد المتولد كل <span class='math-num'>( 180 )</span> درجة من الدوران." },
            { id: 28, q: "شدة التيار الفعالة <span class='math-num'>( I_rms )</span> تكون دائماً أقل من القيمة العظمى <span class='math-num'>( I_max )</span>.", a: "لأنها تساوي العظمى مقسومة على <span class='math-num'>( &radic;<span style=\"text-decoration:overline;\">2</span> )</span>، أي حوالي <span class='math-num'>( 0.707 )</span> منها." },
            { id: 29, q: "يسبق الجهد الكلي التيار في دائرة تيار متردد تحتوي ملف حثي ومقاومة <span class='math-num'>( RL )</span>.", a: "بسبب وجود الممانعة الحثية للملف التي تؤخر نمو التيار بينما يظهر الجهد عبر الملف فوراً." },
            { id: 30, q: "يسلك المكثف سلوك دائرة مغلقة (موصل) عند الترددات العالية جداً للتيار المتردد.", a: "لأن الممانعة السعوية <span class='math-num'>( X_C )</span> تتناسب عكسياً مع التردد <span class='math-num'>( f )</span>، فتقترب من الصفر عند الترددات العالية." },
            { id: 31, q: "المقاومة الأومية لا تتأثر بتردد التيار المتردد المار فيها.", a: "لأنها تعتمد على خصائص الموصل المادية (طول، مساحة، نوع) ولا تعتمد على سرعة تغير اتجاه التيار." },
            { id: 32, q: "تقل شدة التيار في دائرة بها ملف حثي بزيادة تردد المصدر <span class='math-num'>( f )</span>.", a: "لأن الممانعة الحثية <span class='math-num'>( X_L = 2πfL )</span> تزداد بزيادة التردد مما يعيق مرور التيار." },
            { id: 33, q: "يعمل الملف الحثي كقطع للدائرة (دائرة مفتوحة) في الترددات العالية جداً.", a: "لأن ممانعته الحثية تصبح كبيرة جداً وتمنع مرور التيار بشكل شبه كامل." },
            { id: 34, q: "الملف الحثي المثالي لا يبدي ممانعة لمرور التيار المستمر.", a: "لأن تردد التيار المستمر يساوي <span class='math-num'>( 0 ) Hz</span> فتكون الممانعة الحثية صفراً." },
            { id: 35, q: "يتقدم التيار على الجهد في دائرة مكثف نقي بمقدار ربع دورة.", a: "لأن التيار يبدأ بشحن المكثف أولاً ثم يتولد فرق الجهد بين لوحيه تدريجياً نتيجة تراكم الشحنات." },
            { id: 36, q: "يمنع المكثف مرور التيار المستمر في الدائرة بعد تمام شحنه.", a: "لأنه يتولد جهد عكسي بين لوحيه مساوٍ لجهد المصدر فيتوقف تدفق الشحنات وتصبح المقاومة الكلية مالانهاية." },
            { id: 37, q: "يسمح المكثف بمرور التيار المتردد في دائرته.", a: "بسبب عمليات الشحن والتفريغ المستمرة والمتكررة الناتجة عن التغير المستمر في مقدار واتجاه جهد المصدر." },
            { id: 38, q: "تزداد شدة التيار في دائرة مكثف بزيادة تردد المصدر.", a: "لأن الممانعة السعوية <span class='math-num'>( X_C )</span> تتناسب عكسياً مع التردد، فبزيادته تقل الممانعة ويزداد التيار." },
            { id: 39, q: "المكثف يمرر الترددات العالية جداً بسهولة فائقة.", a: "لأن ممانعته السعوية تصبح صغيرة جداً تقترب من الصفر عند الترددات العالية جداً." },
            { id: 40, q: "تكون المقاومة الأومية <span class='math-num'>( R )</span> هي المقاومة الكلية للدائرة وتساوي أقل قيمة لها في حالة الرنين.", a: "لأن الممانعة الحثية تلغي الممانعة السعوية <span class='math-num'>( X_L = X_C )</span> في الدائرة، وتتبقى المقاومة الأومية فقط." },
            { id: 41, q: "تكون شدة التيار أكبر ما يمكن في دائرة <span class='math-num'>( RLC )</span> عند حالة الرنين.", a: "لأن المقاومة الأومية <span class='math-num'>( R )</span> تكون هي المقاومة الكلية للدائرة وتساوي أدنى قيمة لها مما يسمح بمرور أقصى تيار." },
            { id: 42, q: "لا تستهلك قدرة حقيقية (حرارية) في الملف الحثي النقي.", a: "لأن الطاقة تخزن كمجال مغناطيسي في ربع دورة وتعاد للمصدر دورياً دون فقد حراري." },
            { id: 43, q: "تستهلك الطاقة الكهربائية فقط في المقاومة الأومية في دوائر التيار المتردد.", a: "لأنها المكون الوحيد الذي يحول الطاقة الكهربائية لطاقة حرارية غير مستردة للمصدر." },
            { id: 44, q: "تُعد القيمة الفعالة للتيار المتردد هي القيمة التي تُعاير على أساسها أجهزة القياس.", a: "لأنها تمثل شدة التيار المستمر الذي يولد نفس معدل الطاقة الحرارية في نفس المقاومة." },
            { id: 45, q: "لا تُجمع فروق الجهد جمعاً جبرياً في دوائر التيار المتردد للحصول على الجهد الكلي.", a: "بسبب وجود فرق في الطور (زوايا طور) بين متجهات الجهد، لذا تُجمع جمعاً اتجاهياً." },
            { id: 46, q: "يزداد تردد الرنين <span class='math-num'>( f_0 )</span> في دائرة <span class='math-num'>( RLC )</span> بنقصان سعة المكثف <span class='math-num'>( C )</span>.", a: "لأن تردد الرنين يتناسب عكسياً مع الجذر التربيعي لسعة المكثف حسب العلاقة <span class='math-num'>( f_0 = 1 / [ 2π &radic;<span style=\"text-decoration:overline;\">LC</span> ] )</span>." },
            { id: 47, q: "التيار والجهد متفقان في الطور في المقاومة الأومية الصرفة.", a: "لعدم وجود تأثير سعوي أو حثي يؤخر أياً منهما عن الآخر فينموان ويتلاشيان معاً." },
            { id: 48, q: "لا يتغير تردد الرنين في دائرة <span class='math-num'>( RLC )</span> عند تغير قيمة المقاومة الأومية <span class='math-num'>( R )</span>.", a: "لأن تردد الرنين يتوقف فقط على معامل الحث الذاتي للملف <span class='math-num'>( L )</span> وسعة المكثف <span class='math-num'>( C )</span>." },
            { id: 49, q: "زاوية الطور في دائرة الرنين تساوي صفراً.", a: "لأن الجهد عبر الملف يلغي الجهد عبر المكثف تماماً، فيكون الجهد الكلي منطبقاً على التيار." },
            { id: 50, q: "لا تخزن المقاومة الأومية طاقة كهربائية بل تبددها.", a: "لأنها تحول الطاقة الكهربائية بالكامل وبشكل لحظي إلى طاقة حرارية تتسرب خارج الدائرة." },

            // --- وحدة الفيزياء الحديثة والنووية (51-100) ---
            { id: 51, q: "تعتبر دالة الشغل <span class='math-num'>( Φ )</span> لسطح الفلز صفة مميزة لنوع مادته.", a: "لأنها تمثل الحد الأدنى من الطاقة اللازمة لتحرير الإلكترون من سطح هذا الفلز تحديداً، وتتوقف فقط على نوع المادة." },
            { id: 52, q: "تختلف الخواص الفيزيائية لنظائر العنصر الواحد عن بعضها البعض.", a: "بسبب اختلافها في عدد النيوترونات داخل أنويتها، مما يؤدي لاختلاف العدد الكتلي والكتلة الذرية لكل نظير." },
            { id: 53, q: "بقاء النواة متماسكة رغم وجود قوى تنافر كهربائي كبيرة بين البروتونات.", a: "بسبب وجود القوة النووية القوية التي تعمل بين النيوكليونات المتجاورة وتتغلب على قوى التنافر الكهربائي." },
            { id: 54, q: "لا تؤثر شحنة النيوكليون (بروتون أو نيوترون) على مقدار القوة النووية القوية.", a: "لأن القوة النووية قوة عامة لا تميز بين الشحنات، فهي متساوية المقدار بين <span class='math-num'>( p-p )</span> و <span class='math-num'>( n-n )</span> و <span class='math-num'>( p-n )</span>." },
            { id: 55, q: "تسمى ذرات العنصر نفسه التي تتساوى في العدد الذري وتختلف في الكتلي بالنظائر.", a: "لأنها تحتوي على نفس عدد البروتونات ولكنها تختلف في عدد النيوترونات داخل أنويتها." },
            { id: 56, q: "تزداد طاقة الربط النووية للنواة بزيادة عدد النيوكليونات <span class='math-num'>( A )</span> فيها.", a: "لأن زيادة عدد الجسيمات تزيد من إجمالي الروابط النووية القوية داخل النواة." },
            { id: 57, q: "معظم حجم الذرة عبارة عن فراغ هائل.", a: "لأن كتلة الذرة تتركز في حيز صغير جداً هو النواة، بينما تدور الإلكترونات في مدارات بعيدة جداً عن المركز." },
            { id: 58, q: "لا تتأثر دالة الشغل <span class='math-num'>( Φ )</span> لفلز معين بتغير شدة الضوء الساقط عليه.", a: "لأن دالة الشغل خاصية تعتمد فقط على نوع مادة الفلز، ولا علاقة لها بعدد الفوتونات الساقطة." },
            { id: 59, q: "توصف القوة النووية القوية بأنها قوة قصيرة المدى جداً.", a: "لأن تأثيرها ينعدم تماماً إذا زادت المسافة بين النيوكليونات عن قطر النواة تقريباً <span class='math-num'>( 10<sup>-15</sup> ) m</span>." },
            { id: 60, q: "تخلص النواة من طاقة الإثارة الزائدة يؤدي لزيادة استقرارها.", a: "لأن ذلك يجعل النواة تنتقل من مستوى طاقة مرتفع (حالة مثارة) إلى مستوى طاقة أدنى وأكثر تماسكاً واستقراراً." },
            { id: 61, q: "تميل الأنوية المتوسطة الكتلة (مثل الحديد) إلى أن تكون الأكثر استقراراً.", a: "لأن طاقة الربط النووية لكل نيوكليون فيها تبلغ أقصى قيمة لها وهي <span class='math-num'>( 8.8 ) MeV</span>." },
            { id: 62, q: "تمتلك الأنوية ذات طاقة الربط لكل نيوكليون المرتفعة استقراراً كبيراً.", a: "لأن هذا يعني الحاجة لبذل شغل كبير جداً لانتزاع نيوكليون واحد من داخل النواة." },
            { id: 63, q: "ميل الأنوية الخفيفة جداً إلى الاندماج لتصبح أكثر استقراراً.", a: "لأن ذلك يؤدي لزيادة نصيب النيوكليون الواحد من طاقة الربط واقترابها من منطقة الاستقرار." },
            { id: 64, q: "ميل الأنوية الثقيلة جداً إلى الانشطار لزيادة استقرارها.", a: "لأن ذلك يجزئها إلى أنوية متوسطة الكتلة تمتلك طاقة ربط لكل نيوكليون أعلى، فتصبح أكثر تماسكاً." },
            { id: 65, q: "كتلة النواة الفعلية والمستقرة دائماً أقل من مجموع كتل مكوناتها وهي حرة.", a: "بسبب تحول جزء من كتلة المكونات إلى طاقة ربط نووية عند تكوين النواة طبقاً لمعادلة أينشتاين." },
            { id: 66, q: "تتركز كتلة الذرة بالكامل تقريباً في النواة المركزية.", a: "لأن كتل البروتونات والنيوترونات أكبر بكثير من كتلة الإلكترونات المحيطة." },
            { id: 67, q: "النواة دائماً موجبة الشحنة الكهربائية.", a: "لاحتوائها على بروتونات موجبة الشحنة ونيوترونات متعادلة كهربائياً." },
            { id: 68, q: "تعتبر طاقة الربط النووية لكل نيوكليون هي المقياس الحقيقي لاستقرار النواة.", a: "لأنها تمثل الشغل اللازم لانتزاع نيوكليون واحد من داخل النواة وتفكيك ارتباطها." },
            { id: 69, q: "تصل القوة النووية إلى حالة التشبع في الأنوية الكبيرة.", a: "لأن كل نيوكليون يتفاعل نووياً مع جيرانه الملاصقين له فقط وليس مع كل مكونات النواة." },
            { id: 70, q: "طاقة الربط النووية لكل نيوكليون لنواة الحديد أعلى منها لنواة اليورانيوم.", a: "لأن نواة الحديد تنتمي للأنوية متوسطة الكتلة الأكثر استقراراً، بينما اليورانيوم نواة ثقيلة أقل استقراراً." },
            { id: 71, q: "طاقة الربط النووية الكلية تزداد بشكل عام بزيادة عدد النيوكليونات.", a: "لأن زيادة عدد الجسيمات تزيد من إجمالي الروابط النووية القوية داخل النواة." },
            { id: 72, q: "تزداد نسبة عدد النيوترونات إلى عدد البروتونات <span class='math-num'>( N / Z )</span> في الأنوية الثقيلة المستقرة.", a: "للتغلب على قوى التنافر الكهربائي الكبيرة بين البروتونات الكثيرة، ولتوفير قوى تجاذب نووي إضافية تحافظ على التماسك." },
            { id: 73, q: "كثافة المادة النووية ثابتة تقريباً لجميع الأنوية مهما اختلف حجمها.", a: "لأن حجم النواة يتناسب طردياً مع عدد النيوكليونات <span class='math-num'>( A )</span>، مما يجعل نسبة الكتلة إلى الحجم ثابتة." },
            { id: 74, q: "تعمل النيوترونات على المحافظة على التماسك النووي.", a: "لأنها توفر قوى تجاذب نووية قوية إضافية دون زيادة في قوى التنافر الكهربائية، مما يعمل كغراء يربط المكونات." },
            { id: 75, q: "استقرار النواة يتطلب توازناً دقيقاً بين عدد البروتونات والنيوترونات.", a: "لضمان تفوق قوى التجاذب النووية على قوى التنافر الكهربائية والحفاظ على بنية النواة." },
            { id: 76, q: "تعتبر النواة هي المسؤولة عن معظم كتلة الذرة الكلية.", a: "لأنها تحتوي على البروتونات والنيوترونات، وكتلة كل منهما تزيد عن كتلة الإلكترون بحوالي <span class='math-num'>( 1836 )</span> مرة." },
            { id: 77, q: "لا نلاحظ الخواص الموجية للأجسام المتحركة الكبيرة في حياتنا اليومية.", a: "لأن كتلتها كبيرة جداً، فيكون طول موجة دي برولي المصاحب لها متناهي الصغر ولا يمكن قياسه." },
            { id: 78, q: "تكون طاقة الربط النووية مساوية لصفر في نواة الهيدروجين العادي (البروتيوم).", a: "لأن نواتها تتكون من بروتون واحد فقط، فلا توجد نيوكليونات أخرى لترتبط معها." },
            { id: 79, q: "ثبات قيمة النسبة بين عدد النيوترونات والبروتونات في الأنوية المستقرة الخفيفة.", a: "لأن قوى التنافر الكهربائي تكون ضعيفة، فتكفي القوى النووية لربط عدد متساوٍ من البروتونات والنيوترونات." },
            { id: 80, q: "تزداد نسبة النيوترونات إلى البروتونات في الأنوية الثقيلة المستقرة.", a: "للتغلب على قوى التنافر الكهربائي المتزايدة بين البروتونات ولتوفير قوى تجاذب نووي إضافية للتماسك." },
            { id: 81, q: "يؤدي النقص في الكتلة <span class='math-num'>( Δm )</span> إلى استقرار النواة.", a: "لأن هذا النقص يتحول بالكامل إلى طاقة ربط نووية تعمل على تجميع وربط مكونات النواة معاً." },
            { id: 82, q: "تعتبر القوة النووية القوية أقوى القوى الأساسية المعروفة في الطبيعة.", a: "لقدرتها على ربط البروتونات الموجبة معاً في حيز متناهي الصغر رغم قوى التنافر الكهربائي الهائلة." },
            { id: 83, q: "تساوي طاقة الربط النووية الشغل اللازم لتفكيك النواة بالكامل.", a: "لأنها الطاقة التي تم تحريرها عند تكوين النواة، وبذل نفس المقدار يعيد المكونات لحالتها الحرة." },
            { id: 84, q: "ارتباط استقرار النواة بطاقة الربط لكل نيوكليون وليس الطاقة الكلية للربط.", a: "لأن الاستقرار يعتمد على مدى قوة ارتباط الجسيم الواحد داخل النواة ومدى صعوبة نزعه منها." },
            { id: 85, q: "استخدام وحدة الكتل الذرية <span class='math-num'>( amu )</span> لقياس كتل الأنوية والجسيمات.", a: "لأن الكيلوجرام وحدة كبيرة جداً وغير عملية للتعامل مع كتل الجسيمات المتناهية الصغر." },
            { id: 86, q: "تستخدم وحدة الإلكترون فولت <span class='math-num'>( eV )</span> لقياس الطاقة في الفيزياء الذرية.", a: "لأن الجول وحدة كبيرة جداً تعطي قيماً بأسس سالبة مربكة في هذا المقياس الذري الصغير." },
            { id: 87, q: "تشابه الخواص الكيميائية لنظائر العنصر الواحد بشكل تام.", a: "بسبب تساوي عدد البروتونات وبالتالي تساوي عدد الإلكترونات وترتيبها في المستويات الخارجية." },
            { id: 88, q: "العلاقة بين الكتلة والطاقة علاقة تكافؤ حسب معادلة أينشتاين.", a: "لأن المادة والطاقة وجهان لعملة واحدة، حيث يمكن للمادة أن تتحول إلى طاقة وبالعكس." },
            { id: 89, q: "تعتمد طاقة الفوتون الواحد على تردده فقط.", a: "حسب علاقة بلانك <span class='math-num'>( E = hf )</span>، حيث ثابت بلانك مقدار ثابت كوني." },
            { id: 90, q: "التيار الكهروضوئي ينعدم فور انقطاع الضوء.", a: "لأن الانبعاث ناتج عن تصادم لحظي مباشر بين الفوتونات والإلكترونات." },
            { id: 91, q: "لا تستهلك قدرة حقيقية في المكثف النقي في دوائر التيار المتردد.", a: "لأن الطاقة تُخزن في صورة مجال كهربائي خلال ربع دورة، ثم تعاد بالكامل إلى المصدر خلال الربع التالي دون أي تحول لطاقة حرارية." },
            { id: 92, q: "الملف الحثي يمنع التغير المفاجئ في شدة التيار.", a: "بسبب خاصية القصور الذاتي الكهربائي المتولدة عن الحث الذاتي والقوة الدافعة العكسية." },
            { id: 93, q: "تغير تردد المصدر في دائرة تيار متردد لا يغير المقاومة الأومية.", a: "لأن المقاومة الأومية تعتمد على نوع المادة وأبعاد الموصل ودرجة حرارته فقط." },
            { id: 94, q: "زيادة السعة الكهربائية للمكثف تزيد من شدة التيار المتردد.", a: "لأن زيادة السعة <span class='math-num'>( C )</span> تقلل الممانعة السعوية <span class='math-num'>( X_C )</span> فيزداد التيار." },
            { id: 95, q: "الجمع الاتجاهي هو الطريقة الصحيحة لجمع الجهود في دوائر التيار المتردد.", a: "بسبب وجود فرق في الطور (زوايا طور) بين متجهات الجهد المختلفة." },
            { id: 96, q: "عند حالة الرنين تتلاشى الممانعات ويتبقى أثر المقاومة الأومية فقط.", a: "لأن الممانعة الحثية <span class='math-num'>( X_L )</span> تتساوى مع الممانعة السعوية <span class='math-num'>( X_C )</span> وتعاكسها في الطور." },
            { id: 97, q: "تزداد طاقة الحركة العظمى للإلكترونات بزيادة تردد الضوء.", a: "لأن الفوتون الساقط يمتلك طاقة أكبر، والفرق بين طاقته ودالة الشغل يذهب كطاقة حركة." },
            { id: 98, q: "استخدام أسلاك سميكة في دوائر التيار المتردد الكبيرة.", a: "لتقليل المقاومة الأومية للأسلاك وتقليل الطاقة المفقودة في صورة حرارة." },
            { id: 99, q: "القوة النووية القوية تمنع انهيار النواة.", a: "بسبب قدرتها الفائقة على جذب النيوكليونات لبعضها والتغلب على قوى التنافر الكهربائي الشديدة." },
            { id: 100, q: "تمثل طاقة الربط لكل نيوكليون المقياس الحقيقي لاستقرار النواة وليس طاقة الربط النووية الكلية.", a: "لأن الاستقرار يعتمد على مدى قوة ارتباط الجسيم الواحد داخل النواة وصعوبة فصله، وهو ما تحدده طاقة الربط لكل نيوكليون." }
        ];

        function App() {
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [userAnswers, setUserAnswers] = React.useState({});
            const [completedQuestions, setCompletedQuestions] = React.useState({});
            const [showAnswer, setShowAnswer] = React.useState(false);

            const handleNext = () => { if (currentIndex < questionsData.length - 1) { setCurrentIndex(prev => prev + 1); setShowAnswer(false); } };
            const handlePrev = () => { if (currentIndex > 0) { setCurrentIndex(prev => prev - 1); setShowAnswer(false); } };
            const jumpToQuestion = (index) => { setCurrentIndex(index); setShowAnswer(false); };
            const handleTextChange = (e) => { setUserAnswers({ ...userAnswers, [questionsData[currentIndex].id]: e.target.value }); };
            const toggleComplete = () => { const currentId = questionsData[currentIndex].id; setCompletedQuestions({ ...completedQuestions, [currentId]: !completedQuestions[currentId] }); };

            const currentQ = questionsData[currentIndex];
            const isCompleted = completedQuestions[currentQ.id] || false;
            const currentAnswerText = userAnswers[currentQ.id] || "";

            return (
                <div className="max-w-4xl mx-auto min-h-screen pb-12">
                    <header className="bg-blue-800 text-white p-6 shadow-md rounded-b-xl mb-6 text-center">
                        <h1 className="text-3xl font-bold mb-2">بنك الفيزياء (12) - 100 سؤال علل</h1>
                        <p className="text-blue-200 mb-1">الفصل الدراسي الثاني - شامل ومنقح بالكامل (دولة الكويت)</p>
                        <p className="text-blue-100 font-medium italic">إعداد الموجه الفني للفيزياء أ/ وليد عزت</p>
                    </header>

                    <div className="flex flex-col md:flex-row gap-6 px-4">
                        <div className="w-full md:w-1/3 bg-white p-4 rounded-xl shadow-sm border border-gray-200 h-[65vh] overflow-y-auto scrollbar-hide">
                            <h2 className="text-lg font-bold mb-4 text-gray-700 border-b pb-2">فهرس الأسئلة</h2>
                            <div className="grid grid-cols-5 gap-2">
                                {questionsData.map((q, idx) => (
                                    <button 
                                        key={q.id} 
                                        onClick={() => jumpToQuestion(idx)}
                                        className={`w-full aspect-square flex items-center justify-center rounded-lg text-xs font-semibold border transition-all ${idx === currentIndex ? 'active-bg shadow-md scale-105' : completedQuestions[q.id] ? 'completed-bg text-emerald-800' : 'default-bg text-gray-600 hover:bg-gray-50'}`}
                                    >
                                        {q.id}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="w-full md:w-2/3 flex flex-col gap-4">
                            <div className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                                <span className="font-bold text-gray-700">السؤال: <span className="text-blue-600 text-xl">{currentQ.id}</span></span>
                                <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                                    <input type="checkbox" checked={isCompleted} onChange={toggleComplete} className="w-5 h-5 text-emerald-600 rounded border-gray-300 cursor-pointer" />
                                    <span className="font-medium text-gray-700">تم الحل</span>
                                </label>
                            </div>

                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 min-h-[140px]">
                                <h3 className="text-xl font-bold text-red-600 mb-2">علل لما يأتي:</h3>
                                <p className="text-lg text-gray-800 leading-relaxed" dangerouslySetInnerHTML={{ __html: currentQ.q }}></p>
                            </div>

                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                <label className="font-bold text-gray-700 mb-2 block">مساحة لكتابة إجابتك:</label>
                                <textarea className="w-full border border-gray-300 rounded-lg p-3 min-h-[120px] focus:ring-2 focus:ring-blue-500 outline-none text-lg" placeholder="اكتب إجابتك هنا للمراجعة الشخصية..." value={currentAnswerText} onChange={handleTextChange}></textarea>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <div className="p-4 bg-gray-50 flex justify-between items-center border-b">
                                    <span className="font-bold text-gray-700">الإجابة النموذجية</span>
                                    <button onClick={() => setShowAnswer(!showAnswer)} className="bg-blue-100 hover:bg-blue-200 text-blue-800 font-semibold py-1 px-4 rounded-lg transition-colors">{showAnswer ? "إخفاء" : "عرض"}</button>
                                </div>
                                {showAnswer && (
                                    <div className="p-6 bg-blue-50/50">
                                        <p className="text-lg text-blue-900 font-medium leading-relaxed" dangerouslySetInnerHTML={{ __html: currentQ.a }}></p>
                                    </div>
                                )}
                            </div>

                            <div className="flex justify-between mt-2">
                                <button onClick={handlePrev} disabled={currentIndex === 0} className={`px-8 py-3 rounded-xl font-bold flex items-center gap-2 ${currentIndex === 0 ? 'bg-gray-200 text-gray-400' : 'bg-gray-800 hover:bg-gray-700 text-white'}`}>السابق</button>
                                <button onClick={handleNext} disabled={currentIndex === questionsData.length - 1} className={`px-8 py-3 rounded-xl font-bold flex items-center gap-2 ${currentIndex === questionsData.length - 1 ? 'bg-gray-200 text-gray-400' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>التالي</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
