                    item.a.toLowerCase().includes(searchQuery)

            }
            return list;

                        <button onclick="clearSearch()" class="mt-4 px-6 py-2 bg-blue-100 text-blue-700 font-semibold rounded-full hover:bg-blue-200 transition">مسح البحث</button>

                `;

            // Generate HTML for Questions
            let html = '';

                const isExpanded = expandedId === index;

                const isRevealed = revealed[item.q];

                                ${!isRevealed ? `

                                        onclick="revealAnswer(${index})"
                                        ${!hasTypedAnswer ? 'disabled' : ''}
                                        class="flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg font-bold transition-all w-full sm:w-auto ${hasTypedAnswer ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-md' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}"
                                    >
                                        <i data-lucide="eye" class="w-5 h-5"></i>
                                        عرض الإجابة النموذجية
                                    </button>
                                </div>
                                <p id="hint-reveal-${index}" class="text-xs text-gray-400 mt-2 text-left ${hasTypedAnswer ? 'hidden' : ''}">
                                    *يجب كتابة محاولة للإجابة أولاً ليتم تفعيل الزر
                                </p>
                                ` : ''}
                            </div>

                            <!-- الإجابة النموذجية -->
                            ${isRevealed ? `
                            <div class="flex gap-4 p-5 bg-green-50 border border-green-200 rounded-xl animate-fade-in">
                                <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-full bg-green-100 text-green-600 shadow-sm">
                                    <i data-lucide="lightbulb" class="w-6 h-6"></i>
                                </div>
                                <div class="flex-1">
                                    <span class="font-bold text-green-800 block mb-2 text-lg border-b border-green-200 pb-2">الإجابة النموذجية:</span>
                                    <p class="text-gray-800 text-lg leading-relaxed font-medium">${item.a}</p>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
                `;
            });

            questionsContainer.innerHTML = html;
            lucide.createIcons(); // Initialize newly added icons
        }

        // Actions
        function setChapter(id) {
            activeChapter = id;
            expandedId = null;
            renderChapters();
            renderQuestions();
        }

        function clearSearch() {
            searchQuery = '';
            searchInput.value = '';
            renderQuestions();
        }

        function toggleQuestion(index) {
            expandedId = expandedId === index ? null : index;
            renderQuestions();
        }

        function handleAnswerInput(index, value) {
            const filtered = getFilteredQuestions();
            const qKey = filtered[index].q;
            userInputs[qKey] = value;

            // تحديث حالة الزر دون الحاجة لإعادة تصيير القائمة بالكامل للحفاظ على تركيز الكتابة
            const btn = document.getElementById(`btn-reveal-${index}`);
            const hint = document.getElementById(`hint-reveal-${index}`);
            
            if (btn) {
                if (value.trim() !== '') {
                    btn.disabled = false;
                    btn.className = "flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg font-bold transition-all w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white shadow-md";
                    if (hint) hint.classList.add('hidden');
                } else {
                    btn.disabled = true;
                    btn.className = "flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg font-bold transition-all w-full sm:w-auto bg-gray-200 text-gray-400 cursor-not-allowed";
                    if (hint) hint.classList.remove('hidden');
                }
            }
        }

        function revealAnswer(index) {
            const filtered = getFilteredQuestions();
            const qKey = filtered[index].q;
            revealed[qKey] = true;
            renderQuestions();
        }

        // Utility
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Boot
        init();
    </script>
</body>
</html>
