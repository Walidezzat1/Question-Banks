        }

        </div>

    </main>

                    ["تنحني المزدوجة الحرارية (برونز - حديد) ناحية الحديد عند تسخينها.", "لأن معامل التمدد الطولي للبرونز أكبر من الحديد، فيتمدد البرونز بمقدار أكبر مسبباً الانحناء جهة الحديد.", "لأن الحديد أثقل وزناً فيسحب المزدوجة لأسفل.", "لأن البرونز يتقلص بالحرارة بينما يتمدد الحديد.", "لأن الحديد موصل أسرع للحرارة من البرونز."],
                    ["يُراعى عند إنشاء الجسور الصلبة تثبيت أحد طرفيها وارتكاز الآخر على ركائز دوارة.", "لكي تسمح بتمدد الصلب وانكماشه بحرية بين فصلي الشتاء والصيف دون أن يتقوس أو ينهار الجسر.", "لتقليل قوة الاحتكاك بين عجلات القطار والجسور أثناء الحركة السريعة.", "لتسهيل تصريف مياه الأمطار والسيول ومنع صدأ أو تآكل المعدن.", "لتقليل التكلفة الإجمالية للحديد والصلب المستخدم في عملية الإنشاء."],
                    ["بعض أنواع الزجاج (كالبيركس) تقاوم التغير السريع في درجة الحرارة ولا تنكسر.", "لأن معامل تمددها الحراري صغير جداً، فلا تتأثر أبعادها بشكل ملحوظ عند تغير الحرارة.", "لأن سمكها الكبير جداً يمنع الحرارة من النفاذ.", "لشفافيتها التامة التي تعكس الحرارة دون امتصاصها.", "لامتلاكها مسامات مطاطية مرنة تمتص الصدمات."],
                    ["في تجربة 'الكرة والحلقة' يصعب مرور الكرة بعد تسخينها عبر الحلقة.", "لأن التسخين يسبب تمدداً حجمياً للكرة، وتزداد أبعادها فيصبح حجمها أكبر من قطر الحلقة.", "لزيادة وزن الكرة وكتلتها عند التسخين الشديد.", "لانكماش الحلقة المعدنية المحيطة بالكرة بسبب الحرارة الإشعاعية.", "لتولد مجال مغناطيسي حول الكرة الساخنة يمنع مرورها."],
                    ["تتكسر الأواني الزجاجية العادية السميكة عند سكب ماء ساخن جداً فيها.", "لتمدد الأجزاء الداخلية الملامسة للماء أسرع من الخارجية، مما يولد إجهادات تؤدي لتكسر الزجاج.", "لتحول الزجاج من الحالة الصلبة للسائلة جزئياً بالحرارة.", "لتبخر الماء بداخلها وتوليد ضغط غازي هائل مفاجئ.", "لتفاعل الزجاج مع الماء كيميائياً مسبباً تآكله."],
                    ["تترك مسافات فاصلة (فواصل متداخلة) بين قضبان السكك الحديدية.", "للسماح للقضبان بالتمدد طولياً في فصل الصيف الحار دون أن تتقوس أو تلتوي.", "لزيادة مرونة القطار عند المنعطفات الحادة.", "لمنع انتقال التيار الكهربائي بين القضبان الطويلة.", "لتسهيل فك وتركيب القضبان عند الصيانة."],
                    ["أسلاك الكهرباء تتدلى وتكون مرتخية في الصيف.", "بسبب ارتفاع الحرارة صيفاً فيحدث تمدد طولي، وتُترك مرتخية لتسمح بالانكماش شتاءً دون أن تنقطع.", "لأن وزن الأسلاك يزداد بشكل كبير في الصيف بسبب تشبعها برطوبة الهواء الساخن.", "بسبب زيادة شدة التيار الكهربائي في الصيف مما يؤدي لارتخاء المادة العازلة للأسلاك.", "لأن الأعمدة الخشبية أو المعدنية الحاملة لها تنكمش صيفاً مما يسبب ارتخاء الأسلاك."],
                    ["يسهل فتح غطاء معدني محكم لوعاء زجاجي عند سكب ماء ساخن عليه.", "لأن معامل التمدد الحجمي والطولي للمعدن أكبر من الزجاج، فيتمدد الغطاء بشكل أكبر ويفك.", "لأن الماء الساخن يعمل كمادة تشحيم لزجة بين الزجاج والمعدن.", "لأن الزجاج ينكمش بشكل حاد جداً عند ملامسته للماء الساخن مبتعداً عن الغطاء.", "لأن الحرارة تكسر الروابط التساهمية في مادة الغطاء المعدني فيصبح مرناً."],
                    ["التغير في حجم الغازات نتيجة لتغير الحرارة يكون بمقدار أكبر بكثير من السوائل والمواد الصلبة.", "لأن قوى التجاذب بين جزيئات الغاز ضعيفة جداً ومسافاتها البينية كبيرة، فتتمدد بحرية تامة.", "لأن الغازات تتكون من جزيئات أصغر حجماً بكثير من جزيئات المواد الصلبة والسائلة.", "لأن الغازات تمتص الحرارة بشكل أبطأ جداً من المواد الصلبة مما يعطيها وقتاً للتمدد.", "لأن السعة الحرارية النوعية للغازات دائماً مساوية للصفر المطلق."],
                    ["يراعي أطباء الأسنان استخدام مواد حشو لها نفس مقدار تمدد مادة مينا الأسنان.", "حتى تتمدد وتنكمش بنفس المعدل بتغير درجة حرارة الفم، فلا تتساقط الحشوة أو تكسر السن.", "لأن هذه المواد تكون أرخص ثمناً وتدوم أطول.", "لتسهيل تشكيلها وتصلبها السريع بأشعة الليزر.", "لمنع تفاعلها مع أحماض اللعاب وتآكلها."],
                    ["يُراعي المهندسون أن يكون معدل تمدد حديد التسليح مساوياً لمعدل تمدد الأسمنت.", "حتى يتمددا وينكمشا معاً بنفس المقدار بتغير الفصول، فلا يحدث إجهاد ميكانيكي يشقق المباني.", "لتسهيل خلطهما بالماء وتكوين خرسانة قوية.", "لتقليل التكلفة المادية للمشروع الإنشائي.", "لمنع صدأ الحديد عند تعرضه للرطوبة الجوية."]
                ]
            },
            {
                id: 4, t: "تغير الحالة الفيزيائية",
                qs: [
                    ["ثبات درجة حرارة المادة الصلبة أثناء عملية الانصهار رغم اكتسابها مزيداً من الطاقة الحرارية.", "لأن الطاقة تُستغل في كسر الروابط بين جزيئات المادة الصلبة وإبعادها لتتحول للحالة السائلة.", "لأن المادة الصلبة تفقد الحرارة للوسط المحيط بنفس معدل اكتسابها من مصدر التسخين.", "لأن الطاقة الحرارية المكتسبة تتحول بالكامل إلى طاقة ضوئية أثناء الانصهار.", "لأن السعة الحرارية النوعية للمادة الصلبة تصبح صفراً عند درجة الانصهار."],
                    ["ثبات درجة حرارة السائل أثناء عملية الغليان (التبخير) رغم التسخين المستمر.", "لأن الحرارة المكتسبة تُصرف في التغلب على قوى التماسك بين جزيئات السائل وتحريرها لتتحول لغاز.", "لأن السائل يعكس جزءاً كبيراً من الحرارة المكتسبة.", "لانعدام الضغط الجوي المؤثر على السائل عند الغليان.", "لزيادة كثافة السائل مما يمنع ارتفاع حرارته."],
                    ["الحرارة الكامنة للتصعيد لمادة معينة تكون دائماً أعلى من الحرارة الكامنة للانصهار لنفس المادة.", "لأن الطاقة اللازمة لكسر الروابط تماماً وتحرير الجزيئات للغاز أكبر بكثير من إضعافها للتحول لسائل.", "لأن الغازات تتطلب ضغطاً جوياً أعلى بكثير لكي تتكون وتتكاثف.", "لأن عملية الانصهار تحدث عادة عند درجات حرارة أعلى من عملية التصعيد.", "لأن جزيئات المادة في الحالة الغازية تمتلك كتلة فعلية أكبر من جزيئات الحالة السائلة."],
                    ["إضافة قطعة جليد بدرجة (0) لشراب أكثر فاعلية في تبريده من إضافة ماء بدرجة (0).", "لأن الجليد سيمتص كمية حرارة إضافية (كحرارة كامنة للانصهار) لكي ينصهر، مما يخفض حرارة العصير أكثر.", "لأن الجليد يمتلك سعة حرارية نوعية أقل بكثير من الماء السائل.", "لأن الجليد يطفو على سطح العصير مما يمنع دخول هواء الغرفة الساخن.", "لأن قوى التجاذب في الجليد تطرد الحرارة للخارج بشكل أسرع."],
                    ["الحرق بالبخار بدرجة 100 سيليزيوس أشد ألماً وخطورة من الحرق بالماء المغلي بنفس الدرجة.", "لأن البخار يمتلك طاقة إضافية كامنة (للتصعيد) سيطلقها كحرارة على الجلد عندما يتكثف متحولاً لماء.", "لاختراق البخار للجلد أسرع بسبب ضغطه العالي.", "لاحتواء البخار على غازات سامة تؤكسد الجلد.", "لكثافة البخار العالية التي تلتصق بالجلد."],
                    ["عملية الانصهار وعملية التجمد هما عمليتان متعاكستان تماماً.", "لأن الانصهار يتطلب امتصاص طاقة لكسر الروابط، بينما التجمد يصاحبه انطلاق نفس المقدار من الطاقة.", "لأن الانصهار يحدث فقط في فصل الصيف بينما التجمد يحدث فقط في فصل الشتاء.", "لأن الانصهار يزيد من كتلة المادة الكلية بينما التجمد يقلل من كتلتها.", "لأن الانصهار يقلل من الحجم دائماً بينما التجمد يزيده دائماً."],
                    ["لا تتغير درجة حرارة الجليد المنصهر حتى يتحول بالكامل إلى ماء سائل.", "لاستهلاك الطاقة الحرارية بالكامل في كسر الروابط لتغيير الحالة الفيزيائية بدلاً من زيادة طاقة الجزيئات الحركية.", "لانعدام الحرارة النوعية للجليد الصلب.", "لاحتفاظ الماء الناتج بالبرودة الكامنة.", "لتبخر الجليد مباشرة دون المرور بالحالة السائلة."],
                    ["رش الماء على الأسطح الحارة في الصيف يلطف الجو ويبرد المكان.", "لأن الماء يمتص كمية كبيرة من حرارة الجو والأسطح (كحرارة كامنة للتصعيد) لكي يتبخر ويبرد محيطه.", "لأن الماء يعكس أشعة الشمس ويعيدها إلى الفضاء الخارجي.", "لأن قطرات الماء تتفاعل مع الأكسجين لتوليد غازات باردة تلطف الجو.", "لأن كثافة الماء تزداد عند ملامسته للأسطح الحارة مما يولد تياراً هوائياً بارداً."],
                    ["عند تحول المادة من الحالة السائلة إلى الصلبة، تعتبر الطاقة الحرارية (Q) سالبة إشارةً.", "لأن المادة في هذه الحالة تفقد وتطرد طاقة حرارية إلى الوسط المحيط بدلاً من امتصاصها.", "لاكتسابها برودة سالبة من المحيط.", "لانعدام طاقتها الداخلية تماماً.", "لعكس اتجاه حركة الجزيئات داخل المادة."],
                    ["كمية الحرارة اللازمة لصهر مادة تختلف باختلاف نوع المادة.", "لاختلاف قوة الروابط بين جزيئات المواد، وبالتالي اختلاف 'الحرارة الكامنة للانصهار' من مادة لأخرى.", "لاختلاف ألوان المواد ودرجة امتصاصها للضوء.", "لاعتمادها الكلي على الضغط الجوي المحيط فقط.", "لأن المواد الصلبة لا تنصهر جميعها بنفس الطريقة."]
                ]
            },
            {
                id: 5, t: "المجال الكهربائي",
                qs: [
                    ["خطوط المجال الكهربائي لا تتقاطع أبداً.", "لأنه لو تقاطعت لكان للمجال الكهربائي أكثر من اتجاه عند نقطة التقاطع، وهذا مستحيل فيزيائياً.", "لأن خطوط المجال تتنافر مع بعضها البعض بقوة مغناطيسية شديدة جداً.", "لأن تقاطعها سيؤدي بالضرورة إلى توليد طاقة حرارية هائلة تحرق الوسط المحيط.", "لأن الشحنات الموجبة والسالبة تلغي بعضها تماماً عند أي نقطة تقاطع محتملة."],
                    ["المجال الكهربائي المتولد بين لوحين معدنيين متوازيين ومشحونين يُعد مجالاً منتظماً.", "لأنه يتميز بخطوط مستقيمة ومتوازية ومسافات متساوية، أي أنه ثابت الشدة والاتجاه في جميع نقاطه.", "لأن الشحنات تتوزع بشكل عشوائي تماماً على اللوحين مما يخلق توازناً استاتيكياً.", "لأنه يعتمد بشكل كلي على الجاذبية الأرضية التي تجعل خطوطه مستقيمة ومنتظمة.", "لأن اللوحين يُصنعان دائماً من مواد عازلة قوية تمنع تسرب المجال للخارج."],
                    ["المجال الكهربائي الناشئ عن شحنة نقطية مفردة يعتبر مجالاً غير منتظم.", "لأن شدة المجال واتجاهه يتغيران باستمرار من نقطة لأخرى حسب البعد عن الشحنة المؤثرة.", "لأن الشحنة النقطية تدور حول نفسها بسرعة كبيرة مما يشتت خطوط المجال.", "لأن خطوط المجال تتقاطع مع بعضها البعض بالقرب من سطح الشحنة النقطية.", "لأن الشحنة النقطية تفقد جزءاً من مقدارها بمرور الزمن مما يضعف المجال."],
                    ["تتباعد خطوط المجال الكهربائي في بعض المناطق وتتقارب في مناطق أخرى.", "تتباعد في المناطق التي يضعف فيها المجال، وتتقارب (تتكاثف) في المناطق التي تزداد فيها شدته.", "تتباعد بسبب تنافر الشحنات، وتتقارب بفعل الجاذبية الأرضية.", "تتقارب عند ارتفاع درجة الحرارة، وتتباعد عند انخفاضها.", "تتباعد في المواد الموصلة، وتتقارب في المواد العازلة."],
                    ["تتجه خطوط المجال مبتعدة عن الشحنة الموجبة ومتجهة نحو الشحنة السالبة.", "لأن اتجاه المجال يمثل مسار شحنة اختبار موجبة والتي تتنافر مع الموجب وتتجاذب مع السالب.", "لكبر كتلة الشحنة الموجبة التي تطرد خطوط المجال.", "لسرعة حركة الشحنة السالبة التي تسحب المجال نحوها.", "لتأثير المجال المغناطيسي للأرض على الشحنات."],
                    ["يتحرك الإلكترون بعجلة منتظمة في اتجاه معاكس لاتجاه خطوط المجال الكهربائي المنتظم.", "لأن الإلكترون شحنته سالبة، فيتأثر بقوة كهربائية يكون اتجاهها معاكساً لاتجاه المجال.", "لأن الإلكترون يمتلك كتلة صغيرة جداً تجعله يرتد بقوة عن خطوط المجال الموجبة.", "لأن خطوط المجال الكهربائي تدفع الإلكترون للأسفل بتأثير الجاذبية.", "لأن الإلكترون يفقد شحنته كلياً بمجرد دخوله منطقة المجال الكهربائي المنتظم."],
                    ["يتحرك البروتون مع اتجاه المجال الكهربائي المنتظم.", "لأن البروتون شحنته موجبة، فيتأثر بقوة كهربائية في نفس اتجاه خطوط المجال.", "لأن البروتون يسعى دائماً لمعادلة شحنته مع اللوح السالب.", "لأن كتلته الكبيرة تجبره على الانزلاق مع خطوط المجال.", "لأن البروتون لا يمتلك شحنة أصلاً فيتحرك بحرية."],
                    ["يتحرك النيوترون في خط مستقيم دون انحراف عند قذفه عمودياً داخل مجال كهربائي منتظم.", "لأنه جسيم متعادل الشحنة، فلا يتأثر بأي قوة كهربائية داخل المجال تجبره على الانحراف.", "لأن كتلته الضخمة تمنع المجال الكهربائي من التأثير في مساره الحركي.", "لأن سرعته تكون دائماً مساوية لسرعة الضوء مما يمنع انحرافه.", "لأنه يولد مجالاً مغناطيسياً قوياً يعاكس ويلغي تأثير المجال الكهربائي."],
                    ["شدة المجال الكهربائي تقل تدريجياً كلما ابتعدنا عن الشحنة النقطية.", "لأن شدة المجال تتناسب عكسياً مع مربع البعد عن الشحنة المؤثرة.", "لأن خطوط المجال تتبدد وتتحول إلى طاقة حرارية في الهواء.", "لأن الشحنة تفقد طاقتها بمرور الزمن.", "لأن كثافة الهواء تزداد وتعيق مرور المجال الكهربائي."],
                    ["تنعدم شدة المجال الكهربائي تماماً في منتصف المسافة بين شحنتين موجبتين متساويتين.", "لأن المجالين الناشئين عن الشحنتين عند هذه النقطة يكونان متساويين مقداراً ومتعاكسين اتجاهاً فيلاشي كل منهما الآخر.", "لأن الشحنتين الموجبتين تتجاذبان مما يفرغ المنطقة الوسطى من أي تأثير كهربائي.", "لأن الهواء الموجود بين الشحنتين يعمل كعازل مثالي يمتص خطوط المجال تماماً.", "لأن الشحنات الموجبة لا تولد مجالاً كهربائياً في المنطقة المحيطة بها من الأساس."],
                    ["محصلة المجال الكهربائي تُحسب بالجمع الاتجاهي وليس الجبري العادي.", "لأن شدة المجال الكهربائي كمية متجهة لها مقدار واتجاه محدد.", "لتغير قيمة الشحنات باستمرار مع الزمن.", "لاعتمادها على نوع الوسط المحيط بالشحنات.", "لارتباطها بقوى الجاذبية الأرضية."],
                    ["تعتبر القوة الكهربائية بين شحنتين قوة متبادلة.", "لأن كل شحنة تؤثر على الأخرى بقوة مساوية لها مقداراً ومعاكسة اتجاهاً حسب قانون نيوتن الثالث.", "لتساوي الشحنتين في المقدار دائماً.", "لتبادلهما الإلكترونات باستمرار عبر الهواء.", "لتشابههما المطلق في الكتلة والحجم."]
                ]
            },
            {
                id: 6, t: "الدرس السادس: المكثفات الكهربائية",
                qs: [
                    ["لا تتغير السعة الكهربائية للمكثف عند زيادة كمية شحنته.", "لأن أي زيادة في الشحنة يقابلها زيادة مماثلة في فرق الجهد، فيظل حاصل القسمة (السعة C) مقداراً ثابتاً.", "لأن سعة المكثف تعتمد حصرياً على مقاومة أسلاك التوصيل في الدائرة.", "لأن الشحنات الإضافية تتسرب فوراً إلى الهواء المحيط ولا يتم تخزينها.", "لأن السعة تعتمد على شدة التيار المار في الدائرة فقط ولا علاقة لها بالشحنة."],
                    ["تزداد السعة الكهربائية لمكثف هوائي مستوٍ عند إدخال مادة عازلة (كالزجاج) بين لوحيه المشحونين.", "لأن ثابت العزل الكهربائي النسبي للمادة العازلة أكبر من الهواء، والسعة تتناسب طردياً مع ثابت العزل.", "لأن المادة العازلة موصل جيد جداً للكهرباء وتسمح بمرور التيار بسهولة.", "لأن المادة العازلة تقلل من المساحة السطحية المشتركة بين اللوحين.", "لأن إدخال المادة العازلة يؤدي ميكانيكياً إلى زيادة المسافة الفعلية بين اللوحين."],
                    ["الطاقة المختزنة في مكثفات موصلة على التوازي أكبر منها عند توصيلها على التوالي (لنفس المصدر).", "لأن السعة المكافئة في التوازي أكبر، والطاقة تتناسب طردياً مع السعة عند ثبات فرق الجهد للبطارية.", "لأن التوصيل على التوازي يقلل من شدة التيار المار في الدائرة الرئيسية.", "لأن المكثفات على التوالي تفقد طاقتها على شكل حرارة بسبب الاحتكاك الداخلي.", "لأن فرق الجهد في التوصيل على التوازي يكون دائماً أكبر من جهد المصدر."],
                    ["عند زيادة البعد بين لوحي مكثف هوائي متصل ببطارية، تقل الطاقة المختزنة فيه.", "لأنه بزيادة البعد تقل السعة، وبثبات الجهد (لاتصاله ببطارية) تقل الطاقة التي تتناسب طردياً مع السعة.", "لأن المسافة الأكبر تشتت المجال المغناطيسي.", "لأن البطارية تفقد طاقتها بمرور الوقت.", "لأن التيار ينقطع عند زيادة المسافة بين اللوحين."],
                    ["يحدث تفريغ فوري للمكثف المشحون عند توصيل طرفيه (لوحيه) بسلك معدني (مقاومة).", "لأن الإلكترونات تنطلق من اللوح السالب للموجب عبر السلك حتى تتعادل الشحنات وينعدم الجهد.", "لأن السلك المعدني يقوم بتبخير الشحنات الكهربائية إلى الجو المحيط.", "لأن اللوح الموجب يكتسب بروتونات إضافية من السلك تؤدي لانفجار المكثف.", "لأن السعة الكهربائية للمكثف تصبح صفراً بمجرد ملامسة السلك للوحين."],
                    ["تكتب المصانع على المكثفات القيمة العظمى لفرق الجهد المسموح تطبيقه (جهد التعطيل).", "لأن زيادة الجهد عن هذا الحد يولد مجالاً يتخطى قوة تحمل العازل، فتحدث شرارة وتتلف المكثف.", "لمعرفة مقدار التيار المستمر الذي سيتم إنتاجه واستهلاكه من المكثف.", "لتحديد وزن المكثف وحجمه المناسبين لتركيبه على لوحة الدائرة الإلكترونية.", "لأن المكثف لن يبدأ بالعمل إطلاقاً إذا كان الجهد المطبق أقل من هذه القيمة المكتوبة."],
                    ["ينعدم مرور التيار الكهربائي في الدائرة بمجرد إتمام شحن المكثف بالكامل بواسطة بطارية.", "لتساوي فرق الجهد بين طرفي المكثف مع فرق الجهد للبطارية وتعاكسهما، فينعدم الجهد المحرك للتيار.", "لأن البطارية تفقد كل طاقتها الكيميائية بمجرد شحن المكثف لمرة واحدة.", "لأن أسلاك الدائرة تسخن وتتمدد مما يؤدي لقطع مسار التيار الكهربائي.", "لأن المكثف يتحول إلى مادة فائقة التوصيل تمنع مرور التيار بشكل عكسي."],
                    ["تقل سعة المكثف المستوي عند إبعاد لوحيه عن بعضهما.", "لأن السعة الكهربائية للمكثف المستوي تتناسب عكسياً مع المسافة الفاصلة بين لوحيه (d).", "لأن الشحنات تتسرب من أطراف الألواح المتباعدة.", "لأن زيادة المسافة تقلل من ثابت العزل الكهربائي للفراغ.", "لأن البطارية تفشل في دفع الشحنات عبر مسافات أطول."],
                    ["توصيل المكثفات على التوازي يُعد وسيلة للحصول على سعة كهربائية كبيرة.", "لأن السعة المكافئة في التوازي تساوي مجموع سعات جميع المكثفات المتصلة.", "لأن التوازي يضاعف جهد البطارية المطبق على المكثفات.", "لأنه يمنع تسرب الشحنات عبر الأسلاك النحاسية.", "لأنه يقلل المسافة بين ألواح المكثفات المختلفة."],
                    ["السعة المكافئة لمجموعة مكثفات على التوالي أصغر من أصغر سعة مكثف في المجموعة.", "لأن مقلوب السعة المكافئة يساوي مجموع مقلوبات سعات المكثفات المتصلة.", "لأن الشحنات تتصادم في مسار التوالي وتلغي بعضها.", "لأن الجهد يتضاعف ويحرق السعات الكبيرة.", "لأن التوالي يقلل من سماكة المادة العازلة."],
                    ["فرق الجهد متساوٍ بين جميع المكثفات المتصلة على التوازي.", "لأن جميع الألواح الموجبة متصلة بنقطة تفرع واحدة وجميع الألواح السالبة متصلة بالنقطة الأخرى للمصدر.", "لأن جميع المكثفات تمتلك نفس السعة الكهربائية.", "لأن التيار الكهربائي لا يمر عبر دوائر التوازي.", "لأن المجال المغناطيسي ينظم الجهد تلقائياً."],
                    ["شحنة المكثفات المتصلة على التوالي متساوية رغم اختلاف سعاتها.", "لأن الشحنات تُزاح وتُشحن من لوح للوح الذي يليه بطريقة الحث الكهربائي وبنفس المقدار عبر مسار التوالي.", "لأن البطارية تضخ شحنات متطابقة لكل مكثف بشكل منفصل.", "لأن المكثفات ذات السعات المختلفة ترفض استقبال الشحنات.", "لأن الجهد يتكفل بمساواة الشحنات إجبارياً."],
                    ["عند إدخال مادة عازلة في مكثف مشحون ومفصول (معزول) يقل فرق جهده.", "لأن إدخال العازل يزيد السعة، وبما أن الشحنة ثابتة (لأنه مفصول)، فإن الجهد يجب أن يقل حسب (V=q/C).", "لأن العازل يمتص جزءاً من الشحنات الكهربائية.", "لأن تلامس العازل يفرغ المكثف في الأرض.", "لأن المسافة بين اللوحين تقل بوجود العازل."],
                    ["يُسمى المكثف ذو اللوحين المتوازيين بـ 'المكثف المستوي'.", "لأنه يتألف من لوحين مستويين موصلين يفصل بينهما مادة عازلة (أو فراغ).", "لاستوائه وثباته على الأسطح الأفقية فقط.", "لأنه ينتج تياراً مستوياً ومستمراً لا يتذبذب.", "لأنه مسطح ولا يشغل حيزاً في الدوائر الإلكترونية."]
                ]
            },
            {
                id: 7, t: "الدرس السابع: المجال المغناطيسي",
                qs: [
                    ["تنحرف الإبرة المغناطيسية (البوصلة) عند مرور تيار كهربائي مستمر في سلك مستقيم بجوارها.", "لأن مرور التيار الكهربائي في السلك يُولد حوله مجالاً مغناطيسياً يؤثر بقوة على الإبرة مسبباً انحرافها.", "بسبب التجاذب الكهربائي المباشر بين إلكترونات السلك والقطب الشمالي للإبرة.", "لأن السلك يسخن بمرور التيار مما يسبب تيارات حمل هوائية ميكانيكية تدفع الإبرة.", "بسبب زيادة تأثير الجاذبية الأرضية الموضعية نتيجة لمرور التيار في السلك."],
                    ["خطوط المجال المغناطيسي لسلك مستقيم تكون على شكل دوائر متحدة المركز.", "نتيجة لتوزيع المجال الناشئ عن مرور التيار في الموصل المستقيم، حيث يكون السلك محوراً لهذه الدوائر.", "لأن المجال المغناطيسي للأرض يجبر الخطوط على الدوران.", "لأن الإلكترونات تدور بحركة دائرية داخل السلك النحاسي.", "بسبب تأثير قوة الجاذبية على خطوط المجال المستقيمة."],
                    ["تقل شدة المجال المغناطيسي كلما ابتعدنا عن السلك المستقيم الذي يمر به تيار كهربائي.", "لأن شدة المجال المغناطيسي تتناسب عكسياً مع البعد العمودي عن السلك.", "لأن الهواء يمتص المجال المغناطيسي بالكامل على مسافات قصيرة جداً.", "لأن التيار الكهربائي يضعف كلما ابتعدنا عن مصدر الطاقة (البطارية).", "لأن خطوط المجال المغناطيسي تتشتت وتتكسر عند احتكاكها بجزيئات الهواء."],
                    ["يمكن تغيير اتجاه المجال المغناطيسي حول سلك مستقيم.", "بتغيير اتجاه التيار الكهربائي المار في السلك (بقلب أقطاب البطارية).", "بتغيير نوع مادة السلك من نحاس إلى ألومنيوم.", "بتسخين السلك لدرجات حرارة عالية جداً.", "بتغيير فرق جهد المصدر فقط دون عكس الأقطاب."],
                    ["شدة المجال المغناطيسي عند مركز ملف دائري تزداد بزيادة عدد لفاته.", "لأن كل لفة تولد مجالاً إضافياً، وبتراكمها تزداد الشدة الكلية طردياً مع عدد اللفات.", "لأن اللفات المتعددة تقلل من مقاومة السلك الكلية.", "لزيادة طول السلك الكلي المتصل بالبطارية.", "لتقليل نصف قطر اللفة المركزية."],
                    ["يُعتبر الملف الحلزوني (اللولبي) الذي يمر به تيار كهربائي مغناطيساً مستقيماً طويلاً.", "لأن شكل خطوط المجال المغناطيسي الناشئ عنه داخله وخارجه يشبه تماماً المجال الناشئ عن مغناطيس مستقيم ذي قطبين.", "لأن التيار الكهربائي يضطر للمرور في خط مستقيم وقوي جداً داخل تجويف اللفات.", "لأنه يُصنع دائماً وأبداً من أسلاك مستقيمة صلبة وغير قابلة للثني أو الدوران.", "لأن المجال المغناطيسي المتولد خارجه يكون منعدماً تماماً في جميع الاتجاهات."],
                    ["شدة المجال المغناطيسي عند مركز ملف لولبي تقل إذا تم شد الملف من طرفيه لإطالته.", "لأن شدة المجال تتناسب عكسياً مع طول محور الملف، فعند زيادة الطول وتباين اللفات تقل الشدة.", "لأن شد الملف يؤدي إلى تقليل نصف قطره، وشدة المجال تتناسب طردياً مع نصف القطر.", "لأن شد الملف يؤدي إلى انخفاض مفاجئ في شدة التيار الكهربائي القادم من البطارية.", "لأن شد الملف يقلل من عدد اللفات الكلي المكونة للملف اللولبي."],
                    ["خطوط المجال المغناطيسي داخل الملف اللولبي (بعيداً عن الأطراف) خطوط مستقيمة ومتوازية.", "لأن المجال المغناطيسي في هذه المنطقة يكون مجالاً منتظماً وثابتاً في الشدة والاتجاه.", "لأن الأسلاك تضغط على المجال وتجبره على الاستقامة.", "لأن الجاذبية تسحب خطوط المجال لأسفل مشكلة خطوطاً مستقيمة.", "لأن التيار داخل الملف اللولبي يكون متردداً."],
                    ["يُصنع قلب الملف اللولبي (الحلزوني) في المغناطيسات الكهربائية غالباً من الحديد المطاوع.", "لأن معامل النفاذية المغناطيسية للحديد أكبر بكثير من الهواء، مما يركز ويضاعف من شدة المجال المغناطيسي.", "لأن الحديد المطاوع يمنع ارتفاع درجة حرارة الملف اللولبي أثناء مرور التيار المستمر.", "لأن الحديد المطاوع مادة عازلة تمنع حدوث تماس كهربائي بين لفات السلك النحاسي.", "لجعل الملف اللولبي أخف وزناً وأكثر مرونة ومقاومة للصدأ عبر الزمن."],
                    ["يعمل الملف الدائري الذي يمر به تيار كهربائي كمغناطيس قصير.", "لأن خطوط المجال تخرج من أحد وجهيه وتدخل في الوجه الآخر مشكلة مسارات مغلقة تشبه مغناطيساً قصيراً.", "لقصر طول السلك المستخدم في صنع الحلقة الدائرية.", "لضعف مجاله المغناطيسي مقارنة بالملف اللولبي.", "لعدم احتوائه على قلب من الحديد المطاوع."],
                    ["يتغير اتجاه انحراف إبرة البوصلة الموضوعة تحت سلك يمر به تيار عند عكس أقطاب البطارية.", "لأن عكس البطارية يعكس اتجاه التيار، وبالتالي ينعكس اتجاه المجال المغناطيسي المتولد حسب قاعدة اليد اليمنى.", "لأن عكس البطارية يحول التيار المستمر إلى تيار متردد يربك إبرة البوصلة.", "لأن الإبرة المغناطيسية تفقد مغناطيسيتها فوراً عند انعكاس القطبية الكهربائية.", "لأن القوة الدافعة الكهربائية تصبح سالبة مما يدفع الإبرة للأسفل بدلاً من الدوران."],
                    ["ينعدم المجال المغناطيسي نظرياً عند مسافة لا نهائية من سلك مستقيم يمر به تيار.", "لأن شدة المجال تتناسب عكسياً مع المسافة، فكلما زادت المسافة جداً قل المجال ليقترب من الصفر.", "لامتصاص الفضاء الخارجي لخطوط المجال المغناطيسي.", "لتوقف الإلكترونات عن الحركة في السلك بعد مسافة معينة.", "لانعدام القوة الدافعة للبطارية بمرور الوقت."]
                ]
            },
            {
                id: 8, t: "الدرس الثامن: الضوء وخواصه",
                qs: [
                    ["ينكسر الضوء عند انتقاله بشكل مائل بين وسطين شفافين مختلفين كالهواء والماء.", "بسبب التغير المفاجئ في سرعة انتشار الضوء نتيجة لاختلاف الكثافة الضوئية للوسطين.", "لأن الضوء يصطدم بجزيئات الوسط الثاني الأكثف ويرتد بقوة إلى الخلف.", "لأن الوسط المائي يمتص جميع ألوان الطيف ويعكس اللون الأزرق فقط.", "بسبب التغير الحاد في درجة حرارة الوسطين مما يثني مسار الضوء."],
                    ["يبدو القلم المغمور جزء منه في الماء كما لو كان مكسوراً عند السطح الفاصل.", "بسبب ظاهرة 'انكسار الضوء' حيث تنكسر الأشعة الصادرة من القلم مبتعدة عن العمود عند خروجها للهواء.", "لأن الماء يعمل كعدسة مقعرة تصغر وتكسر الصورة الحقيقية للقلم.", "بسبب ظاهرة التداخل الهدام لأشعة الضوء عند سطح الماء والتي تخفي جزءاً من القلم.", "لأن كثافة القلم تزداد داخل الماء مما يجعله ينحني فيزيائياً نحو الأسفل."],
                    ["معامل الانكسار المطلق لأي وسط شفاف (كالزجاج) دائماً يكون أكبر من الواحد الصحيح.", "لأن سرعة الضوء في الفراغ هي أقصى سرعة ممكنة، فتكون دائماً أكبر من سرعته في أي وسط مادي آخر.", "لأن الطول الموجي للضوء في الفراغ أصغر بكثير من الطول الموجي في أي وسط آخر.", "لأن الكثافة الضوئية للفراغ تعتبر لا نهائية مقارنة بالأوساط الشفافة المادية.", "لأن أشعة الضوء لا يمكنها الانكسار أو النفاذ إطلاقاً داخل الفراغ."],
                    ["معامل الانكسار النسبي بين وسطين مقدار ليس له وحدة قياس.", "لأنه يمثل نسبة بين كميتين متماثلتين (سرعة مقسومة على سرعة، أو معامل على معامل).", "لأن الضوء يعتبر موجة كهرومغناطيسية وليس مادة ملموسة تُقاس.", "لأن الانكسار النسبي يتغير باستمرار بتغير زاوية السقوط.", "لأن العلماء لم يتفقوا على وحدة قياس قياسية له حتى الآن."],
                    ["تختلف سرعة الضوء المنتقل في الأوساط الشفافة المختلفة.", "لاختلاف الكثافة الضوئية لتلك الأوساط، فكلما زادت الكثافة الضوئية للوسط قلت سرعة الضوء فيه.", "بسبب اختلاف درجة حرارة الأوساط الشفافة.", "لأن الضوء يفقد طاقته بالتدريج عند اختراق الأوساط.", "لاختلاف ألوان الأوساط الشفافة وقدرتها على عكس الضوء."],
                    ["الانعكاس على سطح المرآة يُعد انعكاساً منتظماً.", "لأن المرآة سطح مستوٍ ومصقول، فترتد الأشعة الساقطة عليه بشكل متوازٍ وفي اتجاه واحد.", "لأن المرآة تمتص الضوء لفترة قصيرة ثم تعيد بثه بانتظام.", "لأن ظهر المرآة مطلي بمادة فضية تولد مجالاً مغناطيسياً منتظماً.", "لأن المرآة مصنوعة من زجاج نقي لا يحتوي على شوائب."],
                    ["تشتت الأشعة الضوئية في اتجاهات مختلفة عند سقوطها على سطح خشن (انعكاس غير منتظم).", "لأن العمود المقام يختلف اتجاهه من نقطة لأخرى على السطح الخشن، فتنعكس الأشعة متفرقة رغم سقوطها متوازية.", "لأن السطح الخشن يمتص معظم الضوء ويعكس القليل منه فقط.", "لأن السطح الخشن يحرف مسار الضوء بظاهرة الحيود وليس الانعكاس.", "لأن الأشعة الضوئية تتصادم مع بعضها البعض فوق السطح الخشن."],
                    ["الشعاع الضوئي الساقط عمودياً على سطح مرآة عاكسة يرتد على نفسه تماماً.", "لأن زاوية السقوط تساوي صفراً، وبحسب قانون الانعكاس يجب أن تساوي زاوية الانعكاس صفراً أيضاً.", "لأن السطح العاكس يمتص الشعاع ثم يعيد إرساله بقوة دفع أكبر في نفس الاتجاه.", "لأن الأشعة العمودية تمتلك طاقة حركية تجعلها تخترق المرآة وترتد من الطبقة الخلفية.", "بسبب ظاهرة الحيود التي تجبر الضوء على العودة من نفس الفتحة التي سقط منها."],
                    ["ينكسر الشعاع الضوئي 'مقترباً' من العمود عند انتقاله من الهواء إلى الزجاج.", "لانتقاله من وسط أقل كثافة ضوئية (هواء) إلى وسط أكبر كثافة ضوئية (زجاج) فتقل سرعته.", "لزيادة سرعته بشكل مفاجئ داخل مادة الزجاج.", "لتولد شحنات ساكنة في الزجاج تجذب الشعاع نحو العمود.", "لاختلاف درجة حرارة الزجاج عن الهواء المحيط."],
                    ["في الأوساط غير الشفافة (المعتمة) تصبح سرعة الضوء مساوية للصفر.", "لأن هذه الأوساط تمتص طاقة الضوء ولا تسمح له بالنفاذ من خلالها.", "لأن الضوء ينعكس كلياً عنها بسرعة مضاعفة.", "لأن الضوء يتحول إلى كتلة صلبة عند ملامستها.", "لأنها تكسر الضوء بزاوية 90 درجة تماماً."],
                    ["يُعتبر الضوء موجة كهرومغناطيسية.", "لأنه يتكون من تعامد مجالين كهربائي ومغناطيسي مهتزين، ولا يحتاج لوسط مادي لانتقاله.", "لأنه يجذب برادة الحديد عند تسليطه عليها.", "لأنه يتكون من إلكترونات حرة سريعة الحركة.", "لأنه يتولد فقط من محطات توليد الكهرباء المغناطيسية."],
                    ["لا ينكسر الشعاع الضوئي الذي يسقط بشكل عمودي على السطح الفاصل بين وسطين شفافين.", "لأن زاوية السقوط تساوي صفر، فينفذ على استقامته دون انحراف (رغم تغير سرعته).", "لتساوي كثافة الوسطين الشفافين تماماً عند السقوط العمودي.", "لمنع السطح العمودي مرور الضوء أصلاً.", "لحدوث انعكاس كلي داخلي يعيد الشعاع إلى الوسط الأول."],
                    ["يتكون الهدب المركزي دائماً مضيئاً وواضحاً في تجربة الشق المزدوج ليونج.", "لأن فرق المسير للموجتين الواصلتين إلى نقطة الهدب المركزي يساوي صفراً، مما يحقق شرط التداخل البنائي.", "لأن الشق المركزي في التجربة يكون دائماً أكبر وأعرض من الشقوق الأخرى.", "لأن موجات الضوء تتجمع بقوة الجاذبية الأرضية في منتصف الحائل بالضبط.", "لأن التداخل في المنتصف يكون تداخلاً هدمياً تاماً يولد ضوءاً أبيض."],
                    ["تتكون وتظهر أهداب مظلمة (معتمة) على الحائل في تجربة شقي يونج.", "نتيجة حدوث تداخل 'هدام' حيث يكون فرق المسير بين الموجتين مضاعفات فردية لنصف الطول الموجي.", "نتيجة حدوث تداخل 'بناء' حيث تتراكم الموجات فوق بعضها لحجب الضوء تماماً.", "بسبب وجود شوائب في الهواء تمنع وصول الضوء إلى بعض المناطق على الحائل.", "لأن الضوء المستخدم في التجربة يكون غير مرئي وذو تردد منخفض جداً."],
                    ["يزداد التباعد بين الأهداب (البعد الهدبي) في تجربة يونج عند إبعاد الحائل عن الشقين.", "لأن البعد الهدبي يتناسب طردياً مع المسافة بين الشقين والحائل (D).", "لانخفاض تردد الضوء مع المسافة.", "لتشتت الضوء في الفراغ الأكبر بشكل عشوائي.", "لزيادة الطول الموجي للضوء تلقائياً مع المسافة."],
                    ["ظاهرة تداخل الضوء تثبت الطبيعة الموجية للضوء.", "لأن التداخل (تراكب لإنتاج إضاءة وظلام) هو خاصية فريدة للموجات ولا يمكن تفسيرها لو كان الضوء جسيمات مادية فقط.", "لتغير كتلة الفوتونات في الضوء المتداخل.", "لقدرة الضوء على اختراق الفراغ الكوني.", "لانعكاس الضوء كجسيمات مرنة عند الاصطدام بالحائل."]
                ]
            }
        ];

        // دالة لخلط المصفوفة عشوائياً
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // فك تشفير البيانات المضغوطة وتحويلها للصيغة القابلة للعرض
        const chaptersData = rawData.map(chapter => ({
            id: chapter.id,
            title: chapter.t,
            questions: chapter.qs.map((qArray, qIndex) => {
                // qArray[0] هو السؤال
                // qArray[1] الإجابة الصحيحة دائماً في البيانات الخام
                // qArray[2], [3], [4] المشتتات الخاطئة
                const optionsWithCorrectness = [
                    { text: qArray[1], isCorrect: true },
                    { text: qArray[2], isCorrect: false },
                    { text: qArray[3], isCorrect: false },
                    { text: qArray[4], isCorrect: false }
                ];
                return {
                    q: qArray[0],
                    globalId: `c${chapter.id}-q${qIndex}`,
                    shuffledOptions: shuffleArray(optionsWithCorrectness)
                };
            })
        }));

        const allQuestions = chaptersData.flatMap(chapter => 
            chapter.questions.map(q => ({ ...q, chapterTitle: chapter.title }))
        );

        // State
        let activeChapter = 0; // 0 means 'All'
        let searchQuery = '';
        let userAnswers = {}; // { globalId: { selectedIndex, isCorrect } }
        let score = 0;
        let totalAnswered = 0;

        // DOM Elements
        const chaptersContainer = document.getElementById('chapters-container');
        const resultsCounter = document.getElementById('results-counter');
        const questionsContainer = document.getElementById('questions-container');
        const searchInput = document.getElementById('search-input');
        const scoreBoard = document.getElementById('score-board');
        const scoreCorrectEl = document.getElementById('score-correct');
        const scoreTotalEl = document.getElementById('score-total');

        // Initialize App
        function init() {
            setupEventListeners();
            renderChapters();
            renderQuestions();
        }

        function setupEventListeners() {
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderQuestions();
            });
        }

        function getFilteredQuestions() {
            let list = activeChapter === 0 
                ? allQuestions 
                : chaptersData.find(ch => ch.id === activeChapter).questions.map(q => ({ ...q, chapterTitle: chaptersData.find(c => c.id === activeChapter).title }));

            if (searchQuery.trim() !== '') {
                list = list.filter(item => 
                    item.q.toLowerCase().includes(searchQuery) || 
                    item.shuffledOptions.some(opt => opt.text.toLowerCase().includes(searchQuery))
                );
            }
            return list;
        }

        function renderChapters() {
            let html = `
                <button onclick="setChapter(0)" class="flex-shrink-0 px-6 py-3 rounded-full font-semibold transition-all duration-300 ${activeChapter === 0 ? 'bg-blue-600 text-white shadow-md transform scale-105' : 'bg-white text-gray-600 hover:bg-blue-50 border border-gray-200'}">
                    جميع الدروس
                </button>
            `;
            
            chaptersData.forEach(chapter => {
                const isActive = activeChapter === chapter.id;
                html += `
                    <button onclick="setChapter(${chapter.id})" class="flex-shrink-0 px-6 py-3 rounded-full font-semibold transition-all duration-300 ${isActive ? 'bg-blue-600 text-white shadow-md transform scale-105' : 'bg-white text-gray-600 hover:bg-blue-50 border border-gray-200'}">
                        ${chapter.title.split(':')[0]}
                    </button>
                `;
            });
            
            chaptersContainer.innerHTML = html;
        }

        function handleOptionClick(globalId, optIndex) {
            if (userAnswers[globalId]) return; // Already answered

            const question = allQuestions.find(q => q.globalId === globalId);
            const isCorrect = question.shuffledOptions[optIndex].isCorrect;

            userAnswers[globalId] = {
                selectedIndex: optIndex,
                isCorrect: isCorrect
            };

            totalAnswered++;
            if (isCorrect) score++;

            updateScoreBoard();
            renderQuestions();
        }

        function updateScoreBoard() {
            if (totalAnswered > 0) {
                scoreBoard.classList.remove('hidden');
                scoreCorrectEl.textContent = score;
                scoreTotalEl.textContent = totalAnswered;
            }
        }

        function renderQuestions() {
            const filtered = getFilteredQuestions();

            // Update Counter
            let counterHtml = `<span>يتم عرض ${filtered.length} سؤال</span>`;
            if (searchQuery) {
                counterHtml += `<span class="mr-2 text-blue-600 bg-blue-100 px-3 py-1 rounded-full">نتائج البحث: "${searchQuery}"</span>`;
            }
            resultsCounter.innerHTML = counterHtml;

            // Empty state
            if (filtered.length === 0) {
                questionsContainer.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-200">
                        <i data-lucide="search" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
                        <h3 class="text-xl font-bold text-gray-600 mb-2">لم يتم العثور على نتائج</h3>
                        <p class="text-gray-500">جرب البحث بكلمات مختلفة أو قم بإزالة عوامل التصفية.</p>
                        <button onclick="clearSearch()" class="mt-4 px-6 py-2 bg-blue-100 text-blue-700 font-semibold rounded-full hover:bg-blue-200 transition">مسح البحث</button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // Generate HTML for Questions
            let html = '';
            filtered.forEach((item, index) => {
                const answerRecord = userAnswers[item.globalId];
                const isAnswered = !!answerRecord;

                let optionsHtml = '';
                item.shuffledOptions.forEach((opt, optIndex) => {
                    let btnClass = "border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-gray-700 bg-white";
                    
                    if (isAnswered) {
                        if (opt.isCorrect) {
                            btnClass = "border-green-500 bg-green-50 text-green-900 font-bold shadow-sm";
                        } else if (answerRecord.selectedIndex === optIndex) {
                            btnClass = "border-red-400 bg-red-50 text-red-800 opacity-80";
                        } else {
                            btnClass = "border-gray-100 bg-gray-50 text-gray-400 opacity-50 cursor-not-allowed";
                        }
                    }

                    optionsHtml += `
                        <button 
                            ${!isAnswered ? `onclick="handleOptionClick('${item.globalId}', ${optIndex}); this.classList.add('btn-clicked');"` : "disabled"}
                            class="w-full text-right p-4 rounded-xl border-2 transition-all duration-300 text-sm md:text-base leading-relaxed ${btnClass}"
                        >
                            ${opt.text}
                        </button>
                    `;
                });

                html += `
                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow duration-300 p-6">
                    <div class="flex items-start gap-3 mb-6">
                        <div class="mt-1 flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-blue-100 text-blue-600">
                            <span class="font-bold text-sm">${index + 1}</span>
                        </div>
                        <div>
                            ${activeChapter === 0 ? `<p class="text-xs font-bold text-blue-500 mb-2 bg-blue-50 inline-block px-2 py-1 rounded">${item.chapterTitle}</p>` : ''}
                            <h3 class="text-lg md:text-xl font-bold text-gray-800 leading-relaxed">علل: ${item.q}</h3>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 gap-3 ml-0 md:ml-11">
                        ${optionsHtml}
                    </div>

                    ${isAnswered ? `
                        <div class="mt-6 ml-0 md:ml-11 p-4 rounded-xl ${answerRecord.isCorrect ? 'bg-green-100 border border-green-200 text-green-800' : 'bg-red-50 border border-red-200 text-red-800'} flex gap-3 items-center animate-fade-in">
                            <i data-lucide="${answerRecord.isCorrect ? 'check-circle-2' : 'x-circle'}" class="w-6 h-6 flex-shrink-0"></i>
                            <p class="font-bold text-md md:text-lg">
                                ${answerRecord.isCorrect ? 'إجابة صحيحة! التفسير العلمي دقيق.' : 'إجابة خاطئة. تأكد من التفسير العلمي المظلل باللون الأخضر أعلاه.'}
                            </p>
                        </div>
                    ` : ''}
                </div>
                `;
            });

            questionsContainer.innerHTML = html;
            lucide.createIcons();
        }

        // Actions
        function setChapter(id) {
            activeChapter = id;
            renderChapters();
            renderQuestions();
        }

        function clearSearch() {
            searchQuery = '';
            searchInput.value = '';
            renderQuestions();
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Boot
        init();
    </script>
</body>
</html>
